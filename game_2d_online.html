        function createBall(x, y, color, type, points) {
            return { id: 'ball-' + nextBallId++, x, y, vx: 0, vy: 0, color, type, points, name: '', defaultX: x, defaultY: y };
        }

        function getColorDefinition(name) {
            return COLOR_BALLS_DEF.find(cb => cb.name === name);
        }

        function getColorBall(name) {
            return balls.find(b => b.type === 'color' && b.name === name) || null;
        }

        function ballValue(ball) {
            if (!ball) return 0;
            return ball.type === 'red' ? 1 : ball.points;
        }

        function resetShotTracking() {
            pottedThisShot = [];
            foul = false;
            foulType = '';
            shotStarted = false;
            firstBallHit = null;
            shotContext = null;
        }

        function getBallsOnForRules() {
            if (phase === 'red') {
                return balls.filter(ball => ball.type === 'red');
            }
            if (phase === 'color') {
                return nominatedColor ? [nominatedColor] : [];
            }
            if (phase === 'final') {
                const nextColor = getNextFinalColor();
                return nextColor ? [nextColor] : [];
            }
            return [];
        }

        function getBallOnValueForRules() {
            if (phase === 'red') return 1;
            if (phase === 'color') return nominatedColor ? nominatedColor.points : 4;
            if (phase === 'final') {
                const nextColor = getNextFinalColor();
                return nextColor ? nextColor.points : 7;
            }
            return 4;
        }

        function describeBallsOn(context = null) {
            const ctx = context || captureShotContext();
            if (ctx.phase === 'red') return '红球';
            if (ctx.phase === 'color') return ctx.ballsOn[0] ? ctx.ballsOn[0].name : '指定彩球';
            if (ctx.phase === 'final') return ctx.ballsOn[0] ? ctx.ballsOn[0].name : '目标彩球';
            return '活球';
        }

        function captureShotContext() {
            const ballsOn = getBallsOnForRules();
            return {
                phase,
                ballsOn,
                ballOnValue: getBallOnValueForRules(),
                nominatedColor,
                freeBallMode,
                freeBallTarget,
                freeBallTargetName: freeBallTarget ? freeBallTarget.name : null
            };
        }

        function captureShotSnapshot() {
            return {
                balls: balls.map(ball => ({
                    x: ball.x,
                    y: ball.y,
                    vx: 0,
                    vy: 0,
                    color: ball.color,
                    type: ball.type,
                    points: ball.points,
                    name: ball.name,
                    defaultX: ball.defaultX,
                    defaultY: ball.defaultY,
                    id: ball.id,
                    isWhite: ball === whiteBall
                })),
                phase,
                nominatedColorName: nominatedColor ? nominatedColor.name : null,
                isPlacingBall
            };
        }

        function restoreShotSnapshot(snapshot) {
            if (!snapshot) return;
            balls = snapshot.balls.map(data => {
                const ball = createBall(data.x, data.y, data.color, data.type, data.points);
                ball.vx = 0;
                ball.vy = 0;
                ball.id = data.id || ball.id;
                ball.name = data.name;
                ball.defaultX = data.defaultX;
                ball.defaultY = data.defaultY;
                return ball;
            });
            whiteBall = balls.find(ball => ball.type === 'white') || null;
            phase = snapshot.phase;
            nominatedColor = snapshot.nominatedColorName ? getColorBall(snapshot.nominatedColorName) : null;
            isPlacingBall = snapshot.isPlacingBall;
            ballMoving = false;
            allBallsStopped = true;
        }

        function initControls() {
            const directionControl = document.getElementById('directionControl');
            const powerContainer = document.getElementById('powerContainer');

            // 方向控制
            directionControl.addEventListener('mousedown', (e) => {
                if (!canControlCurrentTurn() || isTableInMotion() || !gameStarted || awaitingLetPlayDecision) return;
                directionControlActive = true;
                updateDirectionFromControl(e);
            });
            document.addEventListener('mousemove', (e) => {
                if (directionControlActive) {
                    updateDirectionFromControl(e);
                }
                if (powerControlActive) {
                    updatePowerFromGauge(e);
                }
            });
            document.addEventListener('mouseup', () => {
                directionControlActive = false;
                powerControlActive = false;
            });

            // 纵向力度控制
            powerContainer.addEventListener('mousedown', (e) => {
                if (!canControlCurrentTurn() || isTableInMotion() || !gameStarted || awaitingLetPlayDecision) return;
                powerControlActive = true;
                updatePowerFromGauge(e);
            });

            // 键盘控制（微调）
            document.addEventListener('keydown', (e) => {
                if (!canControlCurrentTurn() || isTableInMotion() || !gameStarted || awaitingLetPlayDecision) return;
                const step = e.shiftKey ? 0.001745 : 0.01745;
                if (e.key === 'ArrowLeft') cueAngle -= step;
                if (e.key === 'ArrowRight') cueAngle += step;
                if (e.key === 'ArrowUp' && cuePower < 100) cuePower += 1;
                if (e.key === 'ArrowDown' && cuePower > 0) cuePower -= 1;
                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    shoot();
                }
                updatePowerGauge();
                updateDirectionHandle();
                updateAngleDisplay();
            });
        }

        function updateDirectionFromControl(e) {
            const control = document.getElementById('directionControl');
            const rect = control.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const dx = e.clientX - centerX;
            const dy = e.clientY - centerY;
            const newAngle = Math.atan2(dy, dx);

            const diff = newAngle - cueAngle;
            const normalizedDiff = Math.atan2(Math.sin(diff), Math.cos(diff));
            cueAngle = newAngle;
            updateDirectionHandle();
            updateAngleDisplay();
        }

        function updateAngleDisplay() {
            const angleDeg = (-cueAngle * 180 / Math.PI).toFixed(2);
            document.getElementById('angleDisplay').textContent = angleDeg + '°';
        }

        function updateDirectionHandle() {
            const handle = document.getElementById('directionHandle');
            const radius = 85;
            const x = Math.cos(cueAngle) * radius;
            const y = Math.sin(cueAngle) * radius;
            handle.style.left = `calc(50% + ${x}px)`;
            handle.style.top = `calc(50% + ${y}px)`;
        }

        function updatePowerFromGauge(e) {
            const container = document.getElementById('powerContainer');
            const rect = container.getBoundingClientRect();
            const y = rect.bottom - e.clientY;
            const height = rect.height - 20;
            cuePower = Math.max(0, Math.min(100, (y / height) * 100));
            updatePowerGauge();
        }

        function updatePowerGauge() {
            document.getElementById('powerGauge').style.height = `${cuePower}%`;
            document.getElementById('powerLabel').textContent = Math.round(cuePower);
        }

        function handleCanvasClick(e) {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            if (isPlacingBall && !isTableInMotion() && !awaitingLetPlayDecision) {
                if (!canControlCurrentTurn()) {
                    showMessage(getWaitMessage());
                    return;
                }
                if (isValidBallPosition(mx, my)) {
                    whiteBall.x = mx;
                    whiteBall.y = my;
                    isPlacingBall = false;
                    gameStarted = true;
                    updateUI();
                    showMessage(`玩家${currentPlayer + 1}：调整方向和力度后点击"出杆"`);
                    broadcastState('cue-placement');
                } else {
                    showMessage('请将白球放置在蓝色D区内');
                }
                return;
            }

            if (!canControlCurrentTurn() || isTableInMotion() || !gameStarted || awaitingLetPlayDecision) return;

            if (freeBallMode && !freeBallTarget) {
                for (const ball of balls) {
                    if (ball.type !== 'white') {
                        const dx = ball.x - mx;
                        const dy = ball.y - my;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < BALL_RADIUS * 2) {
                            freeBallTarget = ball;
                            showMessage(`已选择自由球：${ball.name}，现在可以击打`);
                            updateUI();
                            broadcastState('free-ball-target');
                            return;
                        }
                    }
                }
                showMessage('请点击任意非白球作为自由球');
                return;
            }

            const dx = mx - whiteBall.x;
            const dy = my - whiteBall.y;
            cueAngle = Math.atan2(dy, dx);
            updateDirectionHandle();
            broadcastState('aim');
        }

        function shoot() {
            if (!canControlCurrentTurn()) {
                showMessage(getWaitMessage());
                return;
            }
            if (isTableInMotion() || !gameStarted || awaitingLetPlayDecision) return;
            if (isPlacingBall) {
                showMessage('请先在D区放置白球');
                return;
            }
            if (freeBallMode && freeBallTarget && freeBallTarget.type === 'white') {
                freeBallTarget = null;
                showMessage('自由球不能指定白球');
                return;
            }

            const speed = getShotSpeed(cuePower);

            shotSnapshot = captureShotSnapshot();
            shotContext = captureShotContext();
            whiteBall.vx = Math.cos(cueAngle) * speed;
            whiteBall.vy = Math.sin(cueAngle) * speed;

            ballMoving = true;
            allBallsStopped = false;
            shotAuthorityPlayer = currentPlayer;
            remoteMotionTargets = null;
            shotStarted = true;
            firstBallHit = null;
            pottedThisShot = [];
            foul = false;

            document.getElementById('shootBtn').disabled = true;
            showMessage('击球中...');
            broadcastState('shot-start');
        }

        function nominateColor(name) {
            if (!canControlCurrentTurn()) {
                showMessage(getWaitMessage());
                return;
            }
            if (isTableInMotion() || awaitingLetPlayDecision || phase !== 'color' || freeBallMode) return;
            const ball = getColorBall(name);
            if (!ball) {
                showMessage(`${name}不在台面上，不能指定`);
                return;
            }
            nominatedColor = ball;
            showMessage(`已指定彩球：${name}`);
            updateUI();
            broadcastState('nominate-color');
        }

        function isInDZone(x, y) {
            if (x > BAULK_LINE_X) return false;
            if (x < BORDER + BALL_RADIUS) return false;
            if (y < BORDER + BALL_RADIUS) return false;
            if (y > TABLE_HEIGHT - BORDER - BALL_RADIUS) return false;

            const dx = x - D_ZONE_CENTER_X;
            const dy = y - TABLE_HEIGHT / 2;
            const dist = Math.sqrt(dx * dx + dy * dy);
            return dist <= D_ZONE_RADIUS - BALL_RADIUS;
        }

        function isValidBallPosition(x, y) {
            if (!isInDZone(x, y)) return false;

            for (let ball of balls) {
                if (ball === whiteBall) continue;
                const dx = x - ball.x;
                const dy = y - ball.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < BALL_RADIUS * 2.5) {
                    return false;
                }
            }
            return true;
        }

        function updateBalls() {
            const previousWhitePosition = whiteBall ? { x: whiteBall.x, y: whiteBall.y } : null;

            balls.forEach(ball => {
                ball.vx *= FRICTION;
                ball.vy *= FRICTION;
                ball.x += ball.vx;
                ball.y += ball.vy;

                let nearHole = false;
                let holeDirection = { x: 0, y: 0 };
                holes.forEach(hole => {
                    const dx = ball.x - hole.x;
                    const dy = ball.y - hole.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < HOLE_RADIUS + BALL_RADIUS * 2) {
                        nearHole = true;
                        if (dist > 0) {
                            holeDirection.x += dx / dist;
                            holeDirection.y += dy / dist;
                        }
                    }
                });

                if (!nearHole) {
                    if (ball.x < BORDER + BALL_RADIUS) {
                        if (holeDirection.x < 0.5) {
                            ball.x = BORDER + BALL_RADIUS;
                            ball.vx *= -CUSHION_RESTITUTION;
                        }
                    }
                    if (ball.x > TABLE_WIDTH - BORDER - BALL_RADIUS) {
                        if (holeDirection.x > -0.5) {
                            ball.x = TABLE_WIDTH - BORDER - BALL_RADIUS;
                            ball.vx *= -CUSHION_RESTITUTION;
                        }
                    }
                    if (ball.y < BORDER + BALL_RADIUS) {
                        if (holeDirection.y < 0.5) {
                            ball.y = BORDER + BALL_RADIUS;
                            ball.vy *= -CUSHION_RESTITUTION;
                        }
                    }
                    if (ball.y > TABLE_HEIGHT - BORDER - BALL_RADIUS) {
                        if (holeDirection.y > -0.5) {
                            ball.y = TABLE_HEIGHT - BORDER - BALL_RADIUS;
                            ball.vy *= -CUSHION_RESTITUTION;
                        }
                    }
                }
            });

            if (previousWhitePosition && whiteBall && balls.includes(whiteBall)) {
                detectFirstBallHitAlongWhitePath(previousWhitePosition.x, previousWhitePosition.y, whiteBall.x, whiteBall.y);
            }

            if (ballMoving) {
                checkHoles();
            }

            if (ballMoving) {
                for (let i = 0; i < balls.length; i++) {
                    for (let j = i + 1; j < balls.length; j++) {
                        ballCollision(balls[i], balls[j]);
                    }
                }
            }

            if (!isAnyBallMoving() && ballMoving) {
                stopAllBalls();
                ballMoving = false;
            }

            if (!ballMoving && !allBallsStopped) {
                allBallsStopped = true;
                updateUI();
                processShotResult();
                broadcastState('shot-result');
                shotAuthorityPlayer = null;
            }
        }

        function isAnyBallMoving() {
            return balls.some(ball => Math.hypot(ball.vx, ball.vy) > STOP_SPEED);
        }

        function isTableInMotion() {
            return ballMoving || !allBallsStopped || isAnyBallMoving();
        }

        function stopAllBalls() {
            balls.forEach(ball => {
                ball.vx = 0;
                ball.vy = 0;
            });
        }

        function checkHoles() {
            const toRemove = [];
            balls.forEach(ball => {
                holes.forEach(hole => {
                    const dx = ball.x - hole.x;
                    const dy = ball.y - hole.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < HOLE_RADIUS + BALL_RADIUS * 0.5) {
                        if (!pottedThisShot.includes(ball)) {
                            pottedThisShot.push(ball);
                            toRemove.push(ball);
                        }
                    }
                });
            });
            balls = balls.filter(b => !toRemove.includes(b));
        }

        function detectFirstBallHitAlongWhitePath(startX, startY, endX, endY) {
            if (!shotStarted || firstBallHit || !whiteBall) return;

            const dx = endX - startX;
            const dy = endY - startY;
            const a = dx * dx + dy * dy;
            if (a <= 0) return;

            const collisionDistance = BALL_RADIUS * 2;
            let earliestBall = null;
            let earliestT = Infinity;

            for (const ball of balls) {
                if (ball === whiteBall) continue;

                const fx = startX - ball.x;
                const fy = startY - ball.y;
                const b = 2 * (fx * dx + fy * dy);
                const c = fx * fx + fy * fy - collisionDistance * collisionDistance;
                const discriminant = b * b - 4 * a * c;
                if (discriminant < 0) continue;

                const sqrtDiscriminant = Math.sqrt(discriminant);
                const t1 = (-b - sqrtDiscriminant) / (2 * a);
                const t2 = (-b + sqrtDiscriminant) / (2 * a);
                const t = t1 >= 0 ? t1 : t2;

                if (t >= 0 && t <= 1 && t < earliestT) {
                    earliestT = t;
                    earliestBall = ball;
                }
            }

            if (earliestBall) {
                firstBallHit = earliestBall;
            }
        }

        function ballCollision(b1, b2) {
            const dx = b2.x - b1.x;
            const dy = b2.y - b1.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < BALL_RADIUS * 2) {
                if (shotStarted && !firstBallHit) {
                    if (b1 === whiteBall) firstBallHit = b2;
                    else if (b2 === whiteBall) firstBallHit = b1;
                }

                const overlap = BALL_RADIUS * 2 - dist;
                const nx = dx / dist;
                const ny = dy / dist;

                b1.x -= nx * overlap / 2;
                b1.y -= ny * overlap / 2;
                b2.x += nx * overlap / 2;
                b2.y += ny * overlap / 2;

                const dvx = b1.vx - b2.vx;
                const dvy = b1.vy - b2.vy;
                const dvn = dvx * nx + dvy * ny;

                if (dvn > 0) {
                    b1.vx -= dvn * nx;
                    b1.vy -= dvn * ny;
                    b2.vx += dvn * nx;
                    b2.vy += dvn * ny;
                }
            }
        }

        function isSpotOccupied(x, y) {
            const tolerance = BALL_DIAMETER - 0.1;
            for (const ball of balls) {
                const dx = ball.x - x;
                const dy = ball.y - y;
                if (Math.sqrt(dx * dx + dy * dy) < tolerance) {
                    return true;
                }
            }
            return false;
        }

        function respotColorBall(ball) {
            if (ball.type !== 'color') return;
            const spotX = ball.defaultX;
            const spotY = ball.defaultY;

            if (!isSpotOccupied(spotX, spotY)) {
                ball.x = spotX;
                ball.y = spotY;
                ball.vx = 0;
                ball.vy = 0;
                balls.push(ball);
                return;
            }

            const colorSpots = COLOR_BALLS_DEF
                .map(cb => ({ x: cb.defaultX, y: cb.defaultY, points: cb.points }))
                .sort((a, b) => b.points - a.points);

            for (const spot of colorSpots) {
                if (!isSpotOccupied(spot.x, spot.y)) {
                    ball.x = spot.x;
                    ball.y = spot.y;
                    ball.vx = 0;
                    ball.vy = 0;
                    balls.push(ball);
                    return;
                }
            }

            const centerY = TABLE_HEIGHT / 2;
            const topCushionX = TABLE_WIDTH - BORDER - BALL_RADIUS;
            for (let x = ball.defaultX; x <= topCushionX; x += 1) {
                if (!isSpotOccupied(x, centerY)) {
                    ball.x = x;
                    ball.y = centerY;
                    ball.vx = 0;
                    ball.vy = 0;
                    balls.push(ball);
                    return;
                }
            }
            for (let x = ball.defaultX; x >= BORDER + BALL_RADIUS; x -= 1) {
                if (!isSpotOccupied(x, centerY)) {
                    ball.x = x;
                    ball.y = centerY;
                    ball.vx = 0;
                    ball.vy = 0;
                    balls.push(ball);
                    return;
                }
            }

            ball.x = ball.defaultX;
            ball.y = TABLE_HEIGHT / 2;
            ball.vx = 0;
            ball.vy = 0;
            balls.push(ball);
        }

        function getNextFinalColor() {
            const colorOrder = ['黄球', '绿球', '棕球', '蓝球', '粉球', '黑球'];
            for (const name of colorOrder) {
                const ball = balls.find(b => b.name === name && b.type === 'color');
                if (ball) return ball;
            }
            return null;
        }

        function processShotResult() {
            const context = shotContext || captureShotContext();
            const pottedWhite = pottedThisShot.find(ball => ball.type === 'white');
            const pottedReds = pottedThisShot.filter(ball => ball.type === 'red');
            const pottedColors = pottedThisShot.filter(ball => ball.type === 'color');
            const pottedFreeBall = context.freeBallTarget && pottedThisShot.includes(context.freeBallTarget);
            let pottedBallsOn = pottedThisShot.filter(ball => context.ballsOn.includes(ball));
            let expectedBall = context.ballsOn[0] || null;
            let blackWasBallOn = context.phase === 'final' && expectedBall && expectedBall.name === '黑球';

            let foulTypes = [];
            let maxFoulPenalty = 0;
            let isMiss = false;

            const addFoul = (reason, ...values) => {
                foulTypes.push(reason);
                const relevantValues = values.filter(value => Number.isFinite(value) && value > 0);
                maxFoulPenalty = Math.max(maxFoulPenalty, 4, context.ballOnValue, ...relevantValues);
            };
            const markMiss = () => {
                if (!blackWasBallOn) isMiss = true;
            };
            const useFirstColorHitAsTarget = () => {
                if (context.phase !== 'color' || context.freeBallMode || context.nominatedColor) return;
                if (!firstBallHit || firstBallHit.type !== 'color') return;

                context.nominatedColor = firstBallHit;
                context.ballsOn = [firstBallHit];
                context.ballOnValue = firstBallHit.points;
                nominatedColor = firstBallHit;
                pottedBallsOn = pottedThisShot.filter(ball => context.ballsOn.includes(ball));
                expectedBall = context.ballsOn[0] || null;
                blackWasBallOn = false;
            };

            useFirstColorHitAsTarget();

            if (!firstBallHit) {
                addFoul('空杆', context.ballOnValue);
                markMiss();
            } else if (context.freeBallMode && context.freeBallTarget) {
                if (firstBallHit !== context.freeBallTarget) {
                    addFoul(`未先击中自由球${context.freeBallTarget.name || ''}`, ballValue(firstBallHit));
                    markMiss();
                }
            } else if (!isBallOn(firstBallHit, context)) {
                addFoul(`未先击中${describeBallsOn(context)}`, ballValue(firstBallHit));
                markMiss();
            }

            if (pottedWhite) {
                addFoul('白球落袋', context.ballOnValue);
            }

            if (context.phase === 'red') {
                pottedColors.forEach(ball => {
                    if (ball !== context.freeBallTarget) {
                        addFoul(`${ball.name}非活球入袋`, ball.points);
                    }
                });
            } else if (context.phase === 'color') {
                pottedReds.forEach(() => addFoul('彩球阶段红球入袋', 1));
                pottedColors.forEach(ball => {
                    const legalColor = ball === context.nominatedColor || ball === context.freeBallTarget;
                    if (!legalColor) addFoul(`${ball.name}非指定彩球入袋`, ball.points);
                });
            } else if (context.phase === 'final') {
                pottedReds.forEach(() => addFoul('清彩阶段红球入袋', 1));
                pottedColors.forEach(ball => {
                    const legalColor = ball === expectedBall || ball === context.freeBallTarget;
                    if (!legalColor) addFoul(`${ball.name}未按顺序入袋`, ball.points);
                });
            }

            if (foulTypes.length > 0) {
                handleFoul(foulTypes, maxFoulPenalty, {
                    isMiss,
                    pottedWhite: !!pottedWhite,
                    pottedColors,
                    blackWasBallOn
                });
                return;
            }

            let validShot = false;
            let shouldEndTurn = false;
            let scored = 0;

            if (context.freeBallMode && context.freeBallTarget) {
                if (context.phase === 'red') {
                    scored = pottedReds.length + (pottedFreeBall ? 1 : 0);
                    if (pottedFreeBall && context.freeBallTarget.type === 'color') {
                        respotColorBall(context.freeBallTarget);
                    }
                    if (scored > 0) {
                        validShot = true;
                        phase = 'color';
                        nominatedColor = null;
                    } else {
                        shouldEndTurn = true;
                    }
                } else if (context.phase === 'color') {
                    if (pottedFreeBall || pottedBallsOn.length > 0) {
                        scored = context.ballOnValue;
                        validShot = true;
                        if (pottedFreeBall && context.freeBallTarget.type === 'color') {
                            respotColorBall(context.freeBallTarget);
                        }
                        pottedBallsOn.forEach(ball => {
                            if (ball.type === 'color') respotColorBall(ball);
                        });
                        setPhaseForNewVisit();
                    } else {
                        shouldEndTurn = true;
                    }
                } else if (context.phase === 'final') {
                    if (pottedFreeBall || pottedBallsOn.length > 0) {
                        scored = context.ballOnValue;
                        validShot = true;
                        if (pottedFreeBall && context.freeBallTarget.type === 'color') {
                            respotColorBall(context.freeBallTarget);
                        }
                        if (!getNextFinalColor()) {
                            scores[currentPlayer] += scored;
                            currentBreak += scored;
                            clearFreeBall();
                            endGame();
                            resetShotTracking();
                            return;
                        }
                    } else {
                        shouldEndTurn = true;
                    }
                }
                clearFreeBall();
            } else if (context.phase === 'red') {
                if (pottedReds.length > 0) {
                    scored = pottedReds.length;
                    validShot = true;
                    phase = 'color';
                    nominatedColor = null;
                } else {
                    shouldEndTurn = true;
                }
            } else if (context.phase === 'color') {
                if (pottedBallsOn.length > 0) {
                    const color = pottedBallsOn[0];
                    scored = color.points;
                    validShot = true;
                    respotColorBall(color);
                    setPhaseForNewVisit();
                } else {
                    shouldEndTurn = true;
                }
            } else if (context.phase === 'final') {
                if (pottedBallsOn.length > 0) {
                    const color = pottedBallsOn[0];
                    scored = color.points;
                    validShot = true;
                    if (!getNextFinalColor()) {
                        scores[currentPlayer] += scored;
                        currentBreak += scored;
                        endGame();
                        resetShotTracking();
                        return;
                    }
                } else {
                    shouldEndTurn = true;
                }
            }

            if (context.freeBallMode && !context.freeBallTarget) {
                clearFreeBall();
            }

            if (context.freeBallMode && context.freeBallTarget && !pottedFreeBall &&
                balls.includes(context.freeBallTarget) && freeBallCreatesIllegalSnooker(context.freeBallTarget)) {
                handleFoul(['利用自由球做成障碍球'], Math.max(4, context.ballOnValue), {
                    isMiss: false,
                    pottedWhite: false,
                    pottedColors: [],
                    blackWasBallOn: false
                });
                return;
            }

            if (validShot && scored > 0) {
                scores[currentPlayer] += scored;
                currentBreak += scored;
                showMessage(`+${scored}分，连续得分：${currentBreak}`);
                updateUI();
            }

            if (shouldEndTurn || !validShot) {
                endTurn();
            }

            resetShotTracking();
        }

        function isBallOn(ball, context = null) {
            const ctx = context || captureShotContext();
            if (!ball) return false;
            if (ctx.phase === 'red') return ball.type === 'red';
            return ctx.ballsOn.includes(ball);
        }

        function clearFreeBall() {
            freeBallMode = false;
            freeBallTarget = null;
        }

        function setPhaseForNewVisit() {
            nominatedColor = null;
            const remainingRed = balls.filter(ball => ball.type === 'red').length;
            if (remainingRed > 0) {
                phase = 'red';
                return;
            }
            phase = getNextFinalColor() ? 'final' : 'red';
        }

        function showLetPlayPanel(canRestore) {
            awaitingLetPlayDecision = true;
            syncLetPlayPanel(canRestore);
        }

        function hideLetPlayPanel() {
            awaitingLetPlayDecision = false;
            foulDecisionPlayer = null;
            syncLetPlayPanel();
        }

        function syncLetPlayPanel(canRestore = lastFoulWasMiss && !!shotSnapshot) {
            const canDecide = canResolveFoulDecision();
            const showPanel = awaitingLetPlayDecision && canDecide;
            const title = document.getElementById('letPlayTitle');
            const letPlayYes = document.getElementById('letPlayYes');
            const letPlayNo = document.getElementById('letPlayNo');
            const letPlayRestore = document.getElementById('letPlayRestore');

            title.textContent = freeBallMode
                ? '你已获得自由球，请决定自己击球或让杆'
                : '未获得自由球，请决定自己击球或让杆';
            letPlayYes.textContent = freeBallMode ? '让犯规方继续（自由球失效）' : '让犯规方继续击球';
            letPlayNo.textContent = freeBallMode ? '自己击球（使用自由球）' : '自己击球';
            letPlayYes.style.display = showPanel ? 'inline-block' : 'none';
            letPlayNo.style.display = showPanel ? 'inline-block' : 'none';
            letPlayRestore.style.display = showPanel && canRestore ? 'inline-block' : 'none';
            document.getElementById('letPlayPanel').style.display = showPanel ? 'block' : 'none';
        }

        function handleFoul(foulTypes, penalty, options = {}) {
            const otherPlayer = 1 - currentPlayer;
            foul = true;
            foulType = foulTypes.join('+');
            lastFoulPenalty = Math.max(4, penalty || 4);
            lastFoulWasMiss = !!options.isMiss;
            foulDecisionPlayer = otherPlayer;
            currentBreak = 0;

            scores[otherPlayer] += lastFoulPenalty;
            uniqueBalls(options.pottedColors || []).forEach(ball => respotColorBall(ball));
            if (options.pottedWhite) resetWhiteBall();

            setPhaseForNewVisit();
            clearFreeBall();

            pottedThisShot = [];
            shotStarted = false;
            firstBallHit = null;
            shotContext = null;

            if (options.blackWasBallOn) {
                endGame();
                return;
            }

            grantFreeBallAfterFoul(otherPlayer);

            showLetPlayPanel(lastFoulWasMiss && !!shotSnapshot);
            updateUI();
            const freeBallNotice = freeBallMode ? '获得自由球' : '未获得自由球';
            showMessage(`系统裁判判罚：玩家${currentPlayer + 1}犯规（${foulType}）罚${lastFoulPenalty}分！玩家${otherPlayer + 1}${freeBallNotice}，请选择自己击球、让杆或还原重打`);
        }

        function uniqueBalls(list) {
            return [...new Set((list || []).filter(Boolean))];
        }

        function getBallsOn() {
            const result = [];
            if (phase === 'red') {
                for (const b of balls) {
                    if (b.type === 'red') result.push(b);
                }
            } else if (phase === 'color') {
                if (nominatedColor) result.push(nominatedColor);
            } else if (phase === 'final') {
                const next = getNextFinalColor();
                if (next) result.push(next);
            }
            return result;
        }

        function isBallSnookered(targetBall) {
            const dx = targetBall.x - whiteBall.x;
            const dy = targetBall.y - whiteBall.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 0.001) return false;

            const px = -dy / dist;
            const py = dx / dist;
            const leftPoint = {
                x: targetBall.x + px * BALL_RADIUS,
                y: targetBall.y + py * BALL_RADIUS
            };
            const rightPoint = {
                x: targetBall.x - px * BALL_RADIUS,
                y: targetBall.y - py * BALL_RADIUS
            };

            return isPathBlockedToTargetEdge(leftPoint, targetBall) &&
                isPathBlockedToTargetEdge(rightPoint, targetBall);
        }

        function isPathBlockedToTargetEdge(edgePoint, targetBall) {
            const dx = edgePoint.x - whiteBall.x;
            const dy = edgePoint.y - whiteBall.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 0.001) return false;

            for (const ball of balls) {
                if (ball === whiteBall || ball === targetBall) continue;
                if (isBallOn(ball)) continue;
                const bx = ball.x - whiteBall.x;
                const by = ball.y - whiteBall.y;
                const dot = bx * dx + by * dy;
                if (dot <= 0) continue;
                const projLen = dot / dist;
                if (projLen >= dist) continue;
                const projX = whiteBall.x + (dx / dist) * projLen;
                const projY = whiteBall.y + (dy / dist) * projLen;
                const distToProj = Math.sqrt((ball.x - projX) ** 2 + (ball.y - projY) ** 2);
                if (distToProj < BALL_DIAMETER) {
                    return true;
                }
            }
            return false;
        }

        function freeBallCreatesIllegalSnooker(freeBall) {
            if (isPinkBlackOnlyException()) return false;
            const ballsOn = getBallsOn();
            if (ballsOn.length === 0) return false;
            return ballsOn.every(target => isTargetBlockedBySpecificBall(target, freeBall));
        }

        function isPinkBlackOnlyException() {
            const reds = balls.filter(ball => ball.type === 'red');
            const colors = balls.filter(ball => ball.type === 'color');
            return reds.length === 0 &&
                colors.length <= 2 &&
                colors.every(ball => ball.name === '粉球' || ball.name === '黑球');
        }

        function isTargetBlockedBySpecificBall(targetBall, blocker) {
            if (!targetBall || !blocker || targetBall === blocker) return false;
            const dx = targetBall.x - whiteBall.x;
            const dy = targetBall.y - whiteBall.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 0.001) return false;
            const px = -dy / dist;
            const py = dx / dist;
            const leftPoint = {
                x: targetBall.x + px * BALL_RADIUS,
                y: targetBall.y + py * BALL_RADIUS
            };
            const rightPoint = {
                x: targetBall.x - px * BALL_RADIUS,
                y: targetBall.y - py * BALL_RADIUS
            };
            return doesSpecificBallBlockPath(leftPoint, blocker) &&
                doesSpecificBallBlockPath(rightPoint, blocker);
        }

        function doesSpecificBallBlockPath(edgePoint, blocker) {
            const dx = edgePoint.x - whiteBall.x;
            const dy = edgePoint.y - whiteBall.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 0.001) return false;
            const bx = blocker.x - whiteBall.x;
            const by = blocker.y - whiteBall.y;
            const dot = bx * dx + by * dy;
            if (dot <= 0) return false;
            const projLen = dot / dist;
            if (projLen >= dist) return false;
            const projX = whiteBall.x + (dx / dist) * projLen;
            const projY = whiteBall.y + (dy / dist) * projLen;
            const distToProj = Math.sqrt((blocker.x - projX) ** 2 + (blocker.y - projY) ** 2);
            return distToProj < BALL_DIAMETER;
        }

        function grantFreeBallAfterFoul(player) {
            freeBallMode = false;
            freeBallTarget = null;

            const ballsOn = getBallsOn();
            if (ballsOn.length === 0) return;

            for (const ballOn of ballsOn) {
                if (!isBallSnookered(ballOn)) {
                    return;
                }
            }

            freeBallMode = true;
            showMessage(`玩家${player + 1}获得自由球！可点击任意非白球选择自由球，也可点击"不使用自由球"`);
        }

        function resetWhiteBall() {
            const index = balls.indexOf(whiteBall);
            if (index === -1) {
                whiteBall.x = D_ZONE_CENTER_X;
                whiteBall.y = TABLE_HEIGHT / 2;
                whiteBall.vx = 0;
                whiteBall.vy = 0;
                balls.push(whiteBall);
            } else {
                whiteBall.x = D_ZONE_CENTER_X;
                whiteBall.y = TABLE_HEIGHT / 2;
                whiteBall.vx = 0;
                whiteBall.vy = 0;
            }
            isPlacingBall = true;
        }

        function endGame() {
            clearFreeBall();
            nominatedColor = null;
            awaitingLetPlayDecision = false;
            hideLetPlayPanel();
            const scoreDiff = Math.abs(scores[0] - scores[1]);
            if (scoreDiff === 0) {
                const blackBall = balls.find(b => b.name === '黑球');
                if (blackBall) {
                    const spotX = COLOR_BALLS_DEF.find(cb => cb.name === '黑球').defaultX;
                    const spotY = COLOR_BALLS_DEF.find(cb => cb.name === '黑球').defaultY;
                    if (isSpotOccupied(spotX, spotY)) {
                        blackBall.x = spotX;
                        blackBall.y = TABLE_HEIGHT / 2;
                    } else {
                        blackBall.x = spotX;
                        blackBall.y = spotY;
                    }
                    blackBall.vx = 0;
                    blackBall.vy = 0;
                } else {
                    const cb = COLOR_BALLS_DEF.find(cb => cb.name === '黑球');
                    const newBlack = createBall(cb.defaultX, cb.defaultY, cb.color, 'color', cb.points);
                    newBlack.name = cb.name;
                    newBlack.defaultX = cb.defaultX;
                    newBlack.defaultY = cb.defaultY;
                    balls.push(newBlack);
                }
                currentPlayer = Math.random() < 0.5 ? 0 : 1;
                currentBreak = 0;
                phase = 'final';
                showMessage(`平分！重置黑球，玩家${currentPlayer + 1}掷币获胜先开球（自手中球）`);
                resetWhiteBall();
                updateUI();
            } else {
                const winner = scores[0] > scores[1] ? 1 : 2;
                const winScore = Math.max(scores[0], scores[1]);
                const loseScore = Math.min(scores[0], scores[1]);
                showMessage(`比赛结束！玩家${winner}获胜！比分 ${winScore}:${loseScore}`);
                gameStarted = false;
                ballMoving = false;
                document.getElementById('shootBtn').disabled = true;
                updateUI();
            }
        }

        function endTurn(options = {}) {
            if (currentBreak > 0) {
                showMessage(`玩家${currentPlayer + 1}连续得分：${currentBreak}分`);
            }

            currentPlayer = 1 - currentPlayer;
            currentBreak = 0;
            redBallPottedThisVisit = 0;
            colorBallPottedThisVisit = null;
            nominatedColor = null;
            if (!options.preserveFreeBall) {
                clearFreeBall();
            }

            const remainingRed = balls.filter(b => b.type === 'red').length;
            if (remainingRed > 0) {
                phase = 'red';
            } else {
                const nextColor = getNextFinalColor();
                if (nextColor) {
                    phase = 'final';
                } else {
                    endGame();
                    return;
                }
            }

            updateUI();

            if (gameStarted) {
                setTimeout(() => {
                    showMessage(`玩家${currentPlayer + 1}的回合`);
                }, 800);
            }
        }

        function resetGame() {
            if (!canResetOnlineGame()) {
                showMessage('只有玩家1可以重置联机房间');
                return;
            }
            initGame();
            showMessage('游戏重置！');
            updateUI();
            broadcastState('reset');
        }

        function updateUI() {
            document.getElementById('score1').textContent = scores[0];
            document.getElementById('score2').textContent = scores[1];
            document.getElementById('break1').textContent = currentPlayer === 0 ? currentBreak : 0;
            document.getElementById('break2').textContent = currentPlayer === 1 ? currentBreak : 0;

            const remainingRed = balls.filter(b => b.type === 'red').length;
            document.getElementById('remainingRed').textContent = remainingRed;

            let remainedScore;
            if (remainingRed > 0) {
                remainedScore = 8 * remainingRed + 27;
            } else {
                remainedScore = 0;
                for (const ball of balls) {
                    if (ball.type === 'color') {
                        remainedScore += ball.points;
                    }
                }
            }
            document.getElementById('remainedScore').textContent = remainedScore;

            let target = '';
            let phaseText = '';
            if (!gameStarted && scores[0] !== scores[1] && scores[0] + scores[1] > 0) {
                target = '已结束';
                phaseText = '结束';
            } else if (freeBallMode) {
                target = freeBallTarget ? `自由球: ${freeBallTarget.name}` : '选择自由球';
                phaseText = '自由球';
            } else if (phase === 'red') {
                target = '红球';
                phaseText = '红球';
            } else if (phase === 'color') {
                target = nominatedColor ? nominatedColor.name : '彩球';
                phaseText = '彩球';
            } else if (phase === 'final') {
                const nextColor = getNextFinalColor();
                target = nextColor ? nextColor.name : '结束';
                phaseText = '最终';
            }
            document.getElementById('currentTarget').textContent = target;
            document.getElementById('phase').textContent = phaseText;

            // 更新活跃玩家高亮
            const player1Score = document.querySelector('.player-score:nth-child(1)');
            const player2Score = document.querySelector('.player-score:nth-child(2)');
            
            if (currentPlayer === 0 && gameStarted) {
                player1Score.classList.add('active');
                player2Score.classList.remove('active');
            } else if (currentPlayer === 1 && gameStarted) {
                player1Score.classList.remove('active');
                player2Score.classList.add('active');
            } else {
                player1Score.classList.remove('active');
                player2Score.classList.remove('active');
            }

            document.getElementById('freeBallCancel').style.display = (freeBallMode && freeBallTarget) ? 'inline-block' : 'none';
            document.getElementById('freeBallSkip').style.display = freeBallMode ? 'inline-block' : 'none';

            updateNominationButtons();
            document.getElementById('shootBtn').disabled = !canControlCurrentTurn() || isTableInMotion() || awaitingLetPlayDecision || !gameStarted || isPlacingBall;
            updateOnlineTurnStatus();
        }

        function updateNominationButtons() {
            const section = document.getElementById('nominationSection');
            if (section) section.style.display = 'none';
        }

        function cancelFreeBall() {
            if (!canControlCurrentTurn()) {
                showMessage(getWaitMessage());
                return;
            }
            freeBallTarget = null;
            showMessage('请重新选择自由球');
            updateUI();
            broadcastState('cancel-free-ball');
        }

        function skipFreeBall() {
            if (!canControlCurrentTurn()) {
                showMessage(getWaitMessage());
                return;
            }
            clearFreeBall();
            showMessage('已放弃使用自由球，正常进行比赛');
            updateUI();
            broadcastState('skip-free-ball');
        }

        function letPlay(decide) {
            if (!canResolveFoulDecision()) {
                showMessage('等待非犯规方选择');
                return;
            }
            const otherPlayer = 1 - currentPlayer;
            hideLetPlayPanel();

            if (decide) {
                showMessage(`玩家${otherPlayer + 1}选择让杆，玩家${currentPlayer + 1}继续击球`);
                if (whiteBall) {
                    whiteBall.vx = 0;
                    whiteBall.vy = 0;
                }
                clearFreeBall();
                setPhaseForNewVisit();
                resetShotTracking();
                updateUI();
            } else {
                resetShotTracking();
                endTurn({ preserveFreeBall: true });
            }
            broadcastState('let-play');
        }

        function letPlayFromOriginal() {
            if (!canResolveFoulDecision()) {
                showMessage('等待非犯规方选择');
                return;
            }
            if (!lastFoulWasMiss || !shotSnapshot) {
                letPlay(true);
                return;
            }
            const otherPlayer = 1 - currentPlayer;
            hideLetPlayPanel();
            restoreShotSnapshot(shotSnapshot);
            clearFreeBall();
            resetShotTracking();
            showMessage(`玩家${otherPlayer + 1}要求还原重打，玩家${currentPlayer + 1}从原位置继续`);
            updateUI();
            broadcastState('restore-miss');
        }

        function showMessage(msg) {
            lastMessage = msg || '';
            document.getElementById('message').textContent = lastMessage;
        }

        function drawTable() {
            ctx.fillStyle = '#5a3a22';
            ctx.fillRect(0, 0, TABLE_WIDTH, TABLE_HEIGHT);

            ctx.fillStyle = '#004400';
            ctx.fillRect(BORDER, BORDER, TABLE_WIDTH - BORDER * 2, TABLE_HEIGHT - BORDER * 2);

            ctx.strokeStyle = '#aaddaa';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(BAULK_LINE_X, BORDER);
            ctx.lineTo(BAULK_LINE_X, TABLE_HEIGHT - BORDER);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(D_ZONE_CENTER_X, D_ZONE_CENTER_Y, D_ZONE_RADIUS, Math.PI / 2, -Math.PI / 2);
            ctx.stroke();

            if (isPlacingBall) {
                ctx.fillStyle = 'rgba(100,100,255,0.3)';
                ctx.beginPath();
                ctx.arc(D_ZONE_CENTER_X, D_ZONE_CENTER_Y, D_ZONE_RADIUS, Math.PI / 2, -Math.PI / 2);
                ctx.fill();
            }

            const pocketRadius = HOLE_RADIUS;

            ctx.fillStyle = '#1a1a1a';

            ctx.beginPath();
            ctx.arc(BORDER, BORDER, pocketRadius, Math.PI * 0.5, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(BORDER + TABLE_INNER_LENGTH, BORDER, pocketRadius, Math.PI, Math.PI * 2.5);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(BORDER, BORDER + TABLE_INNER_WIDTH, pocketRadius, 0, Math.PI * 1.5);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(BORDER + TABLE_INNER_LENGTH, BORDER + TABLE_INNER_WIDTH, pocketRadius, -Math.PI * 0.5, Math.PI);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(BORDER + TABLE_INNER_LENGTH / 2, BORDER, pocketRadius, Math.PI, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(BORDER + TABLE_INNER_LENGTH / 2, BORDER + TABLE_INNER_WIDTH, pocketRadius, 0, Math.PI);
            ctx.fill();

            ctx.strokeStyle = '#5a3a22';
            ctx.lineWidth = 4;
        }

        function drawGuideLines() {
            if (guideMode === 'off' || isTableInMotion() || !whiteBall || !gameStarted ||
                (ONLINE_MODE && onlineConnected && !canControlCurrentTurn())) {
                return;
            }

            const speed = Math.max(getShotSpeed(cuePower), 0.5);

            const whiteVx = Math.cos(cueAngle) * speed;
            const whiteVy = Math.sin(cueAngle) * speed;

            const maxLength = guideMode === 'long' ? 1500 : 350;

            ctx.lineWidth = 3;
            ctx.setLineDash([6, 3]);

            let closestBall = null;
            let closestCollision = null;
            let minDist = Infinity;

            for (const ball of balls) {
                if (ball.type === 'white') continue;

                const collision = predictGuideCollision(
                    whiteBall.x, whiteBall.y,
                    whiteVx, whiteVy,
                    ball.x, ball.y
                );
                if (collision && collision.distance < minDist) {
                    minDist = collision.distance;
                    closestBall = ball;
                    closestCollision = collision;
                }
            }

            let endX, endY;
            if (closestCollision) {
                endX = closestCollision.x;
                endY = closestCollision.y;
            } else {
                endX = whiteBall.x + whiteVx * (maxLength / speed);
                endY = whiteBall.y + whiteVy * (maxLength / speed);
            }

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.beginPath();
            ctx.moveTo(whiteBall.x, whiteBall.y);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            if (closestBall && closestCollision) {
                const { x: hitX, y: hitY, nx, ny } = closestCollision;
                const dvn = whiteVx * nx + whiteVy * ny;

                const whiteAfterVx = whiteVx - dvn * nx;
                const whiteAfterVy = whiteVy - dvn * ny;
                const ballVx = dvn * nx;
                const ballVy = dvn * ny;
                const previewScale = maxLength / speed * 0.5;

                ctx.strokeStyle = 'rgba(200, 200, 255, 0.7)';
                ctx.beginPath();
                ctx.moveTo(hitX, hitY);
                ctx.lineTo(hitX + whiteAfterVx * previewScale, hitY + whiteAfterVy * previewScale);
                ctx.stroke();

                ctx.strokeStyle = 'rgba(255, 255, 0, 0.9)';
                ctx.beginPath();
                ctx.moveTo(closestBall.x, closestBall.y);
                ctx.lineTo(closestBall.x + ballVx * previewScale, closestBall.y + ballVy * previewScale);
                ctx.stroke();

                ctx.fillStyle = 'rgba(255, 255, 0, 0.9)';
                ctx.beginPath();
                ctx.arc(hitX, hitY, 5, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.setLineDash([]);
        }

        function predictGuideCollision(startX, startY, vx, vy, targetX, targetY) {
            const speed = Math.hypot(vx, vy);
            if (speed < 0.01) return null;

            const ux = vx / speed;
            const uy = vy / speed;
            const relX = targetX - startX;
            const relY = targetY - startY;
            const projection = relX * ux + relY * uy;
            if (projection <= 0) return null;

            const collisionDistance = BALL_RADIUS * 2;
            const perpendicularSq = relX * relX + relY * relY - projection * projection;
            const collisionDistanceSq = collisionDistance * collisionDistance;
            if (perpendicularSq >= collisionDistanceSq) return null;

            const distance = projection - Math.sqrt(collisionDistanceSq - perpendicularSq);
            if (distance < 0) return null;

            const x = startX + ux * distance;
            const y = startY + uy * distance;
            const normalLength = Math.hypot(targetX - x, targetY - y);
            if (normalLength < 0.001) return null;

            return {
                distance,
                x,
                y,
                nx: (targetX - x) / normalLength,
                ny: (targetY - y) / normalLength
            };
        }

        function predictCollision(x1, y1, vx1, vy1, x2, y2, vx2, vy2) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const dvx = vx1 - vx2;
            const dvy = vy1 - vy2;
            const a = dvx * dvx + dvy * dvy;

            if (a === 0) return null;

            const b = 2 * (dx * dvx + dy * dvy);
            const c = dx * dx + dy * dy - (BALL_RADIUS * 2) * (BALL_RADIUS * 2);
            const discriminant = b * b - 4 * a * c;

            if (discriminant < 0) return null;

            const t = (-b - Math.sqrt(discriminant)) / (2 * a);

            if (t < 0) return null;

            const hitX = x1 + vx1 * t;
            const hitY = y1 + vy1 * t;

            const nx = (x2 - hitX) / (BALL_RADIUS * 2);
            const ny = (y2 - hitY) / (BALL_RADIUS * 2);

            const dvn = vx1 * nx + vy1 * ny;

            return {
                distance: t * Math.sqrt(vx1 * vx1 + vy1 * vy1),
                vx1: vx1 - dvn * nx,
                vy1: vy1 - dvn * ny,
                vx2: dvn * nx,
                vy2: dvn * ny
            };
        }

        function predictWallCollision(x, y, vx, vy) {
            const steps = 1000;
            let closestDist = Infinity;
            let hitPoint = null;

            for (let i = 1; i <= steps; i++) {
                const t = i / steps;
                const px = x + vx * t;
                const py = y + vy * t;

                if (px < BORDER + BALL_RADIUS || px > TABLE_WIDTH - BORDER - BALL_RADIUS ||
                    py < BORDER + BALL_RADIUS || py > TABLE_HEIGHT - BORDER - BALL_RADIUS) {
                    return { x: px, y: py, distance: t * Math.sqrt(vx * vx + vy * vy) };
                }
            }

            return null;
        }

        function drawBalls() {
            balls.forEach(ball => {
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI * 2);

                if (ball === freeBallTarget) {
                    ctx.fillStyle = 'rgba(255, 255, 0, 0.3)';
                    ctx.fill();
                    ctx.strokeStyle = '#FF0';
                    ctx.lineWidth = 4;
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.arc(ball.x, ball.y, BALL_RADIUS + 5, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255, 255, 0, 0.5)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                } else if (ball.type === 'color' && ball.color === '#111111') {
                    ctx.fillStyle = '#222222';
                    ctx.fill();
                    ctx.strokeStyle = '#555555';
                    ctx.lineWidth = 3;
                    ctx.stroke();
                } else {
                    ctx.fillStyle = ball.color;
                    ctx.fill();
                    ctx.strokeStyle = '#222';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                if (ball.type === 'white') {
                    ctx.beginPath();
                    ctx.arc(ball.x - 3, ball.y - 3, BALL_RADIUS * 0.35, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.fill();
                }
            });
        }

        function drawCue() {
            if (isTableInMotion() || !gameStarted || isPlacingBall) return;

            const cueLength = 150;
            const startX = whiteBall.x - Math.cos(cueAngle) * (BALL_RADIUS + 10);
            const startY = whiteBall.y - Math.sin(cueAngle) * (BALL_RADIUS + 10);
            const endX = startX - Math.cos(cueAngle) * cueLength;
            const endY = startY - Math.sin(cueAngle) * cueLength;

            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = '#bb8855';
            ctx.lineWidth = 6;
            ctx.stroke();

            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        function drawPlacementHint() {
            if (!isPlacingBall) return;

            const isValid = isValidBallPosition(whiteBall.x, whiteBall.y);
            ctx.beginPath();
            ctx.arc(whiteBall.x, whiteBall.y, BALL_RADIUS + 5, 0, Math.PI * 2);
            ctx.strokeStyle = isValid ? 'rgba(0,255,0,0.9)' : 'rgba(255,0,0,0.9)';
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        function gameLoop() {
            smoothRemoteMotion();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawTable();
            drawPlacementHint();
            drawBalls();
            drawCue();
            drawGuideLines();

            if (isTableInMotion() && shouldSimulateTable()) {
                updateBalls();
                maybeBroadcastMovingState();
            }

            requestAnimationFrame(gameLoop);
        }

        function drawDirectionTicks() {
            const tickCanvas = document.getElementById('directionTicks');
            if (!tickCanvas) return;
            const tctx = tickCanvas.getContext('2d');
            const cx = 100, cy = 100;
            tctx.clearRect(0, 0, 200, 200);

            for (let i = 0; i < 360; i += 15) {
                const rad = i * Math.PI / 180;
                const isMain = i % 45 === 0;
                const innerR = isMain ? 78 : 84;
                const outerR = 92;
                const x1 = cx + Math.cos(rad) * innerR;
                const y1 = cy + Math.sin(rad) * innerR;
                const x2 = cx + Math.cos(rad) * outerR;
                const y2 = cy + Math.sin(rad) * outerR;

                tctx.beginPath();
                tctx.moveTo(x1, y1);
                tctx.lineTo(x2, y2);
                tctx.strokeStyle = isMain ? '#888' : '#555';
                tctx.lineWidth = isMain ? 1.5 : 0.8;
                tctx.stroke();
            }
        }
    </script>
