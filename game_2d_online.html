<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>斯诺克台球 - 联机对战</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 22px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(12, 12, 12, 0.92);
            position: sticky;
            top: 0;
            z-index: 20;
        }
        .nav-title {
            font-size: 18px;
            font-weight: 700;
            color: #e6d2ad;
        }
        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .nav-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 34px;
            padding: 0 14px;
            border-radius: 6px;
            border: 1px solid rgba(212, 165, 116, 0.42);
            color: #e8d8bc;
            text-decoration: none;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.04);
        }
        .nav-link.active,
        .nav-link:hover {
            background: rgba(212, 165, 116, 0.18);
            border-color: rgba(212, 165, 116, 0.78);
            color: #fff;
        }
        .app-shell {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            justify-content: center;
            gap: 30px;
            padding: 20px;
        }
        canvas {
            border: 4px solid #5a3a22;
            background: #111;
            cursor: crosshair;
            display: block;
        }
        .panel {
            padding: 15px;
            background: linear-gradient(180deg, rgba(50, 30, 15, 0.8), rgba(30, 20, 10, 0.9));
            border-radius: 15px;
            border: 2px solid #5a3a22;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            height: 100%; /* 填充父容器高度 */
            display: flex;
            flex-direction: column;
        }
        .info {
            display: flex;
            gap: 15px;
            font-size: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tips {
            margin-top: 10px;
            font-size: 12px;
            color: #aaa;
        }
        button {
            margin: 8px;
            padding: 12px 32px;
            font-size: 16px;
            cursor: pointer;
            background: linear-gradient(180deg, #6b4423, #4a2f15);
            color: white;
            border: 2px solid #8a5a33;
            border-radius: 8px;
            font-weight: 500;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }
        button:hover {
            background: linear-gradient(180deg, #7a5a33, #5a3f25);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
            transform: translateY(-1px);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }
        .message {
            margin-top: 10px;
            font-size: 16px;
            color: #ff0;
            min-height: 22px;
        }

        /* 纵向力度仪表盘 */
        .power-gauge-container {
            width: 45px;
            height: 240px;
            background: linear-gradient(180deg, #2a2a2a, #1a1a1a);
            border-radius: 12px;
            padding: 5px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            border: 2px solid #444;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
            margin: 0 auto;
        }
        .power-gauge {
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #00ff66, #66ff00, #ffff00, #ff9900, #ff3300);
            border-radius: 6px;
            transition: none;
            box-shadow: 0 0 10px rgba(255, 255, 0, 0.2);
        }
        .power-label {
            text-align: center;
            margin-top: 12px;
            font-size: 16px;
            color: #d4a574;
            font-weight: 500;
        }
        .gauge-marker {
            position: absolute;
            left: 0;
            width: 100%;
            text-align: right;
            padding-right: 8px;
            font-size: 11px;
            color: #888;
            font-weight: 500;
        }

        /* 圆形方向控制 */
        .direction-control {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            position: relative;
            margin: 15px auto;
            cursor: crosshair;
            border: 3px solid #555;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5), inset 0 2px 10px rgba(255, 255, 255, 0.05);
        }
        .direction-control::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 180px;
            height: 180px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px dashed #444;
        }
        .direction-control::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 140px;
            height: 140px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px dashed #333;
        }
        .direction-handle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #66ccff, #0088cc);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.6);
        }
        .direction-center {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #fff, #ccc);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .direction-label {
            text-align: center;
            font-size: 13px;
            margin-top: 10px;
            color: #aaa;
        }
        .left-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .right-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 380px; /* 引导线移出后进一步压缩 */
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #d4a574;
            text-align: center;
            margin-bottom: 10px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 10px 12px;
            text-align: center;
            transition: all 0.2s ease;
        }
        .stat-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .stat-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #e0d0b0;
        }
        .stat-value.highlight {
            color: #ffcc00;
        }
        .stat-value.danger {
            color: #ff6644;
        }

        .btn-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            margin: 2px;
            background: linear-gradient(180deg, #4a4a4a, #2a2a2a);
            border: 1px solid #555;
            color: #ccc;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-sm:hover {
            background: linear-gradient(180deg, #5a5a5a, #3a3a3a);
            border-color: #777;
            color: #fff;
        }
        .btn-sm.active {
            background: linear-gradient(180deg, #6b4423, #4a2f15);
            border-color: #8a5a33;
            color: #fff;
            box-shadow: 0 0 8px rgba(180, 120, 60, 0.4);
        }
        .btn-action {
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            margin: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-shoot {
            background: linear-gradient(180deg, #c0392b, #8b0000);
            border: 2px solid #e74c3c;
            color: #fff;
            box-shadow: 0 4px 12px rgba(200, 0, 0, 0.3);
        }
        .btn-shoot:hover {
            background: linear-gradient(180deg, #e74c3c, #a00000);
            box-shadow: 0 6px 16px rgba(220, 0, 0, 0.4);
            transform: translateY(-1px);
        }
        .btn-reset {
            background: linear-gradient(180deg, #4a4a4a, #2a2a2a);
            border: 2px solid #666;
            color: #ccc;
        }
        .btn-reset:hover {
            background: linear-gradient(180deg, #5a5a5a, #3a3a3a);
            border-color: #888;
            color: #fff;
            transform: translateY(-1px);
        }

        .divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            margin: 12px 0;
        }

        .let-play-banner {
            background: linear-gradient(135deg, rgba(200, 150, 0, 0.15), rgba(200, 100, 0, 0.1));
            border: 1px solid rgba(200, 150, 0, 0.3);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }
        .message {
            margin-top: 8px;
            font-size: 14px;
            color: #ff0;
            min-height: 20px;
            flex-shrink: 0;
        }
        .let-play-banner {
            background: linear-gradient(135deg, rgba(200, 150, 0, 0.15), rgba(200, 100, 0, 0.1));
            border: 1px solid rgba(200, 150, 0, 0.3);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            position: fixed;
            right: 24px;
            bottom: 24px;
            z-index: 1000;
            width: min(420px, calc(100vw - 48px));
            background-color: rgba(36, 24, 8, 0.96);
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.5);
        }
        .let-play-banner .title {
            font-size: 13px;
            font-weight: 600;
            color: #ffcc00;
            margin-bottom: 6px;
        }

        /* 新布局样式 */
        .info-layout {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            flex: 1;
            min-height: 0;
        }
        .left-block {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 110px;
        }
        .guide-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 8px;
            text-align: center;
        }
        .scoreboard-slim {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 110px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 10px;
        }
        .player-score {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }
        .player-score.active {
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }
        .player-label {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .score-value {
            font-size: 22px;
            font-weight: 700;
            color: #e0d0b0;
            line-height: 1.2;
        }
        .break-value {
            font-size: 10px;
            color: #888;
            margin-top: 1px;
        }
        .operations-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }
        .game-status {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 12px;
        }
        .status-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
        }
        .status-label {
            color: #aaa;
            font-size: 10px;
            margin-bottom: 2px;
        }
        .status-value {
            font-weight: 600;
            color: #e0d0b0;
        }
        .status-value.highlight {
            color: #ffcc00;
        }
        .status-value.danger {
            color: #ff6644;
        }
        .operation-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 8px;
        }
        .section-label {
            font-size: 11px;
            color: #aaa;
            text-align: center;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-sm:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
        }
        .btn-color {
            min-width: 46px;
            padding: 6px 8px;
        }

        .online-bar {
            display: grid;
            grid-template-columns: minmax(220px, 1fr) minmax(220px, 1fr) auto auto;
            gap: 10px;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(24, 24, 24, 0.92);
        }
        .online-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }
        .online-field label {
            color: #c9b99e;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .online-field input {
            min-height: 34px;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid rgba(212, 165, 116, 0.45);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            outline: none;
        }
        .online-status {
            grid-column: 1 / -1;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            color: #d5c8b5;
            font-size: 13px;
        }
        .online-pill {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 0 9px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
        }
        @media (max-width: 900px) {
            .online-bar {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="top-nav" aria-label="页面导航">
        <div class="nav-title">斯诺克台球 - 联机对战</div>
        <div class="nav-links">
            <a class="nav-link" href="game_2d.html">本地游戏</a>
            <a class="nav-link active" href="game_2d_online.html">联机游戏</a>
            <a class="nav-link" href="game_2d_rules.html">规则说明</a>
        </div>
    </nav>


    <section class="online-bar" aria-label="联机房间">
        <div class="online-field">
            <label for="serverUrl">服务器</label>
            <input id="serverUrl" type="text" placeholder="ws://localhost:3000">
        </div>
        <div class="online-field">
            <label for="roomId">房间号</label>
            <input id="roomId" type="text" maxlength="32" placeholder="例如 snooker-001">
        </div>
        <button class="btn-sm" id="connectBtn" onclick="connectOnline()">连接房间</button>
        <button class="btn-sm" id="copyInviteBtn" onclick="copyInviteLink()">复制邀请链接</button>
        <div class="online-status">
            <span class="online-pill" id="connectionStatus">未连接</span>
            <span class="online-pill" id="playerRole">身份：未分配</span>
            <span class="online-pill" id="roomStatus">房间：-</span>
            <span class="online-pill" id="turnStatus">回合：-</span>
        </div>
    </section>

    <main class="app-shell">
    <!-- 左侧列 -->
    <div class="left-column">
        <!-- 左上：力度仪表盘 -->
        <div class="panel">
            <div class="section-title">力度</div>
            <div style="text-align: center;">
                <div class="power-gauge-container" id="powerContainer">
                    <div class="gauge-marker" style="top: 5px;">Max</div>
                    <div class="gauge-marker" style="top: 117px;">50%</div>
                    <div class="gauge-marker" style="top: 225px;">Min</div>
                    <div class="power-gauge" id="powerGauge"></div>
                </div>
                <div class="power-label"><span id="powerLabel">0</span>%</div>
            </div>
        </div>

        <!-- 左下：方向仪表盘 -->
        <div class="panel">
            <div class="section-title">方向</div>
            <div style="text-align: center;">
                <div class="direction-control" id="directionControl">
                    <canvas id="directionTicks" width="200" height="200" style="position:absolute;top:0;left:0;pointer-events:none;"></canvas>
                    <div class="direction-center"></div>
                    <div class="direction-handle" id="directionHandle"></div>
                </div>
                <div class="direction-label"><span id="angleDisplay">0°</span></div>
                <div class="direction-label" style="font-size:11px;color:#666;">←→ 1°步进 | Shift+←→ 0.1°微调</div>
            </div>
        </div>
    </div>

    <!-- 右侧列 -->
    <div class="right-column">
        <!-- 右上：球桌 -->
        <canvas id="table" width="900" height="500"></canvas>

        <!-- 右下：数据和按钮区 -->
        <div class="panel">
            <div class="section-title">游戏信息</div>
            
            <div class="info-layout">
                <!-- 左侧：瘦身记分牌 + 引导线 -->
                <div class="left-block">
                    <div class="scoreboard-slim">
                        <div class="player-score">
                            <div class="player-label" style="color:#4a8a4a;">玩家1</div>
                            <div class="score-value" id="score1">0</div>
                            <div class="break-value" id="break1">0</div>
                        </div>
                        <div class="player-score">
                            <div class="player-label" style="color:#8a4a4a;">玩家2</div>
                            <div class="score-value" id="score2">0</div>
                            <div class="break-value" id="break2">0</div>
                        </div>
                    </div>
                    <div class="guide-section">
                        <div class="section-label">引导线</div>
                        <div class="btn-group">
                            <button class="btn-sm" id="guideOff" onclick="setGuideMode('off')">关</button>
                            <button class="btn-sm active" id="guideLong" onclick="setGuideMode('long')">长</button>
                            <button class="btn-sm" id="guideShort" onclick="setGuideMode('short')">短</button>
                        </div>
                    </div>
                </div>

                <!-- 右侧：操作模块 -->
                <div class="operations-panel">
                    <!-- 比赛状态 -->
                    <div class="game-status">
                        <div class="status-item">
                            <span class="status-label">目标球</span>
                            <span class="status-value highlight" id="currentTarget">红球</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">阶段</span>
                            <span class="status-value" id="phase">红球阶段</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">剩余红球</span>
                            <span class="status-value danger" id="remainingRed">15</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">剩余分数</span>
                            <span class="status-value highlight" id="remainedScore">147</span>
                        </div>
                    </div>

                    <!-- 自由球 -->
                    <div class="operation-section">
                        <div class="section-label">自由球</div>
                        <div class="btn-group">
                            <button class="btn-sm" id="freeBallCancel" onclick="cancelFreeBall()" style="display:none;">取消选择</button>
                            <button class="btn-sm" id="freeBallSkip" onclick="skipFreeBall()" style="display:none;">不使用自由球</button>
                        </div>
                    </div>

                    <!-- 出杆按钮 -->
                    <div class="operation-section">
                        <div class="btn-group" style="margin-top:8px;">
                            <button class="btn-action btn-shoot" id="shootBtn" onclick="shoot()">出杆</button>
                            <button class="btn-action btn-reset" onclick="resetGame()">重新开始</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 让杆面板 -->
            <div class="let-play-banner" id="letPlayPanel" style="display:none;">
                <div class="title" id="letPlayTitle">对方犯规，请选择后续处理</div>
                <div class="btn-group">
                    <button class="btn-sm active" id="letPlayYes" onclick="letPlay(true)" style="display:none;">让犯规方继续击球</button>
                    <button class="btn-sm" id="letPlayRestore" onclick="letPlayFromOriginal()" style="display:none;">还原重打</button>
                    <button class="btn-sm" id="letPlayNo" onclick="letPlay(false)" style="display:none;">自己击球</button>
                </div>
            </div>
            
            <div class="message" id="message"></div>
        </div>
    </div>
    </main>

    <script>
        let canvas, ctx;
        let SCALE, TABLE_INNER_LENGTH, TABLE_INNER_WIDTH, BORDER, TABLE_WIDTH, TABLE_HEIGHT;
        let BALL_RADIUS, FRICTION, HOLE_RADIUS, BALL_DIAMETER, BAULK_DISTANCE, D_ZONE_RADIUS;
        let BAULK_LINE_X, D_ZONE_CENTER_X, D_ZONE_CENTER_Y;
        let COLOR_BALLS_DEF, holes;

        // 游戏状态变量
        let balls = [];
        let whiteBall = null;
        let scores = [0, 0];
        let currentPlayer = 0;
        let currentBreak = 0;
        let phase = 'red';
        let pottedThisShot = [];
        let foul = false;
        let foulType = '';
        let isPlacingBall = false;
        let ballMoving = false;
        let gameStarted = false;
        let allBallsStopped = true;
        let redBallPottedThisVisit = 0;
        let colorBallPottedThisVisit = null;

        function initOnlineUI() {
            const serverInput = document.getElementById('serverUrl');
            const roomInput = document.getElementById('roomId');
            const params = new URLSearchParams(window.location.search);
            const defaultServer = getDefaultServerUrl();

            updateOnlineStatus('未连接');
            updateOnlineTurnStatus();

        function getDefaultServerUrl() {
            if (location.protocol === 'http:' || location.protocol === 'https:') {
                if (!location.hostname.endsWith('github.io')) {
                    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                    return `${protocol}//${location.host}`;
                }
            }
            return 'ws://localhost:3000';
        }

        function makeRoomId() {
            return 'room-' + Math.random().toString(36).slice(2, 8);
        }

        function connectOnline() {
            const serverUrl = document.getElementById('serverUrl').value.trim();
            const roomId = document.getElementById('roomId').value.trim();
            if (!serverUrl || !roomId) {
                updateOnlineStatus('请填写服务器和房间号');
                return;
            }
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.close();
            }
            onlineRoomId = roomId;
            updateOnlineStatus('连接中...');
            socket = new WebSocket(serverUrl);

            socket.addEventListener('open', () => {
                socket.send(JSON.stringify({ type: 'join', roomId }));
            });

            socket.addEventListener('message', (event) => {
                let message;
                try {
                    message = JSON.parse(event.data);
                } catch (error) {
                    return;
                }
                handleOnlineMessage(message);
            });

            socket.addEventListener('close', () => {
                onlineConnected = false;
                myPlayer = null;
                updateOnlineStatus('连接已断开');
                updateOnlineTurnStatus();
                updateUI();
            });

            socket.addEventListener('error', () => {
                updateOnlineStatus('连接失败，请检查服务器地址');
            });
        }

        function handleOnlineMessage(message) {
            if (message.type === 'joined') {
                onlineConnected = true;
                onlineClientId = message.clientId;
                myPlayer = message.player;
                updateOnlineStatus('已连接');
                updateOnlineRole(message.player);
                updateOnlineRoom(message.roomId, message.clients);
                if (message.state) {
                    applyRemoteState(message.state);
                } else if (myPlayer === 0) {
                    broadcastState('initial-state');
                }
                updateUI();
                return;
            }

            if (message.type === 'room-update') {
                updateOnlineRoom(message.roomId, message.clients);
                if (message.notice) showMessage(message.notice);
                return;
            }

            if (message.type === 'state') {
                if (message.reason === 'shot-update' && message.state && message.state.partial === 'motion') {
                    applyMotionState(message.state);
                } else {
                    applyRemoteState(message.state);
                }
                return;
            }

            if (message.type === 'error') {
                updateOnlineStatus(message.message || '服务器错误');
            }
        }

        function updateOnlineStatus(text) {
            const el = document.getElementById('connectionStatus');
            if (el) el.textContent = text;
        }

        function updateOnlineRole(player) {
            const role = document.getElementById('playerRole');
            if (!role) return;
            if (player === 0) role.textContent = '身份：玩家1';
            else if (player === 1) role.textContent = '身份：玩家2';
            else role.textContent = '身份：观战';
        }

        function updateOnlineRoom(roomId, clients = 0) {
            const room = document.getElementById('roomStatus');
            if (room) room.textContent = `房间：${roomId || '-'}（${clients}人）`;
        }

        function updateOnlineTurnStatus() {
            const turn = document.getElementById('turnStatus');
            if (!turn) return;
            if (!onlineConnected) {
                turn.textContent = '回合：未连接';
            } else if (myPlayer === currentPlayer) {
                turn.textContent = `回合：你（玩家${currentPlayer + 1}）`;
            } else {
                turn.textContent = `回合：玩家${currentPlayer + 1}`;
            }
        }

        function canControlCurrentTurn() {
            return onlineConnected && myPlayer === currentPlayer && myPlayer !== null && myPlayer < 2;
        }

        function canResolveFoulDecision() {
            const decisionPlayer = foulDecisionPlayer ?? (awaitingLetPlayDecision ? 1 - currentPlayer : null);
            return onlineConnected && awaitingLetPlayDecision && myPlayer === decisionPlayer;
        }

        function canResetOnlineGame() {
            return onlineConnected && myPlayer === 0 && !isTableInMotion();
        }

        function getWaitMessage() {
            if (!onlineConnected) return '请先连接联机房间';
            if (myPlayer === null || myPlayer > 1) return '当前为观战模式';
            return `等待玩家${currentPlayer + 1}操作`;
        }

        function shouldSimulateTable() {
            return !ONLINE_MODE || !onlineConnected || myPlayer === shotAuthorityPlayer;
        }

        function maybeBroadcastMovingState() {
            if (!onlineConnected || myPlayer !== shotAuthorityPlayer) return;
            const now = Date.now();
            if (now - lastStateBroadcastAt < 50) return;
            broadcastMotionState('shot-update');
        }

        function broadcastState(reason) {
            if (!onlineConnected || applyingRemoteState || !socket || socket.readyState !== WebSocket.OPEN) return;
            lastStateBroadcastAt = Date.now();
            socket.send(JSON.stringify({
                type: 'state',
                reason,
                state: serializeGameState()
            }));
        }

        function broadcastMotionState(reason) {
            if (!onlineConnected || applyingRemoteState || !socket || socket.readyState !== WebSocket.OPEN) return;
            lastStateBroadcastAt = Date.now();
            socket.send(JSON.stringify({
                type: 'state',
                reason,
                state: serializeMotionState()
            }));
        }

        function serializeGameState() {
            return {
                nextBallId,
                balls: balls.map(ball => ({
                    id: ball.id,
                    x: ball.x,
                    y: ball.y,
                    vx: ball.vx,
                    vy: ball.vy,
                    color: ball.color,
                    type: ball.type,
                    points: ball.points,
                    name: ball.name,
                    defaultX: ball.defaultX,
                    defaultY: ball.defaultY
                })),
                scores: [...scores],
                currentPlayer,
                currentBreak,
                phase,
                isPlacingBall,
                ballMoving,
                gameStarted,
                allBallsStopped,
                freeBallMode,
                freeBallTargetId: freeBallTarget ? freeBallTarget.id : null,
                awaitingLetPlayDecision,
                foulDecisionPlayer,
                lastFoulPenalty,
                nominatedColorId: nominatedColor ? nominatedColor.id : null,
                lastFoulWasMiss,
                shotSnapshot,
                frameStarter,
                cueAngle,
                cuePower,
                guideMode,
                shotAuthorityPlayer,
                message: lastMessage
            };
        }

        function serializeMotionState() {
            return {
                partial: 'motion',
                balls: balls.map(ball => ({
                    id: ball.id,
                    x: ball.x,
                    y: ball.y,
                    vx: ball.vx,
                    vy: ball.vy
                })),
                ballMoving,
                allBallsStopped,
                shotAuthorityPlayer,
                message: lastMessage
            };
        }

        function applyMotionState(state) {
            if (!state || !Array.isArray(state.balls)) return;
            applyingRemoteState = true;

            const incoming = new Map(state.balls.map(ball => [ball.id, ball]));
            balls = balls.filter(ball => incoming.has(ball.id));
            for (const ball of balls) {
                const data = incoming.get(ball.id);
                ball.vx = data.vx || 0;
                ball.vy = data.vy || 0;
            }
            remoteMotionTargets = incoming;
            whiteBall = balls.find(ball => ball.type === 'white') || null;
            ballMoving = !!state.ballMoving;
            allBallsStopped = !!state.allBallsStopped;
            shotAuthorityPlayer = state.shotAuthorityPlayer;
            if (state.message) {
                showMessage(state.message);
            }

            applyingRemoteState = false;
        }

        function smoothRemoteMotion() {
            if (!remoteMotionTargets || shouldSimulateTable()) return;

            let settled = true;
            for (const ball of balls) {
                const target = remoteMotionTargets.get(ball.id);
                if (!target) continue;

                const dx = target.x - ball.x;
                const dy = target.y - ball.y;
                const distance = Math.hypot(dx, dy);

                if (distance > REMOTE_MOTION_SNAP_DISTANCE) {
                    ball.x = target.x;
                    ball.y = target.y;
                } else {
                    ball.x += dx * REMOTE_MOTION_SMOOTHING;
                    ball.y += dy * REMOTE_MOTION_SMOOTHING;
                }

                ball.vx = target.vx || 0;
                ball.vy = target.vy || 0;
                if (distance > 0.35) settled = false;
            }

            if (!ballMoving && settled) {
                remoteMotionTargets = null;
            }
        }

        function applyRemoteState(state) {
            if (!state) return;
            applyingRemoteState = true;
            remoteMotionTargets = null;
            nextBallId = state.nextBallId || 1;
            balls = (state.balls || []).map(data => {
                const ball = createBall(data.x, data.y, data.color, data.type, data.points);
                ball.id = data.id || ball.id;
                ball.vx = data.vx || 0;
                ball.vy = data.vy || 0;
                ball.name = data.name || '';
                ball.defaultX = data.defaultX;
                ball.defaultY = data.defaultY;
                return ball;
            });
            whiteBall = balls.find(ball => ball.type === 'white') || null;
            scores = Array.isArray(state.scores) ? [...state.scores] : [0, 0];
            currentPlayer = state.currentPlayer || 0;
            currentBreak = state.currentBreak || 0;
            phase = state.phase || 'red';
            isPlacingBall = !!state.isPlacingBall;
            ballMoving = !!state.ballMoving;
            gameStarted = !!state.gameStarted;
            allBallsStopped = !!state.allBallsStopped;
            freeBallMode = !!state.freeBallMode;
            awaitingLetPlayDecision = !!state.awaitingLetPlayDecision;
            foulDecisionPlayer = Number.isInteger(state.foulDecisionPlayer) ? state.foulDecisionPlayer : null;
            lastFoulPenalty = state.lastFoulPenalty || 0;
            lastFoulWasMiss = !!state.lastFoulWasMiss;
            shotSnapshot = state.shotSnapshot || null;
            frameStarter = state.frameStarter || 0;
            cueAngle = state.cueAngle || 0;
            cuePower = state.cuePower || 0;
            guideMode = state.guideMode || guideMode;
            shotAuthorityPlayer = state.shotAuthorityPlayer;
            freeBallTarget = state.freeBallTargetId ? balls.find(ball => ball.id === state.freeBallTargetId) || null : null;
            nominatedColor = state.nominatedColorId ? balls.find(ball => ball.id === state.nominatedColorId) || null : null;
            updatePowerGauge();
            updateDirectionHandle();
            updateAngleDisplay();
            setGuideMode(guideMode);
            updateUI();
            syncLetPlayPanel();
            showMessage(state.message || getWaitMessage());
            applyingRemoteState = false;
        }

        function initGameConstants() {
            SCALE = 0.2;
            TABLE_INNER_LENGTH = Math.round(3569 * SCALE);
            TABLE_INNER_WIDTH = Math.round(1778 * SCALE);
            BORDER = Math.round(30 * SCALE);
            TABLE_WIDTH = TABLE_INNER_LENGTH + BORDER * 2;
            TABLE_HEIGHT = TABLE_INNER_WIDTH + BORDER * 2;

            BALL_RADIUS = Math.round(52.5 * SCALE / 2);
            FRICTION = 0.985;
            HOLE_RADIUS = Math.max(BALL_RADIUS + 4, Math.round(52.5 * SCALE));

            BALL_DIAMETER = BALL_RADIUS * 2;
            BAULK_DISTANCE = Math.round(737 * SCALE);
            D_ZONE_RADIUS = Math.round(292 * SCALE);

            BAULK_LINE_X = BORDER + BAULK_DISTANCE;
            D_ZONE_CENTER_X = BAULK_LINE_X;
            D_ZONE_CENTER_Y = TABLE_HEIGHT / 2;

            COLOR_BALLS_DEF = [
                { name: '黄球', color: '#FFD700', points: 2, defaultX: BAULK_LINE_X, defaultY: D_ZONE_CENTER_Y + D_ZONE_RADIUS },
                { name: '绿球', color: '#00CC00', points: 3, defaultX: BAULK_LINE_X, defaultY: D_ZONE_CENTER_Y - D_ZONE_RADIUS },
                { name: '棕球', color: '#8B4513', points: 4, defaultX: BAULK_LINE_X, defaultY: D_ZONE_CENTER_Y },
                { name: '蓝球', color: '#0066FF', points: 5, defaultX: BORDER + TABLE_INNER_LENGTH / 2, defaultY: TABLE_HEIGHT / 2 },
                { name: '粉球', color: '#FF69B4', points: 6, defaultX: BORDER + (TABLE_INNER_LENGTH / 2 + TABLE_INNER_LENGTH) / 2, defaultY: TABLE_HEIGHT / 2 },
                { name: '黑球', color: '#111111', points: 7, defaultX: BORDER + TABLE_INNER_LENGTH - Math.round(324 * SCALE), defaultY: TABLE_HEIGHT / 2 }
            ];

            const offset = HOLE_RADIUS * 0.3;
            holes = [
                { x: BORDER - offset, y: BORDER - offset },
                { x: BORDER + TABLE_INNER_LENGTH / 2, y: BORDER - offset * 1.2 },
                { x: BORDER + TABLE_INNER_LENGTH + offset, y: BORDER - offset },
                { x: BORDER - offset, y: BORDER + TABLE_INNER_WIDTH + offset },
                { x: BORDER + TABLE_INNER_LENGTH / 2, y: BORDER + TABLE_INNER_WIDTH + offset * 1.2 },
                { x: BORDER + TABLE_INNER_LENGTH + offset, y: BORDER + TABLE_INNER_WIDTH + offset }
            ];
        }

        function initGame() {
            balls = [];
            nextBallId = 1;
            scores = [0, 0];
            currentPlayer = frameStarter;
            currentBreak = 0;
            phase = 'red';
            pottedThisShot = [];
            foul = false;
            foulType = '';
            isPlacingBall = true;
            ballMoving = false;
            gameStarted = false;
            allBallsStopped = true;
            freeBallMode = false;
            freeBallTarget = null;
            awaitingLetPlayDecision = false;
            foulDecisionPlayer = null;
            lastFoulPenalty = 0;
            nominatedColor = null;
            shotSnapshot = null;
            shotContext = null;
            lastFoulWasMiss = false;

            whiteBall = createBall(D_ZONE_CENTER_X, TABLE_HEIGHT / 2, 'white', 'white', 0);
            balls.push(whiteBall);

            const pinkBallX = BORDER + (TABLE_INNER_LENGTH / 2 + TABLE_INNER_LENGTH) / 2;
            const startX = pinkBallX + BALL_RADIUS * 2.1;
            const startY = TABLE_HEIGHT / 2;
            const spacing = BALL_RADIUS * 2.05;

            for (let row = 0; row < 5; row++) {
                for (let col = 0; col <= row; col++) {
                    const ballX = startX + row * spacing * 0.866;
                    const ballY = startY - row * spacing / 2 + col * spacing;
                    console.log(`红球 ${row}-${col}: (${ballX}, ${ballY})`);
                    balls.push(createBall(
                        ballX,
                        ballY,
                        '#CC2222', 'red', 1
                    ));
                }
            }

            COLOR_BALLS_DEF.forEach(cb => {
                const ball = createBall(cb.defaultX, cb.defaultY, cb.color, 'color', cb.points);
                ball.name = cb.name;
                ball.defaultX = cb.defaultX;
                ball.defaultY = cb.defaultY;
                balls.push(ball);
            });

            cueAngle = 0;
            cuePower = 0;
            updatePowerGauge();
            updateDirectionHandle();
            updateUI();

            const redCount = balls.filter(b => b.type === 'red').length;

            showMessage('玩家1：请在D区点击放置白球');
