<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>斯诺克台球 - 双人对战</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 22px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(12, 12, 12, 0.92);
            position: sticky;
            top: 0;
            z-index: 20;
        }
        .nav-title {
            font-size: 18px;
            font-weight: 700;
            color: #e6d2ad;
        }
        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .nav-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 34px;
            padding: 0 14px;
            border-radius: 6px;
            border: 1px solid rgba(212, 165, 116, 0.42);
            color: #e8d8bc;
            text-decoration: none;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.04);
        }
        .nav-link.active,
        .nav-link:hover {
            background: rgba(212, 165, 116, 0.18);
            border-color: rgba(212, 165, 116, 0.78);
            color: #fff;
        }
        .app-shell {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            justify-content: center;
            gap: 30px;
            padding: 20px;
        }
        canvas {
            border: 4px solid #5a3a22;
            background: #111;
            cursor: crosshair;
            display: block;
        }
        .panel {
            padding: 15px;
            background: linear-gradient(180deg, rgba(50, 30, 15, 0.8), rgba(30, 20, 10, 0.9));
            border-radius: 15px;
            border: 2px solid #5a3a22;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            height: 100%; /* 填充父容器高度 */
            display: flex;
            flex-direction: column;
        }
        .info {
            display: flex;
            gap: 15px;
            font-size: 14px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tips {
            margin-top: 10px;
            font-size: 12px;
            color: #aaa;
        }
        button {
            margin: 8px;
            padding: 12px 32px;
            font-size: 16px;
            cursor: pointer;
            background: linear-gradient(180deg, #6b4423, #4a2f15);
            color: white;
            border: 2px solid #8a5a33;
            border-radius: 8px;
            font-weight: 500;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }
        button:hover {
            background: linear-gradient(180deg, #7a5a33, #5a3f25);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4);
            transform: translateY(-1px);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }
        .message {
            margin-top: 10px;
            font-size: 16px;
            color: #ff0;
            min-height: 22px;
        }

        /* 纵向力度仪表盘 */
        .power-gauge-container {
            width: 45px;
            height: 240px;
            background: linear-gradient(180deg, #2a2a2a, #1a1a1a);
            border-radius: 12px;
            padding: 5px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            border: 2px solid #444;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
            margin: 0 auto;
        }
        .power-gauge {
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #00ff66, #66ff00, #ffff00, #ff9900, #ff3300);
            border-radius: 6px;
            transition: none;
            box-shadow: 0 0 10px rgba(255, 255, 0, 0.2);
        }
        .power-label {
            text-align: center;
            margin-top: 12px;
            font-size: 16px;
            color: #d4a574;
            font-weight: 500;
        }
        .gauge-marker {
            position: absolute;
            left: 0;
            width: 100%;
            text-align: right;
            padding-right: 8px;
            font-size: 11px;
            color: #888;
            font-weight: 500;
        }

        /* 圆形方向控制 */
        .direction-control {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            position: relative;
            margin: 15px auto;
            cursor: crosshair;
            border: 3px solid #555;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5), inset 0 2px 10px rgba(255, 255, 255, 0.05);
        }
        .direction-control::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 180px;
            height: 180px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px dashed #444;
        }
        .direction-control::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 140px;
            height: 140px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 1px dashed #333;
        }
        .direction-handle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #66ccff, #0088cc);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.6);
        }
        .direction-center {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #fff, #ccc);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .direction-label {
            text-align: center;
            font-size: 13px;
            margin-top: 10px;
            color: #aaa;
        }
        .left-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .right-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 380px; /* 引导线移出后进一步压缩 */
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #d4a574;
            text-align: center;
            margin-bottom: 10px;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 10px 12px;
            text-align: center;
            transition: all 0.2s ease;
        }
        .stat-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .stat-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #e0d0b0;
        }
        .stat-value.highlight {
            color: #ffcc00;
        }
        .stat-value.danger {
            color: #ff6644;
        }

        .btn-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            margin: 2px;
            background: linear-gradient(180deg, #4a4a4a, #2a2a2a);
            border: 1px solid #555;
            color: #ccc;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-sm:hover {
            background: linear-gradient(180deg, #5a5a5a, #3a3a3a);
            border-color: #777;
            color: #fff;
        }
        .btn-sm.active {
            background: linear-gradient(180deg, #6b4423, #4a2f15);
            border-color: #8a5a33;
            color: #fff;
            box-shadow: 0 0 8px rgba(180, 120, 60, 0.4);
        }
        .btn-action {
            padding: 10px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            margin: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-shoot {
            background: linear-gradient(180deg, #c0392b, #8b0000);
            border: 2px solid #e74c3c;
            color: #fff;
            box-shadow: 0 4px 12px rgba(200, 0, 0, 0.3);
        }
        .btn-shoot:hover {
            background: linear-gradient(180deg, #e74c3c, #a00000);
            box-shadow: 0 6px 16px rgba(220, 0, 0, 0.4);
            transform: translateY(-1px);
        }
        .btn-reset {
            background: linear-gradient(180deg, #4a4a4a, #2a2a2a);
            border: 2px solid #666;
            color: #ccc;
        }
        .btn-reset:hover {
            background: linear-gradient(180deg, #5a5a5a, #3a3a3a);
            border-color: #888;
            color: #fff;
            transform: translateY(-1px);
        }

        .divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            margin: 12px 0;
        }

        .let-play-banner {
            background: linear-gradient(135deg, rgba(200, 150, 0, 0.15), rgba(200, 100, 0, 0.1));
            border: 1px solid rgba(200, 150, 0, 0.3);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }
        .message {
            margin-top: 8px;
            font-size: 14px;
            color: #ff0;
            min-height: 20px;
            flex-shrink: 0;
        }
        .let-play-banner {
            background: linear-gradient(135deg, rgba(200, 150, 0, 0.15), rgba(200, 100, 0, 0.1));
            border: 1px solid rgba(200, 150, 0, 0.3);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            position: fixed;
            right: 24px;
            bottom: 24px;
            z-index: 1000;
            width: min(420px, calc(100vw - 48px));
            background-color: rgba(36, 24, 8, 0.96);
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.5);
        }
        .let-play-banner .title {
            font-size: 13px;
            font-weight: 600;
            color: #ffcc00;
            margin-bottom: 6px;
        }

        /* 新布局样式 */
        .info-layout {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            flex: 1;
            min-height: 0;
        }
        .left-block {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 110px;
        }
        .guide-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 8px;
            text-align: center;
        }
        .scoreboard-slim {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 110px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 10px;
        }
        .player-score {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }
        .player-score.active {
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }
        .player-label {
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .score-value {
            font-size: 22px;
            font-weight: 700;
            color: #e0d0b0;
            line-height: 1.2;
        }
        .break-value {
            font-size: 10px;
            color: #888;
            margin-top: 1px;
        }
        .operations-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }
        .game-status {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 12px;
        }
        .status-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
        }
        .status-label {
            color: #aaa;
            font-size: 10px;
            margin-bottom: 2px;
        }
        .status-value {
            font-weight: 600;
            color: #e0d0b0;
        }
        .status-value.highlight {
            color: #ffcc00;
        }
        .status-value.danger {
            color: #ff6644;
        }
        .operation-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 8px;
        }
        .section-label {
            font-size: 11px;
            color: #aaa;
            text-align: center;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-sm:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
        }
        .spin-control {
            width: 132px;
            height: 132px;
            margin: 12px auto 8px;
            border-radius: 50%;
            position: relative;
            cursor: crosshair;
            touch-action: none;
            border: 3px solid #777;
            background: radial-gradient(circle at 35% 30%, #fff 0%, #e4e4e4 45%, #b7b7b7 100%);
            box-shadow: inset -8px -10px 18px rgba(0, 0, 0, 0.22), 0 5px 14px rgba(0, 0, 0, 0.4);
        }
        .spin-control::before,
        .spin-control::after {
            content: '';
            position: absolute;
            background: rgba(0, 0, 0, 0.2);
            pointer-events: none;
        }
        .spin-control::before {
            width: 1px;
            height: 92%;
            left: 50%;
            top: 4%;
        }
        .spin-control::after {
            width: 92%;
            height: 1px;
            left: 4%;
            top: 50%;
        }
        .spin-handle {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: #c62828;
            border: 2px solid #fff;
            box-shadow: 0 2px 7px rgba(0, 0, 0, 0.45);
            pointer-events: none;
        }
        .spin-axis-label {
            position: absolute;
            color: #222;
            font-size: 11px;
            font-weight: 700;
            pointer-events: none;
        }
        .spin-axis-label.top { top: 5px; left: 50%; transform: translateX(-50%); }
        .spin-axis-label.bottom { bottom: 5px; left: 50%; transform: translateX(-50%); }
        .spin-axis-label.left { left: 5px; top: 50%; transform: translateY(-50%); }
        .spin-axis-label.right { right: 5px; top: 50%; transform: translateY(-50%); }
        .spin-value {
            min-height: 18px;
            color: #d4a574;
            font-size: 12px;
            text-align: center;
        }
        .btn-color {
            min-width: 46px;
            padding: 6px 8px;
        }

        /* 紧凑型桌面布局：保持球台画布固有比例，减少页面纵向占用。 */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }
        body {
            font-size: 15px;
        }
        .top-nav {
            padding: 9px 16px;
        }
        .nav-title {
            font-size: 20px;
        }
        .nav-link {
            min-height: 32px;
            padding: 0 12px;
            font-size: 14px;
        }
        .app-shell {
            width: min(100%, 1260px);
            margin: 0 auto;
            padding: 12px;
            gap: 14px;
            align-items: flex-start;
        }
        .panel {
            height: auto;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.38);
        }
        .left-column {
            display: grid;
            grid-template-columns: 78px 188px 142px;
            gap: 10px;
            align-items: stretch;
            flex: 0 0 auto;
        }
        .left-column > .panel {
            min-width: 0;
            padding: 10px 7px;
        }
        .right-column {
            min-width: 0;
            height: auto;
            gap: 10px;
            align-items: stretch;
            flex: 1 1 auto;
        }
        #table {
            box-sizing: content-box;
            width: auto;
            max-width: 100%;
            height: auto;
            align-self: center;
            border-width: 3px;
        }
        #directionTicks {
            width: 168px;
            height: 168px;
            border: 0;
            background: transparent;
        }
        .section-title {
            margin-bottom: 7px;
            font-size: 18px;
        }
        .power-gauge-container {
            width: 40px;
            height: 164px;
            padding: 4px;
            border-radius: 8px;
        }
        .power-gauge-container .gauge-marker:nth-child(1) {
            top: 4px !important;
        }
        .power-gauge-container .gauge-marker:nth-child(2) {
            top: 77px !important;
        }
        .power-gauge-container .gauge-marker:nth-child(3) {
            top: 148px !important;
        }
        .gauge-marker {
            padding-right: 5px;
            font-size: 12px;
        }
        .power-label {
            margin-top: 8px;
            font-size: 17px;
        }
        .direction-control {
            width: 168px;
            height: 168px;
            margin: 6px auto;
        }
        .direction-control::before {
            width: 150px;
            height: 150px;
        }
        .direction-control::after {
            width: 116px;
            height: 116px;
        }
        .direction-label {
            margin-top: 6px;
            font-size: 14px;
        }
        .direction-control + .direction-label + .direction-label {
            font-size: 12px !important;
            line-height: 1.35;
        }
        .spin-control {
            width: 118px;
            height: 118px;
            margin: 6px auto;
        }
        .spin-axis-label,
        .spin-value {
            font-size: 13px;
        }
        .left-column .btn-sm {
            width: calc(100% - 4px);
            margin: 6px 2px 0;
        }
        .right-column > .panel {
            width: 100%;
            padding: 8px 10px;
        }
        .info-layout {
            gap: 9px;
            align-items: stretch;
        }
        .left-block {
            min-width: 288px;
            flex-direction: row;
            gap: 6px;
        }
        .scoreboard-slim {
            min-width: 164px;
            flex-direction: row;
            gap: 5px;
            padding: 6px;
        }
        .player-score {
            flex: 1;
            padding: 4px;
        }
        .player-label {
            font-size: 13px;
        }
        .score-value {
            font-size: 24px;
        }
        .break-value {
            font-size: 12px;
        }
        .guide-section,
        .game-status,
        .operation-section {
            border-radius: 7px;
        }
        .guide-section {
            min-width: 118px;
            padding: 6px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .guide-section .btn-group {
            flex-wrap: nowrap;
        }
        .operations-panel {
            display: grid;
            grid-template-columns: minmax(170px, 0.8fr) minmax(240px, 1.2fr);
            grid-template-rows: auto auto;
            gap: 6px;
        }
        .game-status {
            grid-row: 1 / 3;
            padding: 7px;
            gap: 5px 9px;
        }
        .operation-section {
            padding: 5px 6px;
        }
        .section-label,
        .status-label {
            font-size: 12px;
        }
        .status-item,
        .status-value {
            font-size: 14px;
        }
        .btn-sm {
            padding: 6px 10px;
            font-size: 13px;
        }
        .btn-action {
            margin: 2px;
            padding: 8px 9px;
            font-size: 15px;
        }
        .operation-section .btn-group {
            gap: 3px;
        }
        .operation-section .btn-group[style] {
            margin-top: 0 !important;
        }
        .message {
            margin-top: 5px;
            min-height: 18px;
            font-size: 15px;
        }

        @media (max-width: 1180px) {
            .app-shell {
                flex-direction: column;
                align-items: center;
            }
            .left-column {
                width: 100%;
                justify-content: center;
            }
            .right-column {
                width: min(100%, 734px);
            }
        }
        @media (max-width: 760px) {
            .top-nav {
                align-items: flex-start;
            }
            .app-shell {
                padding: 8px;
            }
            .left-column {
                grid-template-columns: 1fr;
                width: min(100%, 260px);
            }
            .info-layout,
            .scoreboard-slim {
                flex-direction: column;
            }
            .left-block {
                min-width: 0;
                flex-direction: column;
            }
            .operations-panel {
                display: flex;
            }
        }

        .table-stage {
            min-width: 0;
            min-height: 0;
            display: flex;
            justify-content: flex-end;
            align-items: flex-start;
        }

        @media (min-width: 1181px) {
            html,
            body {
                height: 100%;
            }
            body {
                min-height: 0;
                height: 100vh;
                overflow: hidden;
            }
            .top-nav {
                flex: 0 0 auto;
            }
            .app-shell {
                flex: 1 1 auto;
                min-height: 0;
                display: grid;
                grid-template-columns: 360px minmax(0, 1fr);
                align-items: stretch;
                overflow: hidden;
            }
            .left-column {
                width: auto;
                height: 100%;
                min-height: 0;
                align-self: start;
                display: grid;
                grid-template-columns: 90px minmax(0, 1fr);
                grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
                gap: 10px;
            }
            .left-column > .panel {
                height: 100%;
                min-height: 0;
                overflow: hidden;
            }
            .left-column > .panel:nth-child(1) {
                grid-column: 1;

    <script>
        let canvas, ctx;
        let SCALE, TABLE_INNER_LENGTH, TABLE_INNER_WIDTH, BORDER, TABLE_WIDTH, TABLE_HEIGHT;
        let BALL_RADIUS, FRICTION, HOLE_RADIUS, BALL_DIAMETER, BAULK_DISTANCE, D_ZONE_RADIUS;
        let BAULK_LINE_X, D_ZONE_CENTER_X, D_ZONE_CENTER_Y;
        let COLOR_BALLS_DEF, holes;

        // 游戏状态变量
        let balls = [];
        let whiteBall = null;
        let scores = [0, 0];
        let currentPlayer = 0;
        let currentBreak = 0;
        let phase = 'red';
        let pottedThisShot = [];
        let foul = false;
        let foulType = '';
        let isPlacingBall = false;
        let ballMoving = false;
        let gameStarted = false;
        let allBallsStopped = true;
        let redBallPottedThisVisit = 0;
        let colorBallPottedThisVisit = null;
        let firstBallHit = null;
        let shotStarted = false;
        let freeBallMode = false;
        let freeBallTarget = null;
        let awaitingLetPlayDecision = false;
        let foulDecisionPlayer = null;
        let lastFoulPenalty = 0;
        let nominatedColor = null;
        let shotSnapshot = null;
        let shotContext = null;
        let lastFoulWasMiss = false;
        let frameStarter = 0;
        let lastMessage = '';
        let currentShotReplay = [];
        let lastShotReplay = [];
        let replayRestoreFrame = null;
        let replayRestoreMessage = '';
        let isReplaying = false;
        let replayFrameIndex = 0;
        let replayLastFrameAt = 0;
        let replayCaptureCounter = 0;

        // 球杆系统变量
        let cueAngle = 0;
        let cuePower = 0;
        let cueSpinX = 0;
        let cueSpinY = 0;
        let activeShotSpinX = 0;
        let activeShotSpinY = 0;
        let activeShotAngle = 0;
        let activeShotSpeed = 0;
        let shotSpinApplied = false;
        let directionControlActive = false;
        let powerControlActive = false;
        let spinControlActive = false;

        // 引导线系统变量
        let guideMode = 'short';
        const STOP_SPEED = 0.08;
        const BASE_SHOT_SPEED = 12;
        const HIGH_POWER_BOOST = 4;
        const CUSHION_RESTITUTION = 0.82;
        const TOP_SPIN_STRENGTH = 0.42;
        const SIDE_SPIN_CUSHION_STRENGTH = 0.24;
        const SIDE_SPIN_DECAY = 0.992;
        const REPLAY_FRAME_DURATION = 32;
        const REPLAY_CAPTURE_INTERVAL = 2;
        let audioContext = null;
        let lastBallSoundAt = 0;
        let lastCushionSoundAt = 0;

        function getShotSpeed(powerPercent) {
            const power = Math.max(0, Math.min(100, powerPercent)) / 100;
            return power * (BASE_SHOT_SPEED + HIGH_POWER_BOOST * power);
        }

        function getGameAudioContext() {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) return null;
            if (!audioContext) audioContext = new AudioContextClass();
            if (audioContext.state === 'suspended') audioContext.resume();
            return audioContext;
        }

        function playTone(frequency, endFrequency, duration, volume, type = 'sine') {
            const audio = getGameAudioContext();
            if (!audio) return;

            const now = audio.currentTime;
            const oscillator = audio.createOscillator();
            const gain = audio.createGain();
            oscillator.type = type;
            oscillator.frequency.setValueAtTime(Math.max(20, frequency), now);
            oscillator.frequency.exponentialRampToValueAtTime(Math.max(20, endFrequency), now + duration);
            gain.gain.setValueAtTime(Math.max(0.0001, volume), now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
            oscillator.connect(gain);
            gain.connect(audio.destination);
            oscillator.start(now);
            oscillator.stop(now + duration);
        }

        function playCueStrikeSound(powerPercent) {
            const strength = Math.max(0.15, Math.min(1, powerPercent / 100));
            playTone(420, 190, 0.032, 0.045 + strength * 0.075, 'triangle');
            playTone(2400, 1250, 0.012, 0.018 + strength * 0.028, 'sine');
        }

        function playBallCollisionSound(impactSpeed) {
            if (impactSpeed < 0.18) return;
            const now = performance.now();
            if (now - lastBallSoundAt < 12) return;
            lastBallSoundAt = now;
            const strength = Math.min(1, impactSpeed / BASE_SHOT_SPEED);
            playTone(1750 + strength * 520, 980, 0.018, 0.03 + strength * 0.075, 'sine');
            playTone(3100, 1800, 0.008, 0.008 + strength * 0.018, 'triangle');
        }

        function playCushionSound(impactSpeed) {
            if (impactSpeed < 0.25) return;
            const now = performance.now();
            if (now - lastCushionSoundAt < 18) return;
            lastCushionSoundAt = now;
            const strength = Math.min(1, impactSpeed / BASE_SHOT_SPEED);
            playTone(520, 245, 0.034, 0.018 + strength * 0.048, 'triangle');
            playTone(1350, 720, 0.012, 0.008 + strength * 0.016, 'sine');
        }

        function playPocketSound(ball) {
            const pitch = ball.type === 'white' ? 115 : 145;
            playTone(pitch, 55, 0.16, 0.085, 'sine');
            playTone(820, 280, 0.045, 0.032, 'triangle');
        }

        function setGuideMode(mode) {
            guideMode = mode;
            document.getElementById('guideOff').className = 'btn-sm' + (mode === 'off' ? ' active' : '');
            document.getElementById('guideLong').className = 'btn-sm' + (mode === 'long' ? ' active' : '');
            document.getElementById('guideShort').className = 'btn-sm' + (mode === 'short' ? ' active' : '');
        }

        document.addEventListener('DOMContentLoaded', function() {
            canvas = document.getElementById('table');
            ctx = canvas.getContext('2d');

            initGameConstants();
            canvas.width = TABLE_WIDTH;
            canvas.height = TABLE_HEIGHT;
            initResponsiveTable();

            initGame();
            initControls();
            drawDirectionTicks();

            canvas.addEventListener('click', handleCanvasClick);
            gameLoop();
        });

        function fitTableToStage() {
            if (!canvas) return;
            if (!window.matchMedia('(min-width: 1181px)').matches) {
                canvas.style.width = '';
                canvas.style.height = '';
                return;
            }

            const stage = canvas.closest('.table-stage');
            if (!stage || !stage.clientWidth) return;

            const style = getComputedStyle(canvas);
            const column = stage.parentElement;
            const columnStyle = getComputedStyle(column);
            const infoPanel = stage.nextElementSibling;
            const rowGap = parseFloat(columnStyle.rowGap) || 0;
            const borderWidth = parseFloat(style.borderLeftWidth) + parseFloat(style.borderRightWidth);
            const borderHeight = parseFloat(style.borderTopWidth) + parseFloat(style.borderBottomWidth);
            const availableWidth = Math.max(0, stage.clientWidth - borderWidth);
            const availableHeight = Math.max(
                0,
                column.clientHeight - (infoPanel?.offsetHeight || 0) - rowGap - borderHeight
            );
            const aspectRatio = canvas.width / canvas.height;
            const displayWidth = Math.min(availableWidth, availableHeight * aspectRatio);

            canvas.style.width = `${Math.floor(displayWidth)}px`;
            canvas.style.height = `${Math.floor(displayWidth / aspectRatio)}px`;
        }

        function initResponsiveTable() {
            const appShell = document.querySelector('.app-shell');
            const infoPanel = canvas.closest('.table-stage')?.nextElementSibling;
            let pendingFrame = 0;
            const scheduleFit = () => {
                if (pendingFrame) return;
                pendingFrame = requestAnimationFrame(() => {
                    pendingFrame = 0;
                    fitTableToStage();
                });
            };

            if ('ResizeObserver' in window) {
                const resizeObserver = new ResizeObserver(scheduleFit);
                if (appShell) resizeObserver.observe(appShell);
                if (infoPanel) resizeObserver.observe(infoPanel);
            }
            window.addEventListener('resize', scheduleFit);
            if (document.fonts?.ready) document.fonts.ready.then(scheduleFit);
            scheduleFit();
        }

        function initGameConstants() {
            SCALE = 0.2;
            TABLE_INNER_LENGTH = Math.round(3569 * SCALE);
            TABLE_INNER_WIDTH = Math.round(1778 * SCALE);
            BORDER = Math.round(30 * SCALE);
            TABLE_WIDTH = TABLE_INNER_LENGTH + BORDER * 2;
            TABLE_HEIGHT = TABLE_INNER_WIDTH + BORDER * 2;

            BALL_RADIUS = Math.round(52.5 * SCALE / 2);
            FRICTION = 0.985;
            HOLE_RADIUS = Math.max(BALL_RADIUS + 4, Math.round(52.5 * SCALE));

            BALL_DIAMETER = BALL_RADIUS * 2;
            BAULK_DISTANCE = Math.round(737 * SCALE);
            D_ZONE_RADIUS = Math.round(292 * SCALE);

            BAULK_LINE_X = BORDER + BAULK_DISTANCE;
            D_ZONE_CENTER_X = BAULK_LINE_X;
            D_ZONE_CENTER_Y = TABLE_HEIGHT / 2;

            COLOR_BALLS_DEF = [
                { name: '黄球', color: '#FFD700', points: 2, defaultX: BAULK_LINE_X, defaultY: D_ZONE_CENTER_Y + D_ZONE_RADIUS },
                { name: '绿球', color: '#00CC00', points: 3, defaultX: BAULK_LINE_X, defaultY: D_ZONE_CENTER_Y - D_ZONE_RADIUS },
                { name: '棕球', color: '#8B4513', points: 4, defaultX: BAULK_LINE_X, defaultY: D_ZONE_CENTER_Y },
                { name: '蓝球', color: '#0066FF', points: 5, defaultX: BORDER + TABLE_INNER_LENGTH / 2, defaultY: TABLE_HEIGHT / 2 },
                { name: '粉球', color: '#FF69B4', points: 6, defaultX: BORDER + (TABLE_INNER_LENGTH / 2 + TABLE_INNER_LENGTH) / 2, defaultY: TABLE_HEIGHT / 2 },
                { name: '黑球', color: '#111111', points: 7, defaultX: BORDER + TABLE_INNER_LENGTH - Math.round(324 * SCALE), defaultY: TABLE_HEIGHT / 2 }
            ];

            const offset = HOLE_RADIUS * 0.3;
            holes = [
                { x: BORDER - offset, y: BORDER - offset },
                { x: BORDER + TABLE_INNER_LENGTH / 2, y: BORDER - offset * 1.2 },
                { x: BORDER + TABLE_INNER_LENGTH + offset, y: BORDER - offset },
                { x: BORDER - offset, y: BORDER + TABLE_INNER_WIDTH + offset },
                { x: BORDER + TABLE_INNER_LENGTH / 2, y: BORDER + TABLE_INNER_WIDTH + offset * 1.2 },
                { x: BORDER + TABLE_INNER_LENGTH + offset, y: BORDER + TABLE_INNER_WIDTH + offset }
            ];
        }

        function initGame() {
            balls = [];
            scores = [0, 0];
            currentPlayer = frameStarter;
            currentBreak = 0;
            phase = 'red';
            pottedThisShot = [];
            foul = false;
            foulType = '';
            isPlacingBall = true;
            ballMoving = false;
            gameStarted = false;
            allBallsStopped = true;
            freeBallMode = false;
            freeBallTarget = null;
            awaitingLetPlayDecision = false;
            foulDecisionPlayer = null;
            lastFoulPenalty = 0;
            nominatedColor = null;
            shotSnapshot = null;
            shotContext = null;
            lastFoulWasMiss = false;
            currentShotReplay = [];
            lastShotReplay = [];
            replayRestoreFrame = null;
            isReplaying = false;
            replayFrameIndex = 0;
            replayLastFrameAt = 0;

            whiteBall = createBall(D_ZONE_CENTER_X, TABLE_HEIGHT / 2, 'white', 'white', 0);
            balls.push(whiteBall);

            const pinkBallX = BORDER + (TABLE_INNER_LENGTH / 2 + TABLE_INNER_LENGTH) / 2;
            const startX = pinkBallX + BALL_RADIUS * 2.1;
            const startY = TABLE_HEIGHT / 2;
            const spacing = BALL_RADIUS * 2.05;

            for (let row = 0; row < 5; row++) {
                for (let col = 0; col <= row; col++) {
                    const ballX = startX + row * spacing * 0.866;
                    const ballY = startY - row * spacing / 2 + col * spacing;
                    console.log(`红球 ${row}-${col}: (${ballX}, ${ballY})`);
                    balls.push(createBall(
                        ballX,
                        ballY,
                        '#CC2222', 'red', 1
                    ));
                }
            }

            COLOR_BALLS_DEF.forEach(cb => {
                const ball = createBall(cb.defaultX, cb.defaultY, cb.color, 'color', cb.points);
                ball.name = cb.name;
                ball.defaultX = cb.defaultX;
                ball.defaultY = cb.defaultY;
                balls.push(ball);
            });

            cueAngle = 0;
            cuePower = 0;
            cueSpinX = 0;
            cueSpinY = 0;
            activeShotSpinX = 0;
            activeShotSpinY = 0;
            activeShotAngle = 0;
            activeShotSpeed = 0;
            shotSpinApplied = false;
            updatePowerGauge();
            updateDirectionHandle();
            updateSpinControl();
            updateUI();
            syncLetPlayPanel();
            
            const redCount = balls.filter(b => b.type === 'red').length;
            console.log('初始化后红球数量:', redCount);
            console.log('所有球:', balls);
            
            showMessage('玩家1：请在D区点击放置白球');
        }

        function createBall(x, y, color, type, points) {
            return { x, y, vx: 0, vy: 0, sideSpin: 0, color, type, points, name: '', defaultX: x, defaultY: y };
        }

        function getColorDefinition(name) {
            return COLOR_BALLS_DEF.find(cb => cb.name === name);
        }

        function getColorBall(name) {
            return balls.find(b => b.type === 'color' && b.name === name) || null;
        }

        function ballValue(ball) {
            if (!ball) return 0;
            return ball.type === 'red' ? 1 : ball.points;
        }

        function resetShotTracking() {
            pottedThisShot = [];
            foul = false;
            foulType = '';
            shotStarted = false;
            firstBallHit = null;
            shotContext = null;
        }

        function getBallsOnForRules() {
            if (phase === 'red') {
                return balls.filter(ball => ball.type === 'red');
            }
            if (phase === 'color') {
                return nominatedColor ? [nominatedColor] : [];
            }
            if (phase === 'final') {
                const nextColor = getNextFinalColor();
                return nextColor ? [nextColor] : [];
            }
            return [];
        }

        function getBallOnValueForRules() {
            if (phase === 'red') return 1;
            if (phase === 'color') return nominatedColor ? nominatedColor.points : 4;
            if (phase === 'final') {
                const nextColor = getNextFinalColor();
                return nextColor ? nextColor.points : 7;
            }
            return 4;
        }

        function describeBallsOn(context = null) {
            const ctx = context || captureShotContext();
            if (ctx.phase === 'red') return '红球';
            if (ctx.phase === 'color') return ctx.ballsOn[0] ? ctx.ballsOn[0].name : '指定彩球';
            if (ctx.phase === 'final') return ctx.ballsOn[0] ? ctx.ballsOn[0].name : '目标彩球';
            return '活球';
        }

        function captureShotContext() {
            const ballsOn = getBallsOnForRules();
            return {
                phase,
                ballsOn,
                ballOnValue: getBallOnValueForRules(),
                nominatedColor,
                freeBallMode,
                freeBallTarget,
                freeBallTargetName: freeBallTarget ? freeBallTarget.name : null
            };
        }

        function captureShotSnapshot() {
            return {
                balls: balls.map(ball => ({
                    x: ball.x,
                    y: ball.y,
                    vx: 0,
                    vy: 0,
                    color: ball.color,
                    type: ball.type,
                    points: ball.points,
                    name: ball.name,
                    defaultX: ball.defaultX,
                    defaultY: ball.defaultY,
                    isWhite: ball === whiteBall
                })),
                phase,
                nominatedColorName: nominatedColor ? nominatedColor.name : null,
                isPlacingBall
            };
        }

        function restoreShotSnapshot(snapshot) {
            if (!snapshot) return;
            balls = snapshot.balls.map(data => {
                const ball = createBall(data.x, data.y, data.color, data.type, data.points);
                ball.vx = 0;
                ball.vy = 0;
                ball.name = data.name;
                ball.defaultX = data.defaultX;
                ball.defaultY = data.defaultY;
                return ball;
            });
            whiteBall = balls.find(ball => ball.type === 'white') || null;
            phase = snapshot.phase;
            nominatedColor = snapshot.nominatedColorName ? getColorBall(snapshot.nominatedColorName) : null;
            isPlacingBall = snapshot.isPlacingBall;
            ballMoving = false;
            allBallsStopped = true;
        }

        function initControls() {
            const directionControl = document.getElementById('directionControl');
            const powerContainer = document.getElementById('powerContainer');
            const spinControl = document.getElementById('spinControl');

            // 方向控制
            directionControl.addEventListener('mousedown', (e) => {
                if (isTableInMotion() || !gameStarted || awaitingLetPlayDecision) return;
                directionControlActive = true;
                updateDirectionFromControl(e);
            });
            document.addEventListener('mousemove', (e) => {
                if (directionControlActive) {
                    updateDirectionFromControl(e);
                }
                if (powerControlActive) {
                    updatePowerFromGauge(e);
                }
            });
            document.addEventListener('mouseup', () => {
                directionControlActive = false;
                powerControlActive = false;
            });

            spinControl.addEventListener('pointerdown', (e) => {
                if (isTableInMotion() || !gameStarted || awaitingLetPlayDecision) return;
                spinControlActive = true;
                updateSpinFromControl(e);
                spinControl.setPointerCapture?.(e.pointerId);
            });
            document.addEventListener('pointermove', (e) => {
                if (spinControlActive) updateSpinFromControl(e);
            });
            document.addEventListener('pointerup', () => {
                spinControlActive = false;
            });

            // 纵向力度控制
            powerContainer.addEventListener('mousedown', (e) => {
                if (isTableInMotion() || !gameStarted || awaitingLetPlayDecision) return;
                powerControlActive = true;
                updatePowerFromGauge(e);
            });

            // 键盘控制（微调）
            document.addEventListener('keydown', (e) => {
                if (isTableInMotion() || !gameStarted || awaitingLetPlayDecision) return;
                const step = e.shiftKey ? 0.001745 : 0.01745;
                if (e.key === 'ArrowLeft') cueAngle -= step;
                if (e.key === 'ArrowRight') cueAngle += step;
                if (e.key === 'ArrowUp' && cuePower < 100) cuePower += 1;
                if (e.key === 'ArrowDown' && cuePower > 0) cuePower -= 1;
                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    shoot();
                }
                updatePowerGauge();
                updateDirectionHandle();
                updateAngleDisplay();
            });
        }

        function updateDirectionFromControl(e) {
            const control = document.getElementById('directionControl');
            const rect = control.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const dx = e.clientX - centerX;
            const dy = e.clientY - centerY;
            const newAngle = Math.atan2(dy, dx);

            const diff = newAngle - cueAngle;
            const normalizedDiff = Math.atan2(Math.sin(diff), Math.cos(diff));
            cueAngle = newAngle;
            updateDirectionHandle();
            updateAngleDisplay();
        }

        function updateAngleDisplay() {
            const angleDeg = (-cueAngle * 180 / Math.PI).toFixed(2);
            document.getElementById('angleDisplay').textContent = angleDeg + '°';
        }

        function updateDirectionHandle() {
            const handle = document.getElementById('directionHandle');
            const control = document.getElementById('directionControl');
            const radius = Math.max(0, (control.clientWidth || 200) / 2 - 15);
            const x = Math.cos(cueAngle) * radius;
            const y = Math.sin(cueAngle) * radius;
            handle.style.left = `calc(50% + ${x}px)`;
            handle.style.top = `calc(50% + ${y}px)`;
        }

        function updatePowerFromGauge(e) {
            const container = document.getElementById('powerContainer');
            const rect = container.getBoundingClientRect();
            const y = rect.bottom - e.clientY;
            const height = rect.height - 20;
            cuePower = Math.max(0, Math.min(100, (y / height) * 100));
            updatePowerGauge();
        }

        function updatePowerGauge() {
            document.getElementById('powerGauge').style.height = `${cuePower}%`;
            document.getElementById('powerLabel').textContent = Math.round(cuePower);
        }

        function updateSpinFromControl(e) {
            const control = document.getElementById('spinControl');
            const rect = control.getBoundingClientRect();
            const radius = Math.min(rect.width, rect.height) * 0.38;
            let dx = e.clientX - (rect.left + rect.width / 2);
            let dy = e.clientY - (rect.top + rect.height / 2);
            const distance = Math.hypot(dx, dy);
            if (distance > radius) {
                dx = dx / distance * radius;
                dy = dy / distance * radius;
            }
            cueSpinX = dx / radius;
            cueSpinY = -dy / radius;
            updateSpinControl();
        }

        function updateSpinControl() {
            const handle = document.getElementById('spinHandle');
            const value = document.getElementById('spinValue');
            if (!handle || !value) return;
            handle.style.left = `calc(50% + ${cueSpinX * 50}px)`;
            handle.style.top = `calc(50% - ${cueSpinY * 50}px)`;

            const labels = [];
            if (Math.abs(cueSpinY) >= 0.08) {
                labels.push(`${cueSpinY > 0 ? '高杆' : '低杆'} ${Math.round(Math.abs(cueSpinY) * 100)}%`);
            }
            if (Math.abs(cueSpinX) >= 0.08) {
                labels.push(`${cueSpinX > 0 ? '右塞' : '左塞'} ${Math.round(Math.abs(cueSpinX) * 100)}%`);
            }
            value.textContent = labels.length ? labels.join(' · ') : '中心击球';
        }

        function resetCueSpin() {
            if (isTableInMotion() || awaitingLetPlayDecision) return;
            cueSpinX = 0;
            cueSpinY = 0;
            updateSpinControl();
        }

        function handleCanvasClick(e) {
            const rect = canvas.getBoundingClientRect();
            const style = getComputedStyle(canvas);
            const borderLeft = parseFloat(style.borderLeftWidth);
            const borderTop = parseFloat(style.borderTopWidth);
            const contentWidth = rect.width - borderLeft - parseFloat(style.borderRightWidth);
            const contentHeight = rect.height - borderTop - parseFloat(style.borderBottomWidth);
            const mx = (e.clientX - rect.left - borderLeft) * canvas.width / contentWidth;
            const my = (e.clientY - rect.top - borderTop) * canvas.height / contentHeight;

            if (isPlacingBall && !isTableInMotion() && !awaitingLetPlayDecision) {
                if (isValidBallPosition(mx, my)) {
                    whiteBall.x = mx;
                    whiteBall.y = my;
                    isPlacingBall = false;
                    gameStarted = true;
                    updateUI();
                    showMessage(`玩家${currentPlayer + 1}：调整方向和力度后点击"出杆"`);
                } else {
                    showMessage('请将白球放置在蓝色D区内');
                }
                return;
            }

            if (isTableInMotion() || !gameStarted || awaitingLetPlayDecision) return;

            if (freeBallMode && !freeBallTarget) {
                for (const ball of balls) {
                    if (ball.type !== 'white') {
                        const dx = ball.x - mx;
                        const dy = ball.y - my;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < BALL_RADIUS * 2) {
                            freeBallTarget = ball;
                            showMessage(`已选择自由球：${ball.name}，现在可以击打`);
                            updateUI();
                            return;
                        }
                    }
                }
                showMessage('请点击任意非白球作为自由球');
                return;
            }

            const dx = mx - whiteBall.x;
            const dy = my - whiteBall.y;
            cueAngle = Math.atan2(dy, dx);
            updateDirectionHandle();
        }

        function shoot() {
            if (isTableInMotion() || !gameStarted || awaitingLetPlayDecision) return;
            if (isPlacingBall) {
                showMessage('请先在D区放置白球');
                return;
            }
            if (freeBallMode && freeBallTarget && freeBallTarget.type === 'white') {
                freeBallTarget = null;
                showMessage('自由球不能指定白球');
                return;
            }

            const speed = getShotSpeed(cuePower);

            shotSnapshot = captureShotSnapshot();
            shotContext = captureShotContext();
            startShotReplayCapture();
            activeShotSpinX = cueSpinX;
            activeShotSpinY = cueSpinY;
            activeShotAngle = cueAngle;
            activeShotSpeed = speed;
            shotSpinApplied = false;
            whiteBall.sideSpin = activeShotSpinX;
            cueSpinX = 0;
            cueSpinY = 0;
            updateSpinControl();
            whiteBall.vx = Math.cos(cueAngle) * speed;
            whiteBall.vy = Math.sin(cueAngle) * speed;
            playCueStrikeSound(cuePower);

            ballMoving = true;
            allBallsStopped = false;
            shotStarted = true;
            firstBallHit = null;
            pottedThisShot = [];
            foul = false;

            document.getElementById('shootBtn').disabled = true;
            showMessage('击球中...');
        }

        function nominateColor(name) {
            if (isTableInMotion() || awaitingLetPlayDecision || phase !== 'color' || freeBallMode) return;
            const ball = getColorBall(name);
            if (!ball) {
                showMessage(`${name}不在台面上，不能指定`);
                return;
            }
            nominatedColor = ball;
            showMessage(`已指定彩球：${name}`);
            updateUI();
        }

        function isInDZone(x, y) {
            if (x > BAULK_LINE_X) return false;
            if (x < BORDER + BALL_RADIUS) return false;
            if (y < BORDER + BALL_RADIUS) return false;
            if (y > TABLE_HEIGHT - BORDER - BALL_RADIUS) return false;

            const dx = x - D_ZONE_CENTER_X;
            const dy = y - TABLE_HEIGHT / 2;
            const dist = Math.sqrt(dx * dx + dy * dy);
            return dist <= D_ZONE_RADIUS - BALL_RADIUS;
        }

        function isValidBallPosition(x, y) {
            if (!isInDZone(x, y)) return false;

            for (let ball of balls) {
                if (ball === whiteBall) continue;
                const dx = x - ball.x;
                const dy = y - ball.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < BALL_RADIUS * 2.5) {
                    return false;
                }
            }
            return true;
        }

        function updateBalls() {
            balls.forEach(ball => {
                ball.vx *= FRICTION;
                ball.vy *= FRICTION;
                ball.sideSpin = (ball.sideSpin || 0) * SIDE_SPIN_DECAY;
            });

            const maxSpeed = balls.reduce((max, ball) => Math.max(max, Math.hypot(ball.vx, ball.vy)), 0);
            const substeps = Math.max(1, Math.min(8, Math.ceil(maxSpeed / Math.max(BALL_RADIUS * 0.75, 1))));

            for (let step = 0; step < substeps; step++) {
                const previousWhitePosition = whiteBall && balls.includes(whiteBall)
                    ? { x: whiteBall.x, y: whiteBall.y }
                    : null;

                balls.forEach(ball => {
                    ball.x += ball.vx / substeps;
                    ball.y += ball.vy / substeps;
                    resolveCushionCollision(ball);
                });

                if (previousWhitePosition && whiteBall && balls.includes(whiteBall)) {
                    detectFirstBallHitAlongWhitePath(previousWhitePosition.x, previousWhitePosition.y, whiteBall.x, whiteBall.y);
                }

                if (ballMoving) checkHoles();
                for (let i = 0; i < balls.length; i++) {
                    for (let j = i + 1; j < balls.length; j++) {
                        ballCollision(balls[i], balls[j]);
                    }
                }
            }

            captureShotReplayFrame();

            if (!isAnyBallMoving() && ballMoving) {
                stopAllBalls();
                ballMoving = false;
            }

            if (!ballMoving && !allBallsStopped) {
                allBallsStopped = true;
                finalizeShotReplayCapture();
                updateUI();
                processShotResult();
            }
        }

        function resolveCushionCollision(ball) {
            let nearHole = false;
            const holeDirection = { x: 0, y: 0 };
            holes.forEach(hole => {
                const dx = ball.x - hole.x;
                const dy = ball.y - hole.y;
                const dist = Math.hypot(dx, dy);
                if (dist < HOLE_RADIUS + BALL_RADIUS * 2) {
                    nearHole = true;
                    if (dist > 0) {
                        holeDirection.x += dx / dist;
                        holeDirection.y += dy / dist;
                    }
                }
            });

            if (nearHole) return;
            const incomingVx = ball.vx;
            const incomingVy = ball.vy;
            let verticalSide = 0;
            let horizontalSide = 0;
            if (ball.x < BORDER + BALL_RADIUS && holeDirection.x < 0.5) {
                ball.x = BORDER + BALL_RADIUS;
                ball.vx *= -CUSHION_RESTITUTION;
                verticalSide = -1;
            } else if (ball.x > TABLE_WIDTH - BORDER - BALL_RADIUS && holeDirection.x > -0.5) {
                ball.x = TABLE_WIDTH - BORDER - BALL_RADIUS;
                ball.vx *= -CUSHION_RESTITUTION;
                verticalSide = 1;
            }
            if (ball.y < BORDER + BALL_RADIUS && holeDirection.y < 0.5) {
                ball.y = BORDER + BALL_RADIUS;
                ball.vy *= -CUSHION_RESTITUTION;
                horizontalSide = -1;
            } else if (ball.y > TABLE_HEIGHT - BORDER - BALL_RADIUS && holeDirection.y > -0.5) {
                ball.y = TABLE_HEIGHT - BORDER - BALL_RADIUS;
                ball.vy *= -CUSHION_RESTITUTION;
                horizontalSide = 1;
            }

            if (ball === whiteBall && Math.abs(ball.sideSpin || 0) > 0.001) {
                if (verticalSide) {
                    ball.vy += ball.sideSpin * Math.abs(incomingVx) *
                        SIDE_SPIN_CUSHION_STRENGTH * verticalSide;
                }
                if (horizontalSide) {
                    ball.vx -= ball.sideSpin * Math.abs(incomingVy) *
                        SIDE_SPIN_CUSHION_STRENGTH * horizontalSide;
                }
                if (verticalSide || horizontalSide) ball.sideSpin *= 0.78;
            }
            if (verticalSide || horizontalSide) {
                playCushionSound(Math.max(Math.abs(incomingVx), Math.abs(incomingVy)));
            }
        }

        function isAnyBallMoving() {
            return balls.some(ball => Math.hypot(ball.vx, ball.vy) > STOP_SPEED);
        }

        function isTableInMotion() {
            return isReplaying || ballMoving || !allBallsStopped || isAnyBallMoving();
        }

        function stopAllBalls() {
            balls.forEach(ball => {
                ball.vx = 0;
                ball.vy = 0;
            });
        }

        function checkHoles() {
            const toRemove = [];
            balls.forEach(ball => {
                holes.forEach(hole => {
                    const dx = ball.x - hole.x;
                    const dy = ball.y - hole.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < HOLE_RADIUS + BALL_RADIUS * 0.5) {
                        if (!pottedThisShot.includes(ball)) {
                            pottedThisShot.push(ball);
                            toRemove.push(ball);
                            playPocketSound(ball);
                        }
                    }
                });
            });
            balls = balls.filter(b => !toRemove.includes(b));
        }

        function captureReplayFrame(sourceBalls = balls) {
            return sourceBalls.map(ball => ({
                id: ball.id,
                x: ball.x,
                y: ball.y,
                color: ball.color,
                type: ball.type,
                points: ball.points,
                name: ball.name,
                defaultX: ball.defaultX,
                defaultY: ball.defaultY
            }));
        }

        function startShotReplayCapture() {
            currentShotReplay = [captureReplayFrame()];
            replayCaptureCounter = 0;
        }

        function captureShotReplayFrame(force = false) {
            if (currentShotReplay.length === 0) return;
            replayCaptureCounter++;
            if (!force && replayCaptureCounter % REPLAY_CAPTURE_INTERVAL !== 0) return;
            currentShotReplay.push(captureReplayFrame());
        }

        function finalizeShotReplayCapture() {
            captureShotReplayFrame(true);
            if (currentShotReplay.length > 1) {
                lastShotReplay = currentShotReplay;
            }
            currentShotReplay = [];
            updateReplayButton();
        }

        function applyReplayFrame(frame) {
            balls = frame.map(data => ({
                id: data.id,
                x: data.x,
                y: data.y,
                vx: 0,
                vy: 0,
                color: data.color,
                type: data.type,
                points: data.points,
                name: data.name,
                defaultX: data.defaultX,
                defaultY: data.defaultY
            }));
            whiteBall = balls.find(ball => ball.type === 'white') || null;
        }

        function replayLastShot() {
            if (isReplaying || isTableInMotion() || lastShotReplay.length < 2) return;
            replayRestoreFrame = {
                balls,
                whiteBall,
                freeBallTarget,
                nominatedColor
            };
            replayRestoreMessage = lastMessage;
            isReplaying = true;
            replayFrameIndex = 0;
            replayLastFrameAt = 0;
            applyReplayFrame(lastShotReplay[0]);
            showMessage('精彩回放中...');
            updateReplayButton();
        }

        function updateReplayPlayback(timestamp) {
            if (!isReplaying) return;
            if (!replayLastFrameAt) {
                replayLastFrameAt = timestamp;
                return;
            }
            if (timestamp - replayLastFrameAt < REPLAY_FRAME_DURATION) return;

            replayLastFrameAt = timestamp;
            replayFrameIndex++;
            if (replayFrameIndex >= lastShotReplay.length) {
                finishReplay();
                return;
            }
            applyReplayFrame(lastShotReplay[replayFrameIndex]);
        }

        function finishReplay() {
            if (replayRestoreFrame) {
                balls = replayRestoreFrame.balls;
                whiteBall = replayRestoreFrame.whiteBall;
                freeBallTarget = replayRestoreFrame.freeBallTarget;
                nominatedColor = replayRestoreFrame.nominatedColor;
            }
            replayRestoreFrame = null;
            isReplaying = false;
            replayFrameIndex = 0;
            replayLastFrameAt = 0;
            showMessage(replayRestoreMessage);
            updateUI();
            syncLetPlayPanel();
        }

        function updateReplayButton() {
            const button = document.getElementById('replayBtn');
            if (!button) return;
            button.disabled = isReplaying || lastShotReplay.length < 2 ||
                ballMoving || !allBallsStopped || isAnyBallMoving();
            button.textContent = isReplaying ? '回放中...' : '回放上一杆';
        }

        function detectFirstBallHitAlongWhitePath(startX, startY, endX, endY) {
            if (!shotStarted || firstBallHit || !whiteBall) return;

            const dx = endX - startX;
            const dy = endY - startY;
            const a = dx * dx + dy * dy;
            if (a <= 0) return;

            const collisionDistance = BALL_RADIUS * 2;
            let earliestBall = null;
            let earliestT = Infinity;

            for (const ball of balls) {
                if (ball === whiteBall) continue;

                const fx = startX - ball.x;
                const fy = startY - ball.y;
                const b = 2 * (fx * dx + fy * dy);
                const c = fx * fx + fy * fy - collisionDistance * collisionDistance;
                const discriminant = b * b - 4 * a * c;
                if (discriminant < 0) continue;

                const sqrtDiscriminant = Math.sqrt(discriminant);
                const t1 = (-b - sqrtDiscriminant) / (2 * a);
                const t2 = (-b + sqrtDiscriminant) / (2 * a);
                const t = t1 >= 0 ? t1 : t2;

                if (t >= 0 && t <= 1 && t < earliestT) {
                    earliestT = t;
                    earliestBall = ball;
                }
            }

            if (earliestBall) {
                firstBallHit = earliestBall;
            }
        }

        function ballCollision(b1, b2) {
            const dx = b2.x - b1.x;
            const dy = b2.y - b1.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < BALL_RADIUS * 2) {
                if (shotStarted && !firstBallHit) {
                    if (b1 === whiteBall) firstBallHit = b2;
                    else if (b2 === whiteBall) firstBallHit = b1;
                }

                const overlap = BALL_RADIUS * 2 - dist;
                const nx = dx / dist;
                const ny = dy / dist;

                b1.x -= nx * overlap / 2;
                b1.y -= ny * overlap / 2;
                b2.x += nx * overlap / 2;
                b2.y += ny * overlap / 2;

                const dvx = b1.vx - b2.vx;
                const dvy = b1.vy - b2.vy;
                const dvn = dvx * nx + dvy * ny;

                if (dvn > 0) {
                    playBallCollisionSound(dvn);
                    b1.vx -= dvn * nx;
                    b1.vy -= dvn * ny;
                    b2.vx += dvn * nx;
                    b2.vy += dvn * ny;

                    if (!shotSpinApplied && (b1 === whiteBall || b2 === whiteBall)) {
                        applyCueSpinAfterFirstCollision();
                    }
                }
            }
        }

        function applyCueSpinAfterFirstCollision() {
            if (!whiteBall || shotSpinApplied) return;
            const followVelocity = activeShotSpinY * activeShotSpeed * TOP_SPIN_STRENGTH;
            whiteBall.vx += Math.cos(activeShotAngle) * followVelocity;
            whiteBall.vy += Math.sin(activeShotAngle) * followVelocity;
            whiteBall.sideSpin = activeShotSpinX;
            shotSpinApplied = true;
        }

        function isSpotOccupied(x, y) {
            const tolerance = BALL_DIAMETER - 0.1;
            for (const ball of balls) {
                const dx = ball.x - x;
                const dy = ball.y - y;
                if (Math.sqrt(dx * dx + dy * dy) < tolerance) {
                    return true;
                }
            }
            return false;
        }

        function respotColorBall(ball) {
            if (ball.type !== 'color') return;
            const spotX = ball.defaultX;
            const spotY = ball.defaultY;

            if (!isSpotOccupied(spotX, spotY)) {
                ball.x = spotX;
                ball.y = spotY;
                ball.vx = 0;
                ball.vy = 0;
                balls.push(ball);
                return;
            }

            const colorSpots = COLOR_BALLS_DEF
                .map(cb => ({ x: cb.defaultX, y: cb.defaultY, points: cb.points }))
                .sort((a, b) => b.points - a.points);

            for (const spot of colorSpots) {
                if (!isSpotOccupied(spot.x, spot.y)) {
                    ball.x = spot.x;
                    ball.y = spot.y;
                    ball.vx = 0;
                    ball.vy = 0;
                    balls.push(ball);
                    return;
                }
            }

            const centerY = TABLE_HEIGHT / 2;
            const topCushionX = TABLE_WIDTH - BORDER - BALL_RADIUS;
            for (let x = ball.defaultX; x <= topCushionX; x += 1) {
                if (!isSpotOccupied(x, centerY)) {
                    ball.x = x;
                    ball.y = centerY;
                    ball.vx = 0;
                    ball.vy = 0;
                    balls.push(ball);
                    return;
                }
            }
            for (let x = ball.defaultX; x >= BORDER + BALL_RADIUS; x -= 1) {
                if (!isSpotOccupied(x, centerY)) {
                    ball.x = x;
                    ball.y = centerY;
                    ball.vx = 0;
                    ball.vy = 0;
                    balls.push(ball);
                    return;
                }
            }

            ball.x = ball.defaultX;
            ball.y = TABLE_HEIGHT / 2;
            ball.vx = 0;
            ball.vy = 0;
            balls.push(ball);
        }

        function getNextFinalColor() {
            const colorOrder = ['黄球', '绿球', '棕球', '蓝球', '粉球', '黑球'];
            for (const name of colorOrder) {
                const ball = balls.find(b => b.name === name && b.type === 'color');
                if (ball) return ball;
            }
            return null;
        }

        function processShotResult() {
            const context = shotContext || captureShotContext();
            const pottedWhite = pottedThisShot.find(ball => ball.type === 'white');
            const pottedReds = pottedThisShot.filter(ball => ball.type === 'red');
            const pottedColors = pottedThisShot.filter(ball => ball.type === 'color');
            const pottedFreeBall = context.freeBallTarget && pottedThisShot.includes(context.freeBallTarget);
            let pottedBallsOn = pottedThisShot.filter(ball => context.ballsOn.includes(ball));
            let expectedBall = context.ballsOn[0] || null;
            let blackWasBallOn = context.phase === 'final' && expectedBall && expectedBall.name === '黑球';

            let foulTypes = [];
            let maxFoulPenalty = 0;
            let isMiss = false;

            const addFoul = (reason, ...values) => {
                foulTypes.push(reason);
                const relevantValues = values.filter(value => Number.isFinite(value) && value > 0);
                maxFoulPenalty = Math.max(maxFoulPenalty, 4, context.ballOnValue, ...relevantValues);
            };
            const markMiss = () => {
                if (!blackWasBallOn) isMiss = true;
            };
            const useFirstColorHitAsTarget = () => {
                if (context.phase !== 'color' || context.freeBallMode || context.nominatedColor) return;
                if (!firstBallHit || firstBallHit.type !== 'color') return;

                context.nominatedColor = firstBallHit;
                context.ballsOn = [firstBallHit];
                context.ballOnValue = firstBallHit.points;
                nominatedColor = firstBallHit;
                pottedBallsOn = pottedThisShot.filter(ball => context.ballsOn.includes(ball));
                expectedBall = context.ballsOn[0] || null;
                blackWasBallOn = false;
            };

            useFirstColorHitAsTarget();

            if (!firstBallHit) {
                addFoul('空杆', context.ballOnValue);
                markMiss();
            } else if (context.freeBallMode && context.freeBallTarget) {
                if (firstBallHit !== context.freeBallTarget) {
                    addFoul(`未先击中自由球${context.freeBallTarget.name || ''}`, ballValue(firstBallHit));
                    markMiss();
                }
            } else if (!isBallOn(firstBallHit, context)) {
                addFoul(`未先击中${describeBallsOn(context)}`, ballValue(firstBallHit));
                markMiss();
            }

            if (pottedWhite) {
                addFoul('白球落袋', context.ballOnValue);
            }

            if (context.phase === 'red') {
                pottedColors.forEach(ball => {
                    if (ball !== context.freeBallTarget) {
                        addFoul(`${ball.name}非活球入袋`, ball.points);
                    }
                });
            } else if (context.phase === 'color') {
                pottedReds.forEach(() => addFoul('彩球阶段红球入袋', 1));
                pottedColors.forEach(ball => {
                    const legalColor = ball === context.nominatedColor || ball === context.freeBallTarget;
                    if (!legalColor) addFoul(`${ball.name}非指定彩球入袋`, ball.points);
                });
            } else if (context.phase === 'final') {
                pottedReds.forEach(() => addFoul('清彩阶段红球入袋', 1));
                pottedColors.forEach(ball => {
                    const legalColor = ball === expectedBall || ball === context.freeBallTarget;
                    if (!legalColor) addFoul(`${ball.name}未按顺序入袋`, ball.points);
                });
            }

            if (foulTypes.length > 0) {
                handleFoul(foulTypes, maxFoulPenalty, {
                    isMiss,
                    pottedWhite: !!pottedWhite,
                    pottedColors,
                    blackWasBallOn
                });
                return;
            }

            let validShot = false;
            let shouldEndTurn = false;
            let scored = 0;

            if (context.freeBallMode && context.freeBallTarget) {
                if (context.phase === 'red') {
                    scored = pottedReds.length + (pottedFreeBall ? 1 : 0);
                    if (pottedFreeBall && context.freeBallTarget.type === 'color') {
                        respotColorBall(context.freeBallTarget);
                    }
                    if (scored > 0) {
                        validShot = true;
                        phase = 'color';
                        nominatedColor = null;
                    } else {
                        shouldEndTurn = true;
                    }
                } else if (context.phase === 'color') {
                    if (pottedFreeBall || pottedBallsOn.length > 0) {
                        scored = context.ballOnValue;
                        validShot = true;
                        if (pottedFreeBall && context.freeBallTarget.type === 'color') {
                            respotColorBall(context.freeBallTarget);
                        }
                        pottedBallsOn.forEach(ball => {
                            if (ball.type === 'color') respotColorBall(ball);
                        });
                        setPhaseForNewVisit();
                    } else {
                        shouldEndTurn = true;
                    }
                } else if (context.phase === 'final') {
                    if (pottedFreeBall || pottedBallsOn.length > 0) {
                        scored = context.ballOnValue;
                        validShot = true;
                        if (pottedFreeBall && context.freeBallTarget.type === 'color') {
                            respotColorBall(context.freeBallTarget);
                        }
                        if (!getNextFinalColor()) {
                            scores[currentPlayer] += scored;
                            currentBreak += scored;
                            clearFreeBall();
                            endGame();
                            resetShotTracking();
                            return;
                        }
                    } else {
                        shouldEndTurn = true;
                    }
                }
                clearFreeBall();
            } else if (context.phase === 'red') {
                if (pottedReds.length > 0) {
                    scored = pottedReds.length;
                    validShot = true;
                    phase = 'color';
                    nominatedColor = null;
                } else {
                    shouldEndTurn = true;
                }
            } else if (context.phase === 'color') {
                if (pottedBallsOn.length > 0) {
                    const color = pottedBallsOn[0];
                    scored = color.points;
                    validShot = true;
                    respotColorBall(color);
                    setPhaseForNewVisit();
                } else {
                    shouldEndTurn = true;
                }
            } else if (context.phase === 'final') {
                if (pottedBallsOn.length > 0) {
                    const color = pottedBallsOn[0];
                    scored = color.points;
                    validShot = true;
                    if (!getNextFinalColor()) {
                        scores[currentPlayer] += scored;
                        currentBreak += scored;
                        endGame();
                        resetShotTracking();
                        return;
                    }
                } else {
                    shouldEndTurn = true;
                }
            }

            if (context.freeBallMode && !context.freeBallTarget) {
                clearFreeBall();
            }

            if (context.freeBallMode && context.freeBallTarget && !pottedFreeBall &&
                balls.includes(context.freeBallTarget) && freeBallCreatesIllegalSnooker(context.freeBallTarget)) {
                handleFoul(['利用自由球做成障碍球'], Math.max(4, context.ballOnValue), {
                    isMiss: false,
                    pottedWhite: false,
                    pottedColors: [],
                    blackWasBallOn: false
                });
                return;
            }

            if (validShot && scored > 0) {
                scores[currentPlayer] += scored;
                currentBreak += scored;
                showMessage(`+${scored}分，连续得分：${currentBreak}`);
                updateUI();
            }

            if (shouldEndTurn || !validShot) {
                endTurn();
            }

            resetShotTracking();
        }

        function isBallOn(ball, context = null) {
            const ctx = context || captureShotContext();
            if (!ball) return false;
            if (ctx.phase === 'red') return ball.type === 'red';
            return ctx.ballsOn.includes(ball);
        }

        function clearFreeBall() {
            freeBallMode = false;
            freeBallTarget = null;
        }

        function setPhaseForNewVisit() {
            nominatedColor = null;
            const remainingRed = balls.filter(ball => ball.type === 'red').length;
            if (remainingRed > 0) {
                phase = 'red';
                return;
            }
            phase = getNextFinalColor() ? 'final' : 'red';
        }

        function showLetPlayPanel(canRestore) {
            awaitingLetPlayDecision = true;
            syncLetPlayPanel(canRestore);
        }

        function hideLetPlayPanel() {
            awaitingLetPlayDecision = false;
            foulDecisionPlayer = null;
            syncLetPlayPanel();
        }

        function syncLetPlayPanel(canRestore = lastFoulWasMiss && !!shotSnapshot) {
            const showPanel = awaitingLetPlayDecision;
            const title = document.getElementById('letPlayTitle');
            const letPlayNo = document.getElementById('letPlayNo');
            const letPlayYes = document.getElementById('letPlayYes');
            const letPlayRestore = document.getElementById('letPlayRestore');

            const restoreNotice = canRestore ? '，或还原原位重打' : '';
            title.textContent = freeBallMode
                ? `你已获得自由球：可自己击球、要求犯规方继续${restoreNotice}`
                : `未获得自由球：可自己击球、要求犯规方继续${restoreNotice}`;
            letPlayNo.textContent = freeBallMode ? '自己击球（使用自由球）' : '自己击球';
            letPlayNo.style.display = showPanel ? 'inline-block' : 'none';
            letPlayYes.style.display = showPanel ? 'inline-block' : 'none';
            letPlayRestore.style.display = showPanel && canRestore ? 'inline-block' : 'none';
            document.getElementById('letPlayPanel').style.display = showPanel ? 'block' : 'none';
        }

        function handleFoul(foulTypes, penalty, options = {}) {
            const otherPlayer = 1 - currentPlayer;
            foul = true;
            foulType = foulTypes.join('+');
            lastFoulPenalty = Math.max(4, penalty || 4);
            lastFoulWasMiss = !!options.isMiss;
            foulDecisionPlayer = otherPlayer;
            currentBreak = 0;

            scores[otherPlayer] += lastFoulPenalty;
            uniqueBalls(options.pottedColors || []).forEach(ball => respotColorBall(ball));
            if (options.pottedWhite) resetWhiteBall();

            setPhaseForNewVisit();
            clearFreeBall();

            pottedThisShot = [];
            shotStarted = false;
            firstBallHit = null;
