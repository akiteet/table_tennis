            display: flex; flex-direction: column; justify-content: flex-end;
            border: 2px solid #444;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        .power-gauge {
            width: 100%; height: 0%;
            background: linear-gradient(to top,#00ff66,#66ff00,#ffff00,#ff9900,#ff3300);
            border-radius: 4px; transition: none;
        }
        .power-label { text-align: center; color: #d4a574; font-weight: 500; }
        .gauge-marker {
            position: absolute; left: 0; width: 100%;
            text-align: right; font-size: 11px; color: #888; font-weight: 500;
            padding-right: 5px; pointer-events: none;
        }

        .direction-control {
            width: 100%; aspect-ratio: 1;
            border-radius: 50%;
            background: linear-gradient(145deg,#2a2a2a,#1a1a1a);
            position: relative; cursor: crosshair;
            border: 3px solid #555;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 2px 10px rgba(255,255,255,0.05);
            max-width: 200px;
        }
        .direction-control::before {
            content: ''; position: absolute;
            top: 50%; left: 50%;
            width: 88%; height: 88%;
            transform: translate(-50%,-50%);
            border-radius: 50%; border: 1px dashed #444;
        }
        .direction-control::after {
            content: ''; position: absolute;
            top: 50%; left: 50%;
            width: 68%; height: 68%;
            transform: translate(-50%,-50%);
            border-radius: 50%; border: 1px dashed #333;
        }
        .direction-handle {
            width: 20px; height: 20px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%,#66ccff,#0088cc);
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            pointer-events: none;
            box-shadow: 0 0 12px rgba(0,170,255,0.6);
        }
        .direction-center {
            width: 8px; height: 8px; border-radius: 50%;
            background: radial-gradient(circle at 40% 40%,#fff,#ccc);
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
        }
        .direction-label { text-align: center; font-size: 14px; color: #aaa; margin-top: 3px; }

        .spin-control {
            width: 100%; aspect-ratio: 1;
            border-radius: 50%; position: relative; cursor: crosshair;
            touch-action: none; max-width: 180px;
            border: 3px solid #888;
            background: radial-gradient(circle at 35% 30%,#fff 0%,#e4e4e4 45%,#b7b7b7 100%);
            box-shadow: inset -8px -10px 18px rgba(0,0,0,0.22), 0 5px 14px rgba(0,0,0,0.4);
        }
        .spin-control::before, .spin-control::after {
            content: ''; position: absolute; background: rgba(0,0,0,0.15); pointer-events: none;
        }
        .spin-control::before { width: 1px; height: 90%; left: 50%; top: 5%; }
        .spin-control::after { width: 90%; height: 1px; left: 5%; top: 50%; }
        .spin-handle {
            width: 16px; height: 16px; border-radius: 50%;
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%,-50%);
            background: #c62828; border: 2px solid #fff;
            box-shadow: 0 2px 7px rgba(0,0,0,0.45); pointer-events: none;
        }
        .spin-axis-label {
            position: absolute; color: #222; font-size: 12px;
            font-weight: 700; pointer-events: none;
        }
        .spin-axis-label.top { top: 5px; left: 50%; transform: translateX(-50%); }
        .spin-axis-label.bottom { bottom: 5px; left: 50%; transform: translateX(-50%); }
        .spin-axis-label.left { left: 5px; top: 50%; transform: translateY(-50%); }
        .spin-axis-label.right { right: 5px; top: 50%; transform: translateY(-50%); }
        .spin-value { text-align: center; color: #d4a574; font-size: 13px; min-height: 18px; margin-top: 3px; }
        .spin-btn { font-size: 12px; padding: 3px 8px; color: #aaa; cursor: pointer; background: transparent; border: 1px solid #555; border-radius: 3px; margin-top: 2px; }
        .spin-btn:hover { color: #fff; border-color: #888; }

        .message {
            position: fixed; left: 50%; bottom: 110px;
            transform: translateX(-50%);
            font-size: 16px; color: #ff0;
            background: rgba(0,0,0,0.75);
            padding: 6px 16px; border-radius: 6px;
            white-space: nowrap; z-index: 100;
        }
        .guide-section {
            display: flex; align-items: center; gap: 4px;
        }
        .guide-section .section-label { font-size: 11px; color: #888; margin-right: 2px; }
        .guide-btn {
            font-size: 12px; padding: 3px 6px; border-radius: 3px;
            border: 1px solid #555; color: #999; cursor: pointer; background: transparent;
        }
        .guide-btn:hover { color: #fff; border-color: #888; }
        .guide-btn.active { color: #d4a574; border-color: #8a5a33; background: rgba(180,120,60,0.15); }
    </style>
</head>
<body>
    <nav class="top-nav" aria-label="页面导航">
        <div class="nav-title">九球台球 - 双人对战</div>
        <div class="nav-links">
            <a class="nav-link active" href="game_2d.html">本地游戏</a>
            <a class="nav-link" href="game_2d_online.html">联机游戏</a>
            <a class="nav-link" href="game_2d_rules.html">规则说明</a>
        </div>
    </nav>

    <main class="app-shell">
        <!-- 左列：力度 -->
        <div class="col-left">
            <div class="section-title">力度</div>
            <div class="power-gauge-container" id="powerContainer">
                <div class="gauge-marker high">Max</div>
                <div class="gauge-marker mid">50%</div>
                <div class="gauge-marker low">Min</div>
                <div class="power-gauge" id="powerGauge"></div>
            </div>
            <div class="power-label"><span id="powerLabel">0</span>%</div>
        </div>

        <!-- 中列：击球点 + 方向 -->
        <div class="col-mid">
            <div class="panel">
                <div class="section-title">击球点</div>
                <div class="spin-control" id="spinControl">
                    <span class="spin-axis-label top">高杆</span>
                    <span class="spin-axis-label bottom">低杆</span>
                    <span class="spin-axis-label left">左塞</span>
                    <span class="spin-axis-label right">右塞</span>
                    <div class="spin-handle" id="spinHandle"></div>
                </div>
                <div class="spin-value" id="spinValue">中心击球</div>
                <button class="spin-btn" type="button" onclick="resetCueSpin()">复位</button>
            </div>
            <div class="panel">
                <div class="section-title">方向</div>
                <div class="direction-control" id="directionControl">
                    <canvas id="directionTicks" width="200" height="200" style="position:absolute;top:0;left:0;pointer-events:none;"></canvas>
                    <div class="direction-center"></div>
                    <div class="direction-handle" id="directionHandle"></div>
                </div>
                <div class="direction-label"><span id="angleDisplay">0°</span></div>
                <div class="direction-label" style="font-size:9px;color:#555;">←→ 1°步进</div>
            </div>
        </div>

        <!-- 右列：球桌 + 控制台 -->
        <div class="col-right">
            <div class="table-stage">
                <canvas id="table" width="680" height="380"></canvas>
            </div>

            <!-- 底部控制台 -->
            <div class="console-bar">
                <!-- 记分板 -->
                <div class="console-group">
                    <div class="score-mini">
                        <div class="score-mini-item" id="scorePanel1">
                            <div class="score-mini-label" style="color:#4a8a4a;">玩家1</div>
                            <div class="score-mini-val" id="score1">0</div>
                            <div class="score-mini-break" id="break1">0</div>
                        </div>
                        <div class="score-mini-item" id="scorePanel2">
                            <div class="score-mini-label" style="color:#8a4a4a;">玩家2</div>
                            <div class="score-mini-val" id="score2">0</div>
                            <div class="score-mini-break" id="break2">0</div>
                        </div>
                    </div>
                </div>

                <!-- 引导线 -->
                <div class="console-group sep">
                    <div class="guide-section">
                        <span class="section-label">引导线</span>
                        <button class="guide-btn" id="guideOff" onclick="setGuideMode('off')">关</button>
                        <button class="guide-btn active" id="guideLong" onclick="setGuideMode('long')">长</button>
                        <button class="guide-btn" id="guideShort" onclick="setGuideMode('short')">短</button>
                    </div>
                </div>

                <!-- 状态 -->
                <div class="console-group sep">
                    <div class="status-chips">
                        <div class="chip">
                            <span class="chip-label">目标</span>
                            <span class="chip-val highlight" style="display:flex;align-items:center;gap:3px;">
                                <span class="target-indicator" id="targetIndicator" style="background:#FFD700;"></span>
                                <span id="currentTarget">1号球</span>
                            </span>
                        </div>
                        <div class="chip">
                            <span class="chip-label">阶段</span>
                            <span class="chip-val" id="phase">开球</span>
                        </div>
                        <div class="chip">
                            <span class="chip-label">犯规</span>
                            <span class="chip-val danger" id="foulCount">0</span>
                        </div>
                        <div class="chip">
                            <span class="chip-label">剩余</span>
                            <span class="chip-val highlight" id="remainingBalls">9</span>
                        </div>
                    </div>
                </div>

                <!-- 按钮 -->
                <div class="console-btns">
                    <button class="console-btn" id="pushOutBtn" onclick="declarePushOut()" style="display:none;">推杆</button>
                    <button class="console-btn" id="pushBackBtn" onclick="pushOutTakeShot()" style="display:none;">接手击球</button>
                    <button class="console-btn" id="pushTakeBtn" onclick="pushOutForceBack()" style="display:none;">推回对方</button>
                    <button class="console-btn" id="replayBtn" onclick="replayLastShot()" disabled>回放</button>
                    <button class="console-btn reset" onclick="resetGame()">重置</button>
                    <button class="console-btn shoot" id="shootBtn" onclick="shoot()">出杆</button>
                </div>
            </div>
        </div>

        <div class="message" id="message"></div>
    </main>

    <script>
        let canvas, ctx;
        let SCALE, TABLE_INNER_LENGTH, TABLE_INNER_WIDTH, BORDER, TABLE_WIDTH, TABLE_HEIGHT;
        let BALL_RADIUS, FRICTION, HOLE_RADIUS, BALL_DIAMETER, D_ZONE_RADIUS;
        let BAULK_LINE_X, D_ZONE_CENTER_X, D_ZONE_CENTER_Y;
        let holes;

        let balls = [];
        let whiteBall = null;
        let scores = [0, 0];
        let currentPlayer = 0;
        let currentBreak = 0;
        let phase = 'break';
        let pottedThisShot = [];
        let foul = false;
        let foulType = '';
        let isPlacingBall = false;
        let ballMoving = false;
        let gameStarted = false;
        let allBallsStopped = true;
        let firstBallHit = null;
        let shotStarted = false;
        let freeBallMode = false;
        let freeBallTarget = null;
        let shotSnapshot = null;
        let shotContext = null;
        let frameStarter = 0;
        let lastMessage = '';
        let currentShotReplay = [];
        let lastShotReplay = [];
        let replayRestoreFrame = null;
        let replayRestoreMessage = '';
        let isReplaying = false;
        let replayFrameIndex = 0;
        let replayLastFrameAt = 0;
        let replayCaptureCounter = 0;
        let consecutiveFouls = [0, 0];
        let cushionContactThisShot = false;
        let breakCushionCount = 0;
        let pushOutAvailable = false;
        let isPushOutShot = false;
        let awaitingPushOutDecision = false;

        let cueAngle = 0;
        let cuePower = 0;
        let cueSpinX = 0;
        let cueSpinY = 0;
        let activeShotSpinX = 0;
        let activeShotSpinY = 0;
        let activeShotAngle = 0;
        let activeShotSpeed = 0;
        let shotSpinApplied = false;
        let directionControlActive = false;
        let powerControlActive = false;
        let spinControlActive = false;

        let guideMode = 'short';
        const STOP_SPEED = 0.08;
        const BASE_SHOT_SPEED = 12;
        const HIGH_POWER_BOOST = 4;
        const CUSHION_RESTITUTION = 0.82;
        const TOP_SPIN_STRENGTH = 0.42;
        const SIDE_SPIN_CUSHION_STRENGTH = 0.24;
        const SIDE_SPIN_DECAY = 0.992;
        const REPLAY_FRAME_DURATION = 32;
        const REPLAY_CAPTURE_INTERVAL = 2;
        let audioContext = null;
        let lastBallSoundAt = 0;
        let lastCushionSoundAt = 0;

        const BALL_COLORS = [
            null,
            '#F4D000',
            '#0000FF',
            '#FF0000',
            '#800080',
            '#E87500',
            '#008000',
            '#800000',
            '#000000',
            '#F4D000'
        ];

        function getBallSwatch(number) {
            if (number === 9) {
                return 'linear-gradient(to bottom, #f7f7f2 0 25%, #F4D000 25% 75%, #f7f7f2 75% 100%)';
            }
            return BALL_COLORS[number] || '#fff';
        }

        function getShotSpeed(powerPercent) {
            const power = Math.max(0, Math.min(100, powerPercent)) / 100;
            return power * (BASE_SHOT_SPEED + HIGH_POWER_BOOST * power);
        }

        function getGameAudioContext() {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) return null;
            if (!audioContext) audioContext = new AudioContextClass();
            if (audioContext.state === 'suspended') audioContext.resume();
            return audioContext;
        }

        function playTone(frequency, endFrequency, duration, volume, type = 'sine') {
            const audio = getGameAudioContext();
            if (!audio) return;

            const now = audio.currentTime;
            const oscillator = audio.createOscillator();
            const gain = audio.createGain();
            oscillator.type = type;
            oscillator.frequency.setValueAtTime(Math.max(20, frequency), now);
            oscillator.frequency.exponentialRampToValueAtTime(Math.max(20, endFrequency), now + duration);
            gain.gain.setValueAtTime(Math.max(0.0001, volume), now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
            oscillator.connect(gain);
            gain.connect(audio.destination);
            oscillator.start(now);
            oscillator.stop(now + duration);
        }

        function playCueStrikeSound(powerPercent) {
            const strength = Math.max(0.15, Math.min(1, powerPercent / 100));
            playTone(420, 190, 0.032, 0.045 + strength * 0.075, 'triangle');
            playTone(2400, 1250, 0.012, 0.018 + strength * 0.028, 'sine');
        }

        function playBallCollisionSound(impactSpeed) {
            if (impactSpeed < 0.18) return;
            const now = performance.now();
            if (now - lastBallSoundAt < 12) return;
            lastBallSoundAt = now;
            const strength = Math.min(1, impactSpeed / BASE_SHOT_SPEED);
            playTone(1750 + strength * 520, 980, 0.018, 0.03 + strength * 0.075, 'sine');
            playTone(3100, 1800, 0.008, 0.008 + strength * 0.018, 'triangle');
        }

        function playCushionSound(impactSpeed) {
            if (impactSpeed < 0.25) return;
            const now = performance.now();
            if (now - lastCushionSoundAt < 18) return;
            lastCushionSoundAt = now;
            const strength = Math.min(1, impactSpeed / BASE_SHOT_SPEED);
            playTone(520, 245, 0.034, 0.018 + strength * 0.048, 'triangle');
            playTone(1350, 720, 0.012, 0.008 + strength * 0.016, 'sine');
        }

        function playPocketSound(ball) {
            const pitch = ball.type === 'white' ? 115 : 145;
            playTone(pitch, 55, 0.16, 0.085, 'sine');
            playTone(820, 280, 0.045, 0.032, 'triangle');
        }

        function setGuideMode(mode) {
            guideMode = mode;
            document.getElementById('guideOff').className = 'guide-btn' + (mode === 'off' ? ' active' : '');
            document.getElementById('guideLong').className = 'guide-btn' + (mode === 'long' ? ' active' : '');
            document.getElementById('guideShort').className = 'guide-btn' + (mode === 'short' ? ' active' : '');
        }

        document.addEventListener('DOMContentLoaded', function() {
            canvas = document.getElementById('table');
            ctx = canvas.getContext('2d');

            initGameConstants();
            canvas.width = TABLE_WIDTH;
            canvas.height = TABLE_HEIGHT;
            initResponsiveTable();

            initGame();
            initControls();
            drawDirectionTicks();

            canvas.addEventListener('click', handleCanvasClick);
            gameLoop();
        });

        function fitTableToStage() {
            if (!canvas) return;
            if (!window.matchMedia('(min-width: 1181px)').matches) {
                canvas.style.width = '';
                canvas.style.height = '';
                return;
            }

            const stage = canvas.closest('.table-stage');
            if (!stage || !stage.clientWidth) return;

            const style = getComputedStyle(canvas);
            const column = stage.parentElement;
            const columnStyle = getComputedStyle(column);
            const infoPanel = stage.nextElementSibling;
            const rowGap = parseFloat(columnStyle.rowGap) || 0;
            const borderWidth = parseFloat(style.borderLeftWidth) + parseFloat(style.borderRightWidth);
            const borderHeight = parseFloat(style.borderTopWidth) + parseFloat(style.borderBottomWidth);
            const availableWidth = Math.max(0, stage.clientWidth - borderWidth);
            const availableHeight = Math.max(
                0,
                column.clientHeight - (infoPanel?.offsetHeight || 0) - rowGap - borderHeight
            );
            const aspectRatio = canvas.width / canvas.height;
            const displayWidth = Math.min(availableWidth, availableHeight * aspectRatio);

            canvas.style.width = `${Math.floor(displayWidth)}px`;
            canvas.style.height = `${Math.floor(displayWidth / aspectRatio)}px`;
        }

        function initResponsiveTable() {
            const appShell = document.querySelector('.app-shell');
            const infoPanel = canvas.closest('.table-stage')?.nextElementSibling;
            let pendingFrame = 0;
            const scheduleFit = () => {
                if (pendingFrame) return;
                pendingFrame = requestAnimationFrame(() => {
                    pendingFrame = 0;
                    fitTableToStage();
                });
            };

            if ('ResizeObserver' in window) {
                const resizeObserver = new ResizeObserver(scheduleFit);
                if (appShell) resizeObserver.observe(appShell);
                if (infoPanel) resizeObserver.observe(infoPanel);
            }
            window.addEventListener('resize', scheduleFit);
            if (document.fonts?.ready) document.fonts.ready.then(scheduleFit);
            scheduleFit();
        }

        function initGameConstants() {
            SCALE = 0.2;
            TABLE_INNER_LENGTH = Math.round(2540 * SCALE);
            TABLE_INNER_WIDTH = Math.round(1270 * SCALE);
            BORDER = Math.round(30 * SCALE);
            TABLE_WIDTH = TABLE_INNER_LENGTH + BORDER * 2;
            TABLE_HEIGHT = TABLE_INNER_WIDTH + BORDER * 2;

            BALL_RADIUS = Math.round(52.5 * SCALE / 2);
            FRICTION = 0.985;
            HOLE_RADIUS = Math.max(BALL_RADIUS + 4, Math.round(52.5 * SCALE));

            BALL_DIAMETER = BALL_RADIUS * 2;
            D_ZONE_RADIUS = Math.round(292 * SCALE);

            BAULK_LINE_X = BORDER + Math.round(TABLE_INNER_LENGTH / 4);
            D_ZONE_CENTER_X = BAULK_LINE_X;
            D_ZONE_CENTER_Y = TABLE_HEIGHT / 2;

            const offset = HOLE_RADIUS * 0.3;
            holes = [
                { x: BORDER - offset, y: BORDER - offset },
                { x: BORDER + TABLE_INNER_LENGTH / 2, y: BORDER - offset * 1.2 },
                { x: BORDER + TABLE_INNER_LENGTH + offset, y: BORDER - offset },
                { x: BORDER - offset, y: BORDER + TABLE_INNER_WIDTH + offset },
                { x: BORDER + TABLE_INNER_LENGTH / 2, y: BORDER + TABLE_INNER_WIDTH + offset * 1.2 },
                { x: BORDER + TABLE_INNER_LENGTH + offset, y: BORDER + TABLE_INNER_WIDTH + offset }
            ];
        }

        function initGame() {
            balls = [];
            scores = [0, 0];
            currentPlayer = frameStarter;
            currentBreak = 0;
            phase = 'break';
            pottedThisShot = [];
            foul = false;
            foulType = '';
            isPlacingBall = true;
            ballMoving = false;
            gameStarted = false;
            allBallsStopped = true;
            freeBallMode = false;
            freeBallTarget = null;
            shotSnapshot = null;
            shotContext = null;
            currentShotReplay = [];
            lastShotReplay = [];
            replayRestoreFrame = null;
            isReplaying = false;
            replayFrameIndex = 0;
            replayLastFrameAt = 0;
            consecutiveFouls = [0, 0];
            pushOutAvailable = false;

            whiteBall = createBall(D_ZONE_CENTER_X, TABLE_HEIGHT / 2, 'white', 'white', 0);
            balls.push(whiteBall);

            const rackX = BORDER + TABLE_INNER_LENGTH * 0.75;
            const rackY = TABLE_HEIGHT / 2;
            const spacing = BALL_RADIUS * 2.05;

            const rackPositions = [
                { row: 0, col: 0 },
                { row: 1, col: -1 },
                { row: 1, col: 1 },
                { row: 2, col: -2 },
                { row: 2, col: 0 },
                { row: 2, col: 2 },
                { row: 3, col: -1 },
                { row: 3, col: 1 },
                { row: 4, col: 0 }
            ];

            const ballNumbers = [1, 2, 3, 4, 9, 5, 6, 7, 8];

            rackPositions.forEach((pos, index) => {
                const x = rackX + pos.row * spacing * 0.866;
                const y = rackY + pos.col * spacing / 2;
                const ballNumber = ballNumbers[index];
                balls.push(createBall(x, y, BALL_COLORS[ballNumber], 'numbered', ballNumber));
            });

            cueAngle = 0;
            cuePower = 0;
            cueSpinX = 0;
            cueSpinY = 0;
            activeShotSpinX = 0;
            activeShotSpinY = 0;
            activeShotAngle = 0;
            activeShotSpeed = 0;
            shotSpinApplied = false;
            updatePowerGauge();
            updateDirectionHandle();
            updateSpinControl();
            updateUI();
            
            console.log('初始化后球数量:', balls.length);
            console.log('所有球:', balls);
            
            showMessage('玩家1：请在D区点击放置白球');
        }

        function createBall(x, y, color, type, number) {
            return { x, y, vx: 0, vy: 0, sideSpin: 0, color, type, number, defaultX: x, defaultY: y };
        }

        function getSmallestBallOnTable() {
            const numberedBalls = balls.filter(b => b.type === 'numbered');
            if (numberedBalls.length === 0) return null;
            return numberedBalls.reduce((min, ball) => ball.number < min.number ? ball : min);
        }

        function isLegalFirstHit(ball, smallest) {
            if (!smallest) return false;
            return ball === smallest;
        }

        function resetShotTracking() {
            pottedThisShot = [];
            foul = false;
            foulType = '';
            shotStarted = false;
            firstBallHit = null;
            shotContext = null;
        }

        function captureShotContext() {
            const smallest = getSmallestBallOnTable();
            return {
                phase,
                smallestBall: smallest,
                smallestBallNumber: smallest ? smallest.number : null,
                freeBallMode,
                freeBallTarget
            };
        }

        function captureShotSnapshot() {
            return {
                balls: balls.map(ball => ({
                    x: ball.x,
                    y: ball.y,
                    vx: 0,
                    vy: 0,
                    color: ball.color,
                    type: ball.type,
                    number: ball.number,
                    defaultX: ball.defaultX,
                    defaultY: ball.defaultY,
                    isWhite: ball === whiteBall
                })),
                phase,
                isPlacingBall,
                consecutiveFouls: [...consecutiveFouls]
            };
        }

        function restoreShotSnapshot(snapshot) {
            if (!snapshot) return;
            balls = snapshot.balls.map(data => {
                const ball = createBall(data.x, data.y, data.color, data.type, data.number);
                ball.vx = 0;
                ball.vy = 0;
                ball.defaultX = data.defaultX;
                ball.defaultY = data.defaultY;
                return ball;
            });
            whiteBall = balls.find(ball => ball.type === 'white') || null;
            phase = snapshot.phase;
            isPlacingBall = snapshot.isPlacingBall;
            consecutiveFouls = snapshot.consecutiveFouls || [0, 0];
            ballMoving = false;
            allBallsStopped = true;
        }

        function initControls() {
            const directionControl = document.getElementById('directionControl');
            const powerContainer = document.getElementById('powerContainer');
            const spinControl = document.getElementById('spinControl');

            directionControl.addEventListener('mousedown', (e) => {
                if (isTableInMotion() || !gameStarted) return;
                directionControlActive = true;
                updateDirectionFromControl(e);
            });
            document.addEventListener('mousemove', (e) => {
                if (directionControlActive) {
                    updateDirectionFromControl(e);
                }
                if (powerControlActive) {
                    updatePowerFromGauge(e);
                }
            });
            document.addEventListener('mouseup', () => {
                directionControlActive = false;
                powerControlActive = false;
            });

            spinControl.addEventListener('pointerdown', (e) => {
                if (isTableInMotion() || !gameStarted) return;
                spinControlActive = true;
                updateSpinFromControl(e);
                spinControl.setPointerCapture?.(e.pointerId);
            });
            document.addEventListener('pointermove', (e) => {
                if (spinControlActive) updateSpinFromControl(e);
            });
            document.addEventListener('pointerup', () => {
                spinControlActive = false;
            });

            powerContainer.addEventListener('mousedown', (e) => {
                if (isTableInMotion() || !gameStarted) return;
                powerControlActive = true;
                updatePowerFromGauge(e);
            });

            document.addEventListener('keydown', (e) => {
                if (isTableInMotion() || !gameStarted) return;
                const step = e.shiftKey ? 0.001745 : 0.01745;
                if (e.key === 'ArrowLeft') cueAngle -= step;
                if (e.key === 'ArrowRight') cueAngle += step;
                if (e.key === 'ArrowUp' && cuePower < 100) cuePower += 1;
                if (e.key === 'ArrowDown' && cuePower > 0) cuePower -= 1;
                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    shoot();
                }
                updatePowerGauge();
                updateDirectionHandle();
                updateAngleDisplay();
            });
        }

        function updateDirectionFromControl(e) {
            const control = document.getElementById('directionControl');
            const rect = control.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const dx = e.clientX - centerX;
            const dy = e.clientY - centerY;
            const newAngle = Math.atan2(dy, dx);

            const diff = newAngle - cueAngle;
            const normalizedDiff = Math.atan2(Math.sin(diff), Math.cos(diff));
            cueAngle = newAngle;
            updateDirectionHandle();
            updateAngleDisplay();
        }

        function updateAngleDisplay() {
            const angleDeg = (-cueAngle * 180 / Math.PI).toFixed(2);
            document.getElementById('angleDisplay').textContent = angleDeg + '°';
        }

        function updateDirectionHandle() {
            const handle = document.getElementById('directionHandle');
            const control = document.getElementById('directionControl');
            const radius = Math.max(0, (control.clientWidth || 200) / 2 - 15);
            const x = Math.cos(cueAngle) * radius;
            const y = Math.sin(cueAngle) * radius;
            handle.style.left = `calc(50% + ${x}px)`;
            handle.style.top = `calc(50% + ${y}px)`;
        }

        function updatePowerFromGauge(e) {
            const container = document.getElementById('powerContainer');
            const rect = container.getBoundingClientRect();
            const y = rect.bottom - e.clientY;
            const height = rect.height - 20;
            cuePower = Math.max(0, Math.min(100, (y / height) * 100));
            updatePowerGauge();
        }

        function updatePowerGauge() {
            document.getElementById('powerGauge').style.height = `${cuePower}%`;
            document.getElementById('powerLabel').textContent = Math.round(cuePower);
        }

        function updateSpinFromControl(e) {
            const control = document.getElementById('spinControl');
            const rect = control.getBoundingClientRect();
            const radius = Math.min(rect.width, rect.height) * 0.38;
            let dx = e.clientX - (rect.left + rect.width / 2);
            let dy = e.clientY - (rect.top + rect.height / 2);
            const distance = Math.hypot(dx, dy);
            if (distance > radius) {
                dx = dx / distance * radius;
                dy = dy / distance * radius;
            }
            cueSpinX = dx / radius;
            cueSpinY = -dy / radius;
            updateSpinControl();
        }

        function updateSpinControl() {
            const handle = document.getElementById('spinHandle');
            const value = document.getElementById('spinValue');
            if (!handle || !value) return;
            handle.style.left = `calc(50% + ${cueSpinX * 50}px)`;
            handle.style.top = `calc(50% - ${cueSpinY * 50}px)`;

            const labels = [];
            if (Math.abs(cueSpinY) >= 0.08) {
                labels.push(`${cueSpinY > 0 ? '高杆' : '低杆'} ${Math.round(Math.abs(cueSpinY) * 100)}%`);
            }
            if (Math.abs(cueSpinX) >= 0.08) {
                labels.push(`${cueSpinX > 0 ? '右塞' : '左塞'} ${Math.round(Math.abs(cueSpinX) * 100)}%`);
            }
            value.textContent = labels.length ? labels.join(' · ') : '中心击球';
        }

        function resetCueSpin() {
            if (isTableInMotion()) return;
            cueSpinX = 0;
            cueSpinY = 0;
            updateSpinControl();
        }

        function handleCanvasClick(e) {
            const rect = canvas.getBoundingClientRect();
            const style = getComputedStyle(canvas);
            const borderLeft = parseFloat(style.borderLeftWidth);
            const borderTop = parseFloat(style.borderTopWidth);
            const contentWidth = rect.width - borderLeft - parseFloat(style.borderRightWidth);
            const contentHeight = rect.height - borderTop - parseFloat(style.borderBottomWidth);
            const mx = (e.clientX - rect.left - borderLeft) * canvas.width / contentWidth;
            const my = (e.clientY - rect.top - borderTop) * canvas.height / contentHeight;

            if (isPlacingBall && !isTableInMotion()) {
                const isValid = freeBallMode ? isValidAnyPosition(mx, my) : isValidBallPosition(mx, my);
                if (isValid) {
                    whiteBall.x = mx;
                    whiteBall.y = my;
                    isPlacingBall = false;
                    if (freeBallMode) {
                        freeBallMode = false;
                        freeBallTarget = null;
                        gameStarted = true;
                        updateUI();
                        showMessage(`玩家${currentPlayer + 1}：白球已放置，调整方向和力度后点击"出杆"`);
                    } else {
                        gameStarted = true;
                        updateUI();
                        showMessage(`玩家${currentPlayer + 1}：调整方向和力度后点击"出杆"`);
                    }
                } else {
                    showMessage(freeBallMode ? '请将白球放置在台面有效区域内' : '请将白球放置在发球线后');
                }
                return;
            }

            if (isTableInMotion() || !gameStarted) return;

            if (freeBallMode && !freeBallTarget) {
                for (const ball of balls) {
                    if (ball.type !== 'white') {
                        const dx = ball.x - mx;
                        const dy = ball.y - my;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < BALL_RADIUS * 2) {
                            freeBallTarget = ball;
                            showMessage(`已选择自由球：${ball.number}号球，现在可以击打`);
                            updateUI();
                            return;
                        }
                    }
                }
                showMessage('请点击任意非白球作为自由球');
                return;
            }

            const dx = mx - whiteBall.x;
            const dy = my - whiteBall.y;
            cueAngle = Math.atan2(dy, dx);
            updateDirectionHandle();
        }

        function declarePushOut() {
            if (isTableInMotion() || !gameStarted) return;
            if (isPlacingBall) {
                showMessage('请先放置白球');
                return;
            }
            showMessage('推杆：已声明推杆，此杆不受犯规限制');
            doShoot(true);
        }

        function shoot() {
            if (isTableInMotion() || !gameStarted) return;
            if (isPlacingBall) {
                showMessage('请先放置白球');
                return;
            }
            doShoot(false);
        }

        function doShoot(isPushOut) {
            const speed = getShotSpeed(cuePower);
            isPushOutShot = isPushOut;
            shotSnapshot = captureShotSnapshot();
            shotContext = captureShotContext();
            startShotReplayCapture();
            activeShotSpinX = cueSpinX;
            activeShotSpinY = cueSpinY;
            activeShotAngle = cueAngle;
            activeShotSpeed = speed;
            shotSpinApplied = false;
            whiteBall.sideSpin = activeShotSpinX;
            cueSpinX = 0;
            cueSpinY = 0;
            updateSpinControl();
            whiteBall.vx = Math.cos(cueAngle) * speed;
            whiteBall.vy = Math.sin(cueAngle) * speed;
            playCueStrikeSound(cuePower);

            ballMoving = true;
            allBallsStopped = false;
            shotStarted = true;
            firstBallHit = null;
            pottedThisShot = [];
            foul = false;
            cushionContactThisShot = false;
            if (phase === 'break') breakCushionCount = 0;

            document.getElementById('shootBtn').disabled = true;
            showMessage('击球中...');
        }

        function isValidBallPosition(x, y) {
            if (x > BAULK_LINE_X) return false;
            if (x < BORDER + BALL_RADIUS) return false;
            if (y < BORDER + BALL_RADIUS) return false;
            if (y > TABLE_HEIGHT - BORDER - BALL_RADIUS) return false;

            for (let ball of balls) {
                if (ball === whiteBall) continue;
                const dx = x - ball.x;
                const dy = y - ball.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < BALL_RADIUS * 2.5) {
                    return false;
                }
            }
            return true;
        }

        function isValidAnyPosition(x, y) {
            if (x < BORDER + BALL_RADIUS) return false;
            if (x > TABLE_WIDTH - BORDER - BALL_RADIUS) return false;
            if (y < BORDER + BALL_RADIUS) return false;
            if (y > TABLE_HEIGHT - BORDER - BALL_RADIUS) return false;

            for (let ball of balls) {
                if (ball === whiteBall) continue;
                const dx = x - ball.x;
                const dy = y - ball.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < BALL_RADIUS * 2.5) {
                    return false;
                }
            }
            return true;
        }

        function updateBalls() {
            balls.forEach(ball => {
                ball.vx *= FRICTION;
                ball.vy *= FRICTION;
                ball.sideSpin = (ball.sideSpin || 0) * SIDE_SPIN_DECAY;
            });

            const maxSpeed = balls.reduce((max, ball) => Math.max(max, Math.hypot(ball.vx, ball.vy)), 0);
            const substeps = Math.max(1, Math.min(8, Math.ceil(maxSpeed / Math.max(BALL_RADIUS * 0.75, 1))));

            for (let step = 0; step < substeps; step++) {
                const previousWhitePosition = whiteBall && balls.includes(whiteBall)
                    ? { x: whiteBall.x, y: whiteBall.y }
                    : null;

                balls.forEach(ball => {
                    ball.x += ball.vx / substeps;
                    ball.y += ball.vy / substeps;
                    resolveCushionCollision(ball);
                });

                if (previousWhitePosition && whiteBall && balls.includes(whiteBall)) {
                    detectFirstBallHitAlongWhitePath(previousWhitePosition.x, previousWhitePosition.y, whiteBall.x, whiteBall.y);
                }

                if (ballMoving) checkHoles();
                for (let i = 0; i < balls.length; i++) {
                    for (let j = i + 1; j < balls.length; j++) {
                        ballCollision(balls[i], balls[j]);
                    }
                }
            }

            captureShotReplayFrame();

            if (!isAnyBallMoving() && ballMoving) {
                stopAllBalls();
                ballMoving = false;
            }

            if (!ballMoving && !allBallsStopped) {
                allBallsStopped = true;
                finalizeShotReplayCapture();
                updateUI();
                processShotResult();
            }
        }

        function resolveCushionCollision(ball) {
            let nearHole = false;
            const holeDirection = { x: 0, y: 0 };
            holes.forEach(hole => {
                const dx = ball.x - hole.x;
                const dy = ball.y - hole.y;
                const dist = Math.hypot(dx, dy);
                if (dist < HOLE_RADIUS + BALL_RADIUS * 2) {
                    nearHole = true;
                    if (dist > 0) {
                        holeDirection.x += dx / dist;
                        holeDirection.y += dy / dist;
                    }
                }
            });

            if (nearHole) return;
            const incomingVx = ball.vx;
            const incomingVy = ball.vy;
            let verticalSide = 0;
            let horizontalSide = 0;
            if (ball.x < BORDER + BALL_RADIUS && holeDirection.x < 0.5) {
                ball.x = BORDER + BALL_RADIUS;
                ball.vx *= -CUSHION_RESTITUTION;
                verticalSide = -1;
            } else if (ball.x > TABLE_WIDTH - BORDER - BALL_RADIUS && holeDirection.x > -0.5) {
                ball.x = TABLE_WIDTH - BORDER - BALL_RADIUS;
                ball.vx *= -CUSHION_RESTITUTION;
                verticalSide = 1;
            }
            if (ball.y < BORDER + BALL_RADIUS && holeDirection.y < 0.5) {
                ball.y = BORDER + BALL_RADIUS;
                ball.vy *= -CUSHION_RESTITUTION;
                horizontalSide = -1;
            } else if (ball.y > TABLE_HEIGHT - BORDER - BALL_RADIUS && holeDirection.y > -0.5) {
                ball.y = TABLE_HEIGHT - BORDER - BALL_RADIUS;
                ball.vy *= -CUSHION_RESTITUTION;
                horizontalSide = 1;
            }

            if (ball === whiteBall && Math.abs(ball.sideSpin || 0) > 0.001) {
                if (verticalSide) {
                    ball.vy += ball.sideSpin * Math.abs(incomingVx) *
                        SIDE_SPIN_CUSHION_STRENGTH * verticalSide;
                }
                if (horizontalSide) {
                    ball.vx -= ball.sideSpin * Math.abs(incomingVy) *
                        SIDE_SPIN_CUSHION_STRENGTH * horizontalSide;
                }
                if (verticalSide || horizontalSide) ball.sideSpin *= 0.78;
            }
            if (verticalSide || horizontalSide) {
                cushionContactThisShot = true;
                if (phase === 'break' && ball.type === 'numbered') {
                    breakCushionCount++;
                }
                playCushionSound(Math.max(Math.abs(incomingVx), Math.abs(incomingVy)));
            }
        }

        function isAnyBallMoving() {
            return balls.some(ball => Math.hypot(ball.vx, ball.vy) > STOP_SPEED);
        }

        function isTableInMotion() {
            return isReplaying || ballMoving || !allBallsStopped || isAnyBallMoving();
        }

        function stopAllBalls() {
            balls.forEach(ball => {
                ball.vx = 0;
                ball.vy = 0;
            });
        }

        function checkHoles() {
            const toRemove = [];
            balls.forEach(ball => {
                holes.forEach(hole => {
                    const dx = ball.x - hole.x;
                    const dy = ball.y - hole.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < HOLE_RADIUS + BALL_RADIUS * 0.5) {
                        if (!pottedThisShot.includes(ball)) {
                            pottedThisShot.push(ball);
                            toRemove.push(ball);
                            playPocketSound(ball);
                        }
                    }
                });
            });
            balls = balls.filter(b => !toRemove.includes(b));
        }

        function captureReplayFrame(sourceBalls = balls) {
            return sourceBalls.map(ball => ({
                id: ball.id,
                x: ball.x,
                y: ball.y,
                color: ball.color,
                type: ball.type,
                number: ball.number,
                defaultX: ball.defaultX,
                defaultY: ball.defaultY
            }));
        }

        function startShotReplayCapture() {
            currentShotReplay = [captureReplayFrame()];
            replayCaptureCounter = 0;
        }

        function captureShotReplayFrame(force = false) {
            if (currentShotReplay.length === 0) return;
            replayCaptureCounter++;
            if (!force && replayCaptureCounter % REPLAY_CAPTURE_INTERVAL !== 0) return;
            currentShotReplay.push(captureReplayFrame());
        }

        function finalizeShotReplayCapture() {
            captureShotReplayFrame(true);
            if (currentShotReplay.length > 1) {
                lastShotReplay = currentShotReplay;
            }
            currentShotReplay = [];
            updateReplayButton();
        }

        function applyReplayFrame(frame) {
            balls = frame.map(data => ({
                id: data.id,
                x: data.x,
                y: data.y,
                vx: 0,
                vy: 0,
                color: data.color,
                type: data.type,
                number: data.number,
                defaultX: data.defaultX,
                defaultY: data.defaultY
            }));
            whiteBall = balls.find(ball => ball.type === 'white') || null;
        }

        function replayLastShot() {
            if (isReplaying || isTableInMotion() || lastShotReplay.length < 2) return;
            replayRestoreFrame = {
                balls,
                whiteBall,
                freeBallTarget,
                consecutiveFouls: [...consecutiveFouls]
            };
            replayRestoreMessage = lastMessage;
            isReplaying = true;
            replayFrameIndex = 0;
            replayLastFrameAt = 0;
            applyReplayFrame(lastShotReplay[0]);
            showMessage('精彩回放中...');
            updateReplayButton();
        }

        function updateReplayPlayback(timestamp) {
            if (!isReplaying) return;
            if (!replayLastFrameAt) {
                replayLastFrameAt = timestamp;
                return;
            }
            if (timestamp - replayLastFrameAt < REPLAY_FRAME_DURATION) return;

            replayLastFrameAt = timestamp;
            replayFrameIndex++;
            if (replayFrameIndex >= lastShotReplay.length) {
                finishReplay();
                return;
            }
            applyReplayFrame(lastShotReplay[replayFrameIndex]);
        }

        function finishReplay() {
            if (replayRestoreFrame) {
                balls = replayRestoreFrame.balls;
                whiteBall = replayRestoreFrame.whiteBall;
                freeBallTarget = replayRestoreFrame.freeBallTarget;
                consecutiveFouls = replayRestoreFrame.consecutiveFouls || [0, 0];
            }
            replayRestoreFrame = null;
            isReplaying = false;
            replayFrameIndex = 0;
            replayLastFrameAt = 0;
            showMessage(replayRestoreMessage);
            updateUI();
        }

        function updateReplayButton() {
            const button = document.getElementById('replayBtn');
            if (!button) return;
            button.disabled = isReplaying || lastShotReplay.length < 2 ||
                ballMoving || !allBallsStopped || isAnyBallMoving();
            button.textContent = isReplaying ? '回放中...' : '回放';
        }

        function updatePushOutBtn() {
            const btn = document.getElementById('pushOutBtn');
            if (!btn) return;
            btn.style.display = pushOutAvailable && gameStarted && !isTableInMotion() && !isPlacingBall ? 'inline-block' : 'none';
        }

        function detectFirstBallHitAlongWhitePath(startX, startY, endX, endY) {
            if (!shotStarted || firstBallHit || !whiteBall) return;

            const dx = endX - startX;
            const dy = endY - startY;
            const a = dx * dx + dy * dy;
            if (a <= 0) return;

            const collisionDistance = BALL_RADIUS * 2;
            let earliestBall = null;
            let earliestT = Infinity;

            for (const ball of balls) {
                if (ball === whiteBall) continue;

                const fx = startX - ball.x;
                const fy = startY - ball.y;
                const b = 2 * (fx * dx + fy * dy);
                const c = fx * fx + fy * fy - collisionDistance * collisionDistance;
                const discriminant = b * b - 4 * a * c;
                if (discriminant < 0) continue;

                const sqrtDiscriminant = Math.sqrt(discriminant);
                const t1 = (-b - sqrtDiscriminant) / (2 * a);
                const t2 = (-b + sqrtDiscriminant) / (2 * a);
                const t = t1 >= 0 ? t1 : t2;

                if (t >= 0 && t <= 1 && t < earliestT) {
                    earliestT = t;
                    earliestBall = ball;
                }
            }

            if (earliestBall) {
                firstBallHit = earliestBall;
            }
        }

        function ballCollision(b1, b2) {
            const dx = b2.x - b1.x;
            const dy = b2.y - b1.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < BALL_RADIUS * 2) {
                if (shotStarted && !firstBallHit) {
                    if (b1 === whiteBall) firstBallHit = b2;
                    else if (b2 === whiteBall) firstBallHit = b1;
                }

                const overlap = BALL_RADIUS * 2 - dist;
                const nx = dx / dist;
                const ny = dy / dist;

                b1.x -= nx * overlap / 2;
                b1.y -= ny * overlap / 2;
                b2.x += nx * overlap / 2;
                b2.y += ny * overlap / 2;

                const dvx = b1.vx - b2.vx;
                const dvy = b1.vy - b2.vy;
                const dvn = dvx * nx + dvy * ny;

                if (dvn > 0) {
                    playBallCollisionSound(dvn);
                    b1.vx -= dvn * nx;
                    b1.vy -= dvn * ny;
                    b2.vx += dvn * nx;
                    b2.vy += dvn * ny;

                    if (!shotSpinApplied && (b1 === whiteBall || b2 === whiteBall)) {
                        applyCueSpinAfterFirstCollision();
                    }
                }
            }
        }

        function applyCueSpinAfterFirstCollision() {
            if (!whiteBall || shotSpinApplied) return;
            const followVelocity = activeShotSpinY * activeShotSpeed * TOP_SPIN_STRENGTH;
            whiteBall.vx += Math.cos(activeShotAngle) * followVelocity;
            whiteBall.vy += Math.sin(activeShotAngle) * followVelocity;
            whiteBall.sideSpin = activeShotSpinX;
            shotSpinApplied = true;
        }

        function isSpotOccupied(x, y) {
            const tolerance = BALL_DIAMETER - 0.1;
            for (const ball of balls) {
                const dx = ball.x - x;
                const dy = ball.y - y;
                if (Math.sqrt(dx * dx + dy * dy) < tolerance) {
                    return true;
                }
            }
            return false;
        }

        function respotNineBall() {
            const nineBall = pottedThisShot.find(b => b.number === 9);
            if (!nineBall) return;

            const spotX = BORDER + TABLE_INNER_LENGTH * 0.75;
            const spotY = TABLE_HEIGHT / 2;

            if (!isSpotOccupied(spotX, spotY)) {
                nineBall.x = spotX;
                nineBall.y = spotY;
                nineBall.vx = 0;
                nineBall.vy = 0;
                balls.push(nineBall);
                return;
            }

            for (let offset = BALL_DIAMETER; offset < TABLE_INNER_LENGTH / 2; offset += BALL_DIAMETER) {
                for (const [dx, dy] of [[offset, 0], [-offset, 0], [0, offset], [0, -offset]]) {
                    const testX = spotX + dx;
                    const testY = spotY + dy;
                    if (testX >= BORDER + BALL_RADIUS && testX <= TABLE_WIDTH - BORDER - BALL_RADIUS &&
                        testY >= BORDER + BALL_RADIUS && testY <= TABLE_HEIGHT - BORDER - BALL_RADIUS &&
                        !isSpotOccupied(testX, testY)) {
                        nineBall.x = testX;
                        nineBall.y = testY;
                        nineBall.vx = 0;
                        nineBall.vy = 0;
                        balls.push(nineBall);
                        return;
                    }
                }
            }

            nineBall.x = spotX;
            nineBall.y = spotY;
            nineBall.vx = 0;
            nineBall.vy = 0;
            balls.push(nineBall);
        }

        function processShotResult() {
            const context = shotContext || captureShotContext();
            const pottedWhite = pottedThisShot.find(ball => ball.type === 'white');
            const pottedNumbered = pottedThisShot.filter(ball => ball.type === 'numbered');
            const pottedNine = pottedThisShot.find(ball => ball.number === 9);
            const hitLowest = firstBallHit && isLegalFirstHit(firstBallHit, context.smallestBall);

            if (isPushOutShot) {
                isPushOutShot = false;
                pushOutAvailable = false;
                if (pottedNine) {
                    respotNineBall();
                }
                if (pottedWhite) {
                    whiteBall.x = D_ZONE_CENTER_X;
                    whiteBall.y = TABLE_HEIGHT / 2;
                    whiteBall.vx = 0;
                    whiteBall.vy = 0;
                    if (!balls.includes(whiteBall)) balls.push(whiteBall);
                }
                awaitingPushOutDecision = true;
                showMessage(`推杆完成！对手有权选择：接手击球 / 推回给玩家${currentPlayer + 1}`);
                updateUI();
                return;
            }

            let foulTypes = [];

            const addFoul = (reason) => {
                foulTypes.push(reason);
            };

            if (!firstBallHit) {
                addFoul('空杆');
            } else if (!hitLowest) {
                const smallest = context.smallestBall;
                addFoul(`未先击中最小号球 ${smallest ? smallest.number : '?'}号`);
            } else if (pottedNumbered.length === 0 && !cushionContactThisShot) {
                addFoul('未触库：球未入袋且无球碰库');
            }

            if (pottedWhite) {
                addFoul('白球落袋');
            }

            let breakIllegal = false;
            if (phase === 'break' && foulTypes.length === 0) {
                if (pottedNumbered.length === 0 && breakCushionCount < 4) {
                    breakIllegal = true;
                }
            }

            if (foulTypes.length > 0) {
                handleFoul(foulTypes, { pottedNine: !!pottedNine, pottedWhite: !!pottedWhite });
                return;
            }

            if (breakIllegal) {
                showMessage(`开球违规：无球入袋，仅 ${breakCushionCount} 球碰库（需≥4）。对手获得自由球`);
                handleFoul([`开球违规（仅${breakCushionCount}球碰库）`], { pottedNine: !!pottedNine, pottedWhite: !!pottedWhite });
                return;
            }

            if (pottedNine) {
                scores[currentPlayer]++;
                showMessage(`玩家${currentPlayer + 1}打入9号球，赢得此局！比分 ${scores[0]}:${scores[1]}`);
                updateUI();
                setTimeout(() => startNewRack(), 1500);
                return;
            }

            if (pottedNumbered.length > 0) {
                consecutiveFouls[currentPlayer] = 0;
                if (phase === 'break') {
                    phase = 'normal';
                }
                pushOutAvailable = false;
                currentBreak += pottedNumbered.length;
                showMessage(`进球！继续击球`);
                updateUI();
                resetShotTracking();
                return;
            }

            if (phase === 'break') {
                pushOutAvailable = true;
            } else {
                pushOutAvailable = false;
            }
            endTurn();
            resetShotTracking();
        }

        function isBallOn(ball, context = null) {
            const ctx = context || captureShotContext();
            if (!ball) return false;
            if (ctx.freeBallMode && ctx.freeBallTarget) {
                return ball === ctx.freeBallTarget;
            }
            return ball === ctx.smallestBall;
        }

        function clearFreeBall() {
            freeBallMode = false;
            freeBallTarget = null;
        }

        function handleFoul(foulTypes, options = {}) {
            const otherPlayer = 1 - currentPlayer;
            currentBreak = 0;
            pushOutAvailable = false;

            consecutiveFouls[currentPlayer]++;
            if (consecutiveFouls[currentPlayer] >= 3) {
                showMessage(`玩家${currentPlayer + 1}连续三次犯规，判负！玩家${otherPlayer + 1}获胜！`);
                scores[otherPlayer]++;
                endGame();
                return;
            }

            if (options.pottedNine) {
                respotNineBall();
            }

            if (options.pottedWhite) {
                whiteBall.x = D_ZONE_CENTER_X;
                whiteBall.y = TABLE_HEIGHT / 2;
                whiteBall.vx = 0;
                whiteBall.vy = 0;
                if (!balls.includes(whiteBall)) {
                    balls.push(whiteBall);
                }
            }

            pottedThisShot = [];
            shotStarted = false;
            firstBallHit = null;
            shotContext = null;

            currentPlayer = otherPlayer;
            phase = 'normal';
            freeBallMode = true;
            isPlacingBall = true;

            showMessage(`犯规（${foulTypes.join('+')}）！玩家${otherPlayer + 1}获得自由球，请在台面任意位置点击放置白球`);
            updateUI();
        }

        function resetWhiteBall() {
            const index = balls.indexOf(whiteBall);
            if (index === -1) {
                whiteBall.x = D_ZONE_CENTER_X;
                whiteBall.y = TABLE_HEIGHT / 2;
                whiteBall.vx = 0;
                whiteBall.vy = 0;
                balls.push(whiteBall);
            } else {
                whiteBall.x = D_ZONE_CENTER_X;
                whiteBall.y = TABLE_HEIGHT / 2;
                whiteBall.vx = 0;
                whiteBall.vy = 0;
            }
            isPlacingBall = true;
        }

        function startNewRack() {
            const prevScores = [...scores];
            const breaker = currentPlayer;
            initGame();
            scores = prevScores;
            currentPlayer = breaker;
            frameStarter = breaker;
            pushOutAvailable = false;
            showMessage(`新的一局开始！玩家${breaker + 1}开球，请在发球线后放置白球`);
            updateUI();
        }

        function endGame() {
            freeBallMode = false;
            freeBallTarget = null;
            const winner = scores[0] > scores[1] ? 1 : 2;
            showMessage(`比赛结束！玩家${winner}获胜！比分 ${scores[0]}:${scores[1]}`);
            gameStarted = false;
            ballMoving = false;
            document.getElementById('shootBtn').disabled = true;
            updateUI();
        }

        function endTurn() {
            if (currentBreak > 0) {
                showMessage(`玩家${currentPlayer + 1}连续得分：${currentBreak}`);
            }
            currentPlayer = 1 - currentPlayer;
            currentBreak = 0;
            freeBallMode = false;
            freeBallTarget = null;
            phase = 'normal';
            updateUI();
            if (gameStarted) {
                setTimeout(() => {
                    showMessage(`玩家${currentPlayer + 1}的回合`);
                }, 800);
            }
        }

        function resetGame() {
            if (isReplaying) {
                showMessage('请等待回放结束');
                return;
            }
            initGame();
            showMessage('游戏重置！');
            updateUI();
        }

        function updateUI() {
            document.getElementById('score1').textContent = scores[0];
            document.getElementById('score2').textContent = scores[1];
            document.getElementById('break1').textContent = currentPlayer === 0 ? currentBreak : 0;
            document.getElementById('break2').textContent = currentPlayer === 1 ? currentBreak : 0;

            const remainingBalls = balls.filter(b => b.type === 'numbered').length;
            document.getElementById('remainingBalls').textContent = remainingBalls;
            document.getElementById('foulCount').textContent = consecutiveFouls[currentPlayer];

            const smallest = getSmallestBallOnTable();
            let target = '';
            let phaseText = '';
            if (!gameStarted && scores[0] + scores[1] > 0) {
                target = '已结束';
                phaseText = '结束';
            } else if (freeBallMode) {
                target = freeBallTarget ? `自由球: ${freeBallTarget.number}号` : '选择自由球';
                phaseText = '自由球';
            } else if (phase === 'break') {
                target = '开球';
                phaseText = '开球';
            } else if (smallest) {
                target = `${smallest.number}号球`;
                phaseText = '进行中';
            } else {
                target = '结束';
                phaseText = '结束';
            }
            document.getElementById('currentTarget').textContent = target;
            document.getElementById('phase').textContent = phaseText;

            const indicator = document.getElementById('targetIndicator');
            if (indicator) {
                if (freeBallMode && freeBallTarget) {
                    indicator.style.background = getBallSwatch(freeBallTarget.number);
                } else if (phase === 'break') {
                    indicator.style.background = BALL_COLORS[1];
                } else if (smallest) {
                    indicator.style.background = getBallSwatch(smallest.number);
                } else {
                    indicator.style.background = '#888';
                }
            }

            const p1 = document.getElementById('scorePanel1');
            const p2 = document.getElementById('scorePanel2');
            if (p1 && p2) {
                p1.classList.toggle('active', currentPlayer === 0 && gameStarted);
                p2.classList.toggle('active', currentPlayer === 1 && gameStarted);
            }

            document.getElementById('shootBtn').disabled = isTableInMotion() || !gameStarted || isPlacingBall || awaitingPushOutDecision;
            document.getElementById('pushBackBtn').style.display = awaitingPushOutDecision ? 'inline-block' : 'none';
            document.getElementById('pushTakeBtn').style.display = awaitingPushOutDecision ? 'inline-block' : 'none';
            updateReplayButton();
            updatePushOutBtn();
        }

        function pushOutTakeShot() {
            awaitingPushOutDecision = false;
            currentPlayer = 1 - currentPlayer;
            pushOutAvailable = false;
            phase = 'normal';
            showMessage('对手接手击球');
            updateUI();
        }

        function pushOutForceBack() {
            awaitingPushOutDecision = false;
            pushOutAvailable = false;
            phase = 'normal';
            showMessage(`对手要求推回，玩家${currentPlayer + 1}继续击球`);
            updateUI();
        }

        function showMessage(msg) {
            lastMessage = msg || '';
            document.getElementById('message').textContent = lastMessage;
        }

        function drawTable() {
            ctx.fillStyle = '#5a3a22';
            ctx.fillRect(0, 0, TABLE_WIDTH, TABLE_HEIGHT);

            ctx.fillStyle = '#1b6b3a';
            ctx.fillRect(BORDER, BORDER, TABLE_WIDTH - BORDER * 2, TABLE_HEIGHT - BORDER * 2);

            ctx.strokeStyle = '#88cc88';
            ctx.lineWidth = 2;
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.moveTo(BAULK_LINE_X, BORDER);
            ctx.lineTo(BAULK_LINE_X, TABLE_HEIGHT - BORDER);
            ctx.stroke();

            if (isPlacingBall) {
                ctx.fillStyle = 'rgba(80, 180, 255, 0.12)';
                ctx.fillRect(BORDER, BORDER, BAULK_LINE_X - BORDER, TABLE_HEIGHT - BORDER * 2);
            }

            const pocketRadius = HOLE_RADIUS;

            ctx.fillStyle = '#1a1a1a';

            ctx.beginPath();
            ctx.arc(BORDER, BORDER, pocketRadius, Math.PI * 0.5, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(BORDER + TABLE_INNER_LENGTH, BORDER, pocketRadius, Math.PI, Math.PI * 2.5);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(BORDER, BORDER + TABLE_INNER_WIDTH, pocketRadius, 0, Math.PI * 1.5);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(BORDER + TABLE_INNER_LENGTH, BORDER + TABLE_INNER_WIDTH, pocketRadius, -Math.PI * 0.5, Math.PI);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(BORDER + TABLE_INNER_LENGTH / 2, BORDER, pocketRadius, Math.PI, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(BORDER + TABLE_INNER_LENGTH / 2, BORDER + TABLE_INNER_WIDTH, pocketRadius, 0, Math.PI);
            ctx.fill();

            ctx.strokeStyle = '#5a3a22';
            ctx.lineWidth = 4;
        }

        function drawGuideLines() {
            if (guideMode === 'off' || isTableInMotion() || !whiteBall || !gameStarted) {
                return;
            }

            const speed = Math.max(getShotSpeed(cuePower), 0.5);

            const whiteVx = Math.cos(cueAngle) * speed;
            const whiteVy = Math.sin(cueAngle) * speed;

            const maxLength = guideMode === 'long' ? 1500 : 350;

            ctx.lineWidth = 3;
            ctx.setLineDash([6, 3]);

            let closestBall = null;
            let closestCollision = null;
            let minDist = Infinity;

            for (const ball of balls) {
                if (ball.type === 'white') continue;

                const collision = predictGuideCollision(
                    whiteBall.x, whiteBall.y,
                    whiteVx, whiteVy,
                    ball.x, ball.y
                );
                if (collision && collision.distance < minDist) {
                    minDist = collision.distance;
                    closestBall = ball;
                    closestCollision = collision;
                }
            }

            let endX, endY;
            if (closestCollision) {
                endX = closestCollision.x;
                endY = closestCollision.y;
            } else {
                endX = whiteBall.x + whiteVx * (maxLength / speed);
                endY = whiteBall.y + whiteVy * (maxLength / speed);
            }

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.beginPath();
            ctx.moveTo(whiteBall.x, whiteBall.y);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            if (closestBall && closestCollision) {
                const { x: hitX, y: hitY, nx, ny } = closestCollision;
                const dvn = whiteVx * nx + whiteVy * ny;

                const whiteAfterVx = whiteVx - dvn * nx;
                const whiteAfterVy = whiteVy - dvn * ny;
                const ballVx = dvn * nx;
                const ballVy = dvn * ny;
                const previewScale = maxLength / speed * 0.5;

                ctx.strokeStyle = 'rgba(200, 200, 255, 0.7)';
                ctx.beginPath();
                ctx.moveTo(hitX, hitY);
                ctx.lineTo(hitX + whiteAfterVx * previewScale, hitY + whiteAfterVy * previewScale);
                ctx.stroke();

                ctx.strokeStyle = 'rgba(255, 255, 0, 0.9)';
                ctx.beginPath();
                ctx.moveTo(closestBall.x, closestBall.y);
                ctx.lineTo(closestBall.x + ballVx * previewScale, closestBall.y + ballVy * previewScale);
                ctx.stroke();

                ctx.fillStyle = 'rgba(255, 255, 0, 0.9)';
                ctx.beginPath();
                ctx.arc(hitX, hitY, 5, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.setLineDash([]);
        }

        function predictGuideCollision(startX, startY, vx, vy, targetX, targetY) {
            const speed = Math.hypot(vx, vy);
            if (speed < 0.01) return null;

            const ux = vx / speed;
            const uy = vy / speed;
            const relX = targetX - startX;
            const relY = targetY - startY;
            const projection = relX * ux + relY * uy;
            if (projection <= 0) return null;

            const collisionDistance = BALL_RADIUS * 2;
            const perpendicularSq = relX * relX + relY * relY - projection * projection;
            const collisionDistanceSq = collisionDistance * collisionDistance;
            if (perpendicularSq >= collisionDistanceSq) return null;

            const distance = projection - Math.sqrt(collisionDistanceSq - perpendicularSq);
            if (distance < 0) return null;

            const x = startX + ux * distance;
            const y = startY + uy * distance;
            const normalLength = Math.hypot(targetX - x, targetY - y);
            if (normalLength < 0.001) return null;

            return {
                distance,
                x,
                y,
                nx: (targetX - x) / normalLength,
                ny: (targetY - y) / normalLength
            };
        }

        function drawBalls() {
            balls.forEach(ball => {
                const cx = ball.x, cy = ball.y, r = BALL_RADIUS;
                const gradient = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.1, cx, cy, r);

                if (ball === freeBallTarget) {
                    ctx.fillStyle = 'rgba(255, 255, 0, 0.3)';
                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#FF0';
                    ctx.lineWidth = 4;
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.arc(cx, cy, r + 5, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255, 255, 0, 0.5)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                if (ball.type === 'white') {
                    gradient.addColorStop(0, '#ffffff');
                    gradient.addColorStop(0.5, '#e8e8e8');
                    gradient.addColorStop(1, '#c0c0c0');
                    ctx.fillStyle = gradient;
                } else if (ball.type === 'numbered') {
                    if (ball.number === 9) {
                        gradient.addColorStop(0, '#ffffff');
                        gradient.addColorStop(0.55, '#f2f2ed');
                        gradient.addColorStop(1, '#bdbdb7');
                    } else if (ball.number === 8) {
                        gradient.addColorStop(0, '#555555');
                        gradient.addColorStop(0.4, '#000000');
                        gradient.addColorStop(1, '#111111');
                    } else {
                        gradient.addColorStop(0, lightenColor(ball.color, 40));
                        gradient.addColorStop(0.5, ball.color);
                        gradient.addColorStop(1, darkenColor(ball.color, 30));
                    }
                    ctx.fillStyle = gradient;
                } else {
                    ctx.fillStyle = ball.color;
                }

                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                if (ball.type === 'numbered' && ball.number === 9) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(cx, cy, r - 0.5, 0, Math.PI * 2);
                    ctx.clip();
                    const stripeGradient = ctx.createLinearGradient(cx - r, cy, cx + r, cy);
                    stripeGradient.addColorStop(0, '#b98b00');
                    stripeGradient.addColorStop(0.38, '#F4D000');
                    stripeGradient.addColorStop(0.65, '#ffe45a');
                    stripeGradient.addColorStop(1, '#b98b00');
                    ctx.fillStyle = stripeGradient;
                    ctx.fillRect(cx - r, cy - r * 0.38, r * 2, r * 0.76);
                    ctx.restore();
                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }

                if (ball.type === 'white') {
                    ctx.beginPath();
                    ctx.arc(cx - r * 0.25, cy - r * 0.25, r * 0.35, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.fill();
                }

                if (ball.type === 'numbered') {
                    ctx.beginPath();
                    ctx.arc(cx, cy, r * 0.65, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.92)';
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    ctx.fillStyle = '#111';
                    ctx.font = `bold ${Math.round(r * 1.05)}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(ball.number.toString(), cx, cy + 0.5);
                }
            });
        }

        function lightenColor(hex, percent) {
            const num = parseInt(hex.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.min(255, (num >> 16) + amt);
            const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
            const B = Math.min(255, (num & 0x0000FF) + amt);
            return `rgb(${R},${G},${B})`;
        }

        function darkenColor(hex, percent) {
            const num = parseInt(hex.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.max(0, (num >> 16) - amt);
            const G = Math.max(0, ((num >> 8) & 0x00FF) - amt);
            const B = Math.max(0, (num & 0x0000FF) - amt);
            return `rgb(${R},${G},${B})`;
        }

        function drawCue() {
            if (isTableInMotion() || !gameStarted || isPlacingBall) return;

            const cueLength = 150;
            const startX = whiteBall.x - Math.cos(cueAngle) * (BALL_RADIUS + 10);
            const startY = whiteBall.y - Math.sin(cueAngle) * (BALL_RADIUS + 10);
            const endX = startX - Math.cos(cueAngle) * cueLength;
            const endY = startY - Math.sin(cueAngle) * cueLength;

            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = '#bb8855';
            ctx.lineWidth = 6;
            ctx.stroke();

            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        function drawPlacementHint() {
            if (isReplaying || !isPlacingBall) return;

            const isValid = isValidBallPosition(whiteBall.x, whiteBall.y);
            ctx.beginPath();
            ctx.arc(whiteBall.x, whiteBall.y, BALL_RADIUS + 5, 0, Math.PI * 2);
            ctx.strokeStyle = isValid ? 'rgba(0,255,0,0.9)' : 'rgba(255,0,0,0.9)';
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        function gameLoop(timestamp = 0) {
            if (isReplaying) updateReplayPlayback(timestamp);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawTable();
            drawPlacementHint();
            drawBalls();
            drawCue();
            drawGuideLines();

            if (!isReplaying && isTableInMotion()) {
                updateBalls();
            }

            requestAnimationFrame(gameLoop);
        }

        function drawDirectionTicks() {
            const tickCanvas = document.getElementById('directionTicks');
            if (!tickCanvas) return;
            const tctx = tickCanvas.getContext('2d');
            const cx = 100, cy = 100;
            tctx.clearRect(0, 0, 200, 200);

            for (let i = 0; i < 360; i += 15) {
                const rad = i * Math.PI / 180;
                const isMain = i % 45 === 0;
                const innerR = isMain ? 78 : 84;
                const outerR = 92;
                const x1 = cx + Math.cos(rad) * innerR;
                const y1 = cy + Math.sin(rad) * innerR;
                const x2 = cx + Math.cos(rad) * outerR;
                const y2 = cy + Math.sin(rad) * outerR;

                tctx.beginPath();
                tctx.moveTo(x1, y1);
                tctx.lineTo(x2, y2);
                tctx.strokeStyle = isMain ? '#888' : '#555';
                tctx.lineWidth = isMain ? 1.5 : 0.8;
                tctx.stroke();
            }
        }
    </script>
</body>
</html>
