<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>九球台球 - 双人对战</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;

        }
        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 14px 22px;

            top: 0;

        .nav-title {
            font-size: 18px;
            font-weight: 700;
            color: #e6d2ad;
        }
        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .nav-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 34px;
            padding: 0 14px;
            border-radius: 6px;
            border: 1px solid rgba(212, 165, 116, 0.42);
            color: #e8d8bc;

        .nav-link:hover {
            background: rgba(212, 165, 116, 0.18);
            border-color: rgba(212, 165, 116, 0.78);
            color: #fff;
        }
        *, *::before, *::after { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body {
            min-height: 0; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
            background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
            color: white; font-family: 'Segoe UI', Arial, sans-serif;
        }
        .top-nav {
            flex: 0 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            gap: 16px; padding: 10px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);

        }
        .nav-title { font-size: 18px; font-weight: 700; color: #e6d2ad; }

        .nav-link {
            display: inline-flex; align-items: center; justify-content: center;
            min-height: 30px; padding: 0 12px;
            border-radius: 5px; border: 1px solid rgba(212,165,116,0.42);

        /* ==== 三列布局 ==== */
        .app-shell {
            flex: 1 1 auto; min-height: 0;
            display: grid;
            grid-template-columns: 100px 280px minmax(0, 1fr);

        }

        /* ===== 左列 ===== */

            display: flex; flex-direction: column;
            align-items: center; justify-content: stretch;

            background: rgba(12,12,12,0.6);

        }
        .col-left .section-title { margin: 0 0 6px; font-size: 16px; }
        .col-left .power-gauge-container {
            flex: 1; width: 50px; min-height: 120px;
            margin: 0 auto;
        }
        .col-left .power-label { margin-top: 6px; font-size: 18px; }
        .col-left .gauge-marker { font-size: 12px; padding-right: 6px; }
        .gauge-marker.high { top: 5px !important; }
        .gauge-marker.mid { top: 50% !important; transform: translateY(-50%); }
        .gauge-marker.low { top: auto !important; bottom: 5px; }

        /* ===== 中列 ===== */
        .col-mid {
            display: flex; flex-direction: column; gap: 6px;

        .col-mid .panel {

            padding: 8px; min-height: 0;
        }
        .col-mid .section-title { font-size: 15px; margin-bottom: 6px; }

        /* ===== 右列 ===== */
        .col-right {
            display: flex; flex-direction: column; min-height: 0;
        }
        .table-stage {
            flex: 1; display: flex;

        #table {
            flex: 0 0 auto;

            object-fit: contain;
            border: 3px solid #5a3a22; background: #111; cursor: crosshair;
        }

        /* ===== 底部控制台 ===== */
        .console-bar {
            flex: 0 0 auto;
            display: flex; align-items: center; gap: 20px;
            padding: 24px 24px;
            background: rgba(10,10,10,0.92);
            border-top: 1px solid rgba(212,165,116,0.15);
            box-shadow: 0 -2px 20px rgba(0,0,0,0.3);
        }
        .console-group {
            display: flex; align-items: center; gap: 14px;
        }
        .console-group.sep {
            border-left: 1px solid rgba(255,255,255,0.08);

        }

        .score-mini {
            display: flex; gap: 12px;
        }
        .score-mini-item {
            display: flex; flex-direction: column; align-items: center;
            padding: 8px 24px; border-radius: 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);

        .score-mini-item.active {
            border-color: rgba(212,165,116,0.5);
            background: rgba(212,165,116,0.08);
            box-shadow: 0 0 10px rgba(212,165,116,0.12);

        .score-mini-label { font-size: 13px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
        .score-mini-val { font-size: 30px; font-weight: 700; color: #f0e0c8; line-height: 1.2; }

        .status-chips {
            display: flex; gap: 20px; align-items: center;
        }

        .chip-val { font-size: 19px; font-weight: 600; color: #e0d0b0; }
        .chip-val.highlight { color: #ffcc00; }
        .chip-val.danger { color: #ff6644; }

        .console-btns { display: flex; gap: 10px; margin-left: auto; }
        .console-btn {

            cursor: pointer; color: #ddd;

        }

        .power-gauge-container {
            background: linear-gradient(180deg,#2a2a2a,#1a1a1a);
            border-radius: 8px; padding: 4px;
